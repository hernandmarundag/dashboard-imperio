<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Imperio · Mente Maestra</title>
<style>
:root{--bg:#f6f4ef;--ink:#2b2822;--soft:#6f6a60;--mut:#a49e93;--line:rgba(60,55,45,.1);--gold:#a97b3b;--ok:#5c8a63;--alert:#c1602f}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100%;display:flex;flex-direction:column;overflow-x:hidden;
  background-image:radial-gradient(1200px 700px at 50% -5%,#fbfaf6,transparent 60%);}
.serif{font-family:ui-serif,Georgia,'Times New Roman',serif}
.wrap{flex:1;display:flex;flex-direction:column;max-width:860px;width:100%;margin:0 auto;padding:26px 26px 40px;opacity:0;animation:fade 1.1s ease .1s forwards}
@keyframes fade{to{opacity:1}}
header{display:flex;align-items:center;justify-content:space-between}
.brand{font-size:12px;letter-spacing:5px;color:var(--mut);font-weight:600}
.date{font-size:12px;color:var(--mut)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;padding:40px 0}
.aura{position:absolute;top:50%;left:50%;width:440px;height:440px;transform:translate(-50%,-58%);border-radius:50%;
  background:radial-gradient(circle,rgba(169,123,59,.14),rgba(169,123,59,.04) 45%,transparent 70%);
  filter:blur(6px);z-index:0;animation:breathe 7s ease-in-out infinite}
@keyframes breathe{50%{transform:translate(-50%,-58%) scale(1.09);opacity:.85}}
.ring{position:absolute;top:50%;left:50%;width:180px;height:180px;transform:translate(-50%,-60%);border-radius:50%;border:1px solid rgba(169,123,59,.28);z-index:0;animation:spin 40s linear infinite}
.ring.b{width:110px;height:110px;border-style:dashed;border-color:rgba(169,123,59,.2);animation:spin 26s linear infinite reverse}
@keyframes spin{to{transform:translate(-50%,-60%) rotate(360deg)}}
.hero>*{position:relative;z-index:1}
.greet{font-size:38px;font-weight:500;letter-spacing:-.5px;line-height:1.15}
@media(max-width:560px){.greet{font-size:30px}}
.state{margin-top:14px;font-size:16px;color:var(--soft);max-width:440px}
.metrics{display:flex;gap:52px;margin-top:52px;justify-content:center;flex-wrap:wrap}
.metric{text-align:center;min-width:90px}
.metric .v{font-size:30px;font-weight:500;letter-spacing:-.5px}
.metric .l{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-top:8px}
.focus{margin-top:54px;max-width:520px;width:100%;border:1px solid var(--line);border-radius:16px;padding:18px 22px;background:rgba(255,255,255,.5);backdrop-filter:blur(4px);text-align:left}
.focus .lab{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700}
.focus .txt{font-size:15px;margin-top:8px;line-height:1.5;color:var(--ink)}
.focus a{color:var(--gold);text-decoration:none;font-size:13px;display:inline-block;margin-top:12px}
.foot{display:flex;gap:6px 22px;justify-content:center;flex-wrap:wrap;margin-top:auto;padding-top:34px}
.foot a{color:var(--mut);text-decoration:none;font-size:13px;transition:color .2s;padding:4px 2px}
.foot a:hover{color:var(--ink)}
.foot a.main{color:var(--ink);font-weight:600}
.dotline{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--mut);opacity:.4;align-self:center}
</style></head>
<body>
<div class="wrap">
  <header>
    <div class="brand">IMPERIO</div>
    <div class="date" id="date"></div>
  </header>

  <main class="hero">
    <div class="aura"></div><div class="ring"></div><div class="ring b"></div>
    <div class="greet serif" id="greet">Buenas…</div>
    <div class="state" id="state">Un momento, leyendo tu imperio…</div>
    <div class="metrics" id="metrics"></div>
    <div class="focus" id="focus" style="display:none"></div>
  </main>

  <footer class="foot" id="foot">
    <a class="main" href="panel.html">Panel completo</a>
    <span class="dotline"></span>
    <a href="flujo.html">Flujo</a>
    <a href="presupuesto.html">Presupuesto</a>
    <a href="requisiciones.html">Requisiciones</a>
    <a href="nomina.html">Nómina</a>
    <a href="bitacora.html">Bitácora</a>
    <a href="compras.html">Compras</a>
    <a href="sst.html">SST</a>
  </footer>
</div>

<script>
var SB='https://dghmgaaprlzpfnpsqzav.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
var H={'apikey':KEY,'Authorization':'Bearer '+KEY};
function q(t,query){return fetch(SB+'/rest/v1/'+t+'?'+(query||''),{headers:H}).then(function(r){return r.ok?r.json():[];}).catch(function(){return[];});}
function short(n){return n>=1e6?'$'+(n/1e6).toFixed(1).replace('.0','')+'M':'$'+Math.round(n).toLocaleString('es-CO');}
function abierto(e){return e!=='cerrado'&&e!=='mitigado'&&e!=='resuelta';}

var hr=new Date().getHours();
document.getElementById('greet').textContent=(hr<12?'Buenos días':hr<19?'Buenas tardes':'Buenas noches')+', Hernán';
document.getElementById('date').textContent=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});

Promise.all([
  q('cuentas','select=saldo_actual,es_personal,activa,deleted_at'),
  q('obras','select=nombre,estado,activa'),
  q('matriz_riesgos','select=riesgo,categoria,estado,area_id'),
  q('pasivos','select=monto,pagado,deleted_at')
]).then(function(res){
  var cuentas=res[0]||[],obras=res[1]||[],riesgos=res[2]||[],pasivos=res[3]||[];
  var caja=cuentas.filter(function(c){return c.activa&&!c.es_personal&&!c.deleted_at;}).reduce(function(s,c){return s+(Number(c.saldo_actual)||0);},0);
  var obrasA=obras.filter(function(o){return o.activa||o.estado==='activa';}).length;
  var rAb=riesgos.filter(function(r){return abierto(r.estado);});

  var state=rAb.length===0
    ? 'Tu imperio está en calma. Nada urgente hoy.'
    : 'Todo bajo control. Hay '+rAb.length+' foco'+(rAb.length>1?'s':'')+' abierto'+(rAb.length>1?'s':'')+' — vamos uno a la vez.';
  document.getElementById('state').textContent=state;

  document.getElementById('metrics').innerHTML=
    m(short(caja),'Caja')+m(obrasA,'Obras activas')+m(rAb.length,'Focos abiertos');

  if(rAb.length){
    var pri=rAb.filter(function(r){return (r.categoria||'')==='juridico';})[0]||rAb.filter(function(r){return (r.categoria||'')==='tributario';})[0]||rAb[0];
    var f=document.getElementById('focus');f.style.display='block';
    f.innerHTML='<div class="lab">Lo único importante hoy</div><div class="txt">'+String(pri.riesgo||'Revisar el foco abierto de mayor peso').slice(0,140)+'</div><a href="panel.html">Atenderlo en el panel →</a>';
  }
}).catch(function(){document.getElementById('state').textContent='No pude leer tu imperio ahora. Reintenta en un momento.';});

function m(v,l){return '<div class="metric"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}
</script>
</body></html>
