<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Imperio · Mente Maestra</title>
<style>
:root{--bg:#f7f5f0;--ink:#2c2a26;--soft:#726e65;--mut:#a9a49a;--line:rgba(60,55,45,.09);
 --gold:#a97b3b;--viva:#b58a49;--alerta:#bd6240;--dorm:#d0ccc2}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);
 height:100vh;overflow:hidden;display:flex;flex-direction:column;
 background-image:radial-gradient(1100px 620px at 50% 8%,#fbf9f4,transparent 62%)}
.serif{font-family:ui-serif,Georgia,serif}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 30px;position:relative;z-index:5}
.brand{font-size:12px;letter-spacing:6px;color:var(--mut);font-weight:600}
.status{font-size:12px;color:var(--soft);display:flex;align-items:center;gap:8px}
.status .d{width:7px;height:7px;border-radius:50%;background:var(--viva)}
.status.alert .d{background:var(--alerta);box-shadow:0 0 8px rgba(189,98,64,.5);animation:bl 1.8s infinite}
@keyframes bl{50%{opacity:.4}}
.line{text-align:center;font-size:14px;color:var(--soft);padding:2px 20px 6px;position:relative;z-index:5}
.line b{color:var(--ink);font-weight:600}
.line .sep{color:var(--mut);margin:0 10px}
.stage{flex:1;position:relative;overflow:hidden}
#syn{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:3;pointer-events:none}
.aura{position:absolute;left:50%;top:50%;width:230px;height:230px;transform:translate(-50%,-50%);border-radius:50%;
 background:radial-gradient(circle,rgba(169,123,59,.13),transparent 68%);animation:breathe 7s ease-in-out infinite}
@keyframes breathe{50%{transform:translate(-50%,-50%) scale(1.12);opacity:.8}}
.core .lbl{font-size:10.5px;letter-spacing:4px;color:var(--gold);font-weight:700}
.node{position:absolute;transform:translate(-50%,-50%);z-index:4;cursor:pointer;text-align:center}
.node:hover .fl{transform:scale(1.18)}
.bulb{border-radius:50%;margin:0 auto}
.node .t{font-size:10px;font-weight:600;color:var(--soft);white-space:nowrap;margin-top:5px;text-shadow:0 1px 3px var(--bg)}
.node.alerta .t{color:#a04e30}
@keyframes al{0%,100%{box-shadow:0 0 0 0 rgba(189,98,64,.4)}50%{box-shadow:0 0 0 8px rgba(189,98,64,0)}}
@keyframes flA{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes flB{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,4px)}}
@keyframes flC{0%,100%{transform:translate(0,0)}50%{transform:translate(-4px,5px)}}
.detail{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:6;background:rgba(255,255,255,.92);
 backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:16px;padding:14px 20px;min-width:280px;max-width:90%;
 box-shadow:0 10px 34px rgba(40,35,25,.1);display:none;text-align:center}
.detail b{font-size:15px}.detail .s{font-size:12.5px;color:var(--soft);margin-top:5px;line-height:1.5}
.detail .x{position:absolute;top:10px;right:14px;color:var(--mut);cursor:pointer;font-size:13px}
footer{display:flex;gap:2px 20px;justify-content:center;flex-wrap:wrap;padding:14px 20px 22px;position:relative;z-index:5}
footer a{color:var(--mut);text-decoration:none;font-size:12.5px;padding:4px 3px;transition:color .2s}
footer a:hover{color:var(--ink)}
footer a.main{color:var(--soft);font-weight:600}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px;z-index:7}
</style></head>
<body>
<header>
  <div class="brand">IMPERIO</div>
  <div class="status" id="status"><span class="d"></span><span id="statustx">leyendo tu imperio…</span></div>
</header>
<div class="line" id="line"></div>

<div class="stage" id="stage">
  <div class="loading" id="loading">🧠 un momento…</div>
  <svg id="syn" viewBox="0 0 100 100" preserveAspectRatio="none"><g id="lines"></g><g id="flow"></g></svg>
  <div class="core"><div class="aura"></div><div class="lbl serif">MENTE<br>MAESTRA</div></div>
  <div class="detail" id="detail"></div>
</div>

<footer>
  <a class="main" href="panel.html">Panel completo</a>
  <a href="flujo.html">Flujo</a>
  <a href="presupuesto.html">Presupuesto</a>
  <a href="requisiciones.html">Requisiciones</a>
  <a href="nomina.html">Nómina</a>
  <a href="bitacora.html">Bitácora</a>
  <a href="compras.html">Compras</a>
  <a href="sst.html">SST</a>
</footer>

<script>
var SB='https://dghmgaaprlzpfnpsqzav.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
var Hh={'apikey':KEY,'Authorization':'Bearer '+KEY};
function q(t,query){return fetch(SB+'/rest/v1/'+t+'?'+(query||''),{headers:Hh}).then(function(r){return r.ok?r.json():[];}).catch(function(){return[];});}
function short(n){return n>=1e6?'$'+(n/1e6).toFixed(1).replace('.0','')+'M':'$'+Math.round(n).toLocaleString('es-CO');}
function abierto(e){return e!=='cerrado'&&e!=='mitigado'&&e!=='resuelta';}
var COL={viva:'#b58a49',alerta:'#bd6240',dorm:'#d0ccc2'},FLS=['flA','flB','flC'];

Promise.all([
  q('areas','select=id,codigo,nombre,activa,orden&order=orden'),
  q('area_conexiones','select=origen_id,destino_id,activa'),
  q('matriz_riesgos','select=area_id,estado,riesgo'),
  q('cuentas','select=saldo_actual,es_personal,activa,deleted_at'),
  q('obras','select=estado,activa'),
  q('pasivos','select=monto,pagado,deleted_at')
]).then(function(res){
  var areas=res[0]||[],conex=res[1]||[],riesgos=res[2]||[],cuentas=res[3]||[],obras=res[4]||[],pasivos=res[5]||[];
  var rAb=riesgos.filter(function(r){return abierto(r.estado);});
  var caja=cuentas.filter(function(c){return c.activa&&!c.es_personal&&!c.deleted_at;}).reduce(function(s,c){return s+(Number(c.saldo_actual)||0);},0);
  var obrasA=obras.filter(function(o){return o.activa||o.estado==='activa';}).length;
  areas.forEach(function(a){var rc=rAb.filter(function(r){return r.area_id===a.id;}).length;a._r=rc;a._s=rc>0?'alerta':(a.activa?'viva':'dorm');});

  var st=document.getElementById('status');
  if(rAb.length){st.className='status alert';document.getElementById('statustx').textContent=rAb.length+' foco'+(rAb.length>1?'s':'')+' que atender';}
  else{document.getElementById('statustx').textContent='en calma';}

  document.getElementById('line').innerHTML='<b>'+short(caja)+'</b> en caja<span class="sep">·</span><b>'+obrasA+'</b> obra'+(obrasA!==1?'s':'')+' activa'+(obrasA!==1?'s':'')+'<span class="sep">·</span><b>'+rAb.length+'</b> foco'+(rAb.length!==1?'s':'')+' abierto'+(rAb.length!==1?'s':'');

  var stage=document.getElementById('stage'),pos={},n=areas.length||1;
  areas.forEach(function(a,i){var ang=(i/n)*Math.PI*2-Math.PI/2;pos[a.id]={x:50+38*Math.cos(ang),y:50+42*Math.sin(ang)};});
  var lines='';
  areas.forEach(function(a){var p=pos[a.id];lines+='<line x1="50" y1="50" x2="'+p.x+'" y2="'+p.y+'" stroke="'+(a._s==='alerta'?'rgba(189,98,64,.22)':'rgba(169,123,59,.12)')+'" stroke-width="'+(a._s==='alerta'?.26:.13)+'"/>';});
  var edges=conex.filter(function(c){return pos[c.origen_id]&&pos[c.destino_id]&&c.activa!==false;});
  edges.forEach(function(e){var a=pos[e.origen_id],b=pos[e.destino_id];lines+='<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="rgba(169,123,59,.14)" stroke-width=".14"/>';});
  document.getElementById('lines').innerHTML=lines;

  areas.forEach(function(a,i){var p=pos[a.id];var el=document.createElement('div');el.className='node '+a._s;el.style.left=p.x+'%';el.style.top=p.y+'%';el.title=a.nombre;
    var sz=a._s==='alerta'?16:a._s==='viva'?13:8;
    var bg=a._s==='dorm'?'#fff':'radial-gradient(circle at 38% 32%,#fff,'+COL[a._s]+')';
    var st=a._s==='dorm'?'border:1px solid '+COL.dorm:'box-shadow:0 2px 7px '+COL[a._s]+'44'+(a._s==='alerta'?';animation:al 2s ease-in-out infinite':'');
    var label=a._s==='dorm'?'':'<div class="t">'+a.nombre+'</div>';
    el.innerHTML='<div class="fl" style="animation:'+FLS[i%3]+' '+(6+i%5)+'s ease-in-out '+((i*0.4)%3).toFixed(1)+'s infinite"><div class="bulb" style="width:'+sz+'px;height:'+sz+'px;background:'+bg+';'+st+'"></div>'+label+'</div>';
    el.onclick=function(){sel(a);};stage.appendChild(el);});

  var flow=document.getElementById('flow'),sig=[];
  edges.concat(areas.map(function(a){return {o:'core',d:a.id,al:a._s==='alerta'};})).forEach(function(e,i){
    var a=(e.o==='core'||e.origen_id==='core')?{x:50,y:50}:pos[e.origen_id],b=pos[e.destino_id||e.d];if(!a||!b)return;
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('r',e.al?.6:.5);c.setAttribute('fill',e.al?'#c06a44':'#bd9550');c.setAttribute('opacity','.7');flow.appendChild(c);
    sig.push({c:c,a:a,b:b,t:(i*0.12)%1,sp:.0022+(i%5)*.0009});
  });
  function tick(){for(var i=0;i<sig.length;i++){var s=sig[i];s.t+=s.sp;if(s.t>1)s.t-=1;s.c.setAttribute('cx',s.a.x+(s.b.x-s.a.x)*s.t);s.c.setAttribute('cy',s.a.y+(s.b.y-s.a.y)*s.t);}requestAnimationFrame(tick);}
  requestAnimationFrame(tick);
  document.getElementById('loading').style.display='none';
}).catch(function(){document.getElementById('loading').textContent='No pude leer tu imperio. Reintenta.';});

function sel(a){var d=document.getElementById('detail');d.style.display='block';
  d.innerHTML='<span class="x" onclick="document.getElementById(\'detail\').style.display=\'none\'">✕</span><b>'+a.nombre+'</b><div class="s">'+(a._r>0?a._r+' foco'+(a._r>1?'s':'')+' abierto'+(a._r>1?'s':'')+' en esta área.':'En calma. Sin focos abiertos.')+'</div>';}
</script>
</body></html>
