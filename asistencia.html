<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Imperio · Asistencia</title>
<style>
:root{--bg:#f5f4f0;--card:#fff;--ink:#1b1b19;--mut:#7a786f;--line:#e7e4dc;--grn:#1d8a5f;--amb:#c98a12;--red:#c23b2e}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px 60px}
h1{font-size:18px;font-weight:700;margin:0}
.sub{font-size:12px;color:var(--mut);margin-top:2px}
.datebar{display:flex;align-items:center;gap:8px;margin:12px 0}
input[type=date]{flex:1;height:44px;border:1px solid var(--line);border-radius:11px;padding:0 12px;font-size:16px;background:var(--card);font-family:inherit}
.chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-size:13px;font-weight:500;color:var(--mut)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.summary{display:flex;gap:8px;margin-bottom:12px}
.sm{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px;text-align:center}
.sm .n{font-size:19px;font-weight:700}.sm .l{font-size:10px;color:var(--mut)}
.emp{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px;display:flex;align-items:center;gap:11px}
.av{width:44px;height:44px;border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex:0 0 auto}
.nm{font-weight:600;font-size:15px}.cargo{font-size:11px;color:var(--mut)}
.acts{display:flex;gap:6px;margin-left:auto;flex:0 0 auto}
.mk{width:44px;height:44px;border-radius:11px;border:1px solid var(--line);background:#fafafa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut)}
.mk.on-t{background:#e1f5ee;border-color:var(--grn);color:var(--grn)}
.mk.on-f{background:#fceceb;border-color:var(--red);color:var(--red)}
.mk.on-i{background:#fbf1dd;border-color:var(--amb);color:var(--amb)}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;opacity:0;transition:.3s;pointer-events:none}
.toast.on{opacity:1}
.muted{color:var(--mut);font-size:13px;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Marcar asistencia</h1>
  <div class="sub" id="sub">Cargando…</div>
  <div class="datebar"><input type="date" id="fecha"></div>
  <div class="chips" id="obras"></div>
  <div class="summary">
    <div class="sm"><div class="n" style="color:var(--grn)" id="s-t">0</div><div class="l">asistieron</div></div>
    <div class="sm"><div class="n" style="color:var(--red)" id="s-f">0</div><div class="l">faltas</div></div>
    <div class="sm"><div class="n" style="color:var(--amb)" id="s-i">0</div><div class="l">incapacidad</div></div>
    <div class="sm"><div class="n" id="s-p">0</div><div class="l">sin marcar</div></div>
  </div>
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB="https://dghmgaaprlzpfnpsqzav.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k";
var H={apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"};
var COLORS=['#5b5bd6','#1d8a5f','#c98a12','#c23b2e','#2563eb','#7c3aed','#0f766e','#b45309'];
var emps=[], marks={}, obra="todas";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast on";setTimeout(function(){t.className="toast";},1600);}
function initials(n){var p=(n||'').trim().split(/\s+/);return((p[0]||'')[0]||'')+((p[1]||'')[0]||'');}
function colorFor(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))>>>0;return COLORS[h%COLORS.length];}
function avatar(e){if(e.foto_url)return '<img class="av" src="'+esc(e.foto_url)+'" alt="">';return '<span class="av" style="background:'+colorFor(e.cedula||e.nombre_completo)+'">'+esc(initials(e.nombre_completo).toUpperCase())+'</span>';}
function quincenaDe(f){var d=new Date(f+'T12:00:00');var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];var dd=d.getDate();var d2=dd<=15?'1-15':'16-'+new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return d2+' '+meses[d.getMonth()]+' '+d.getFullYear();}

function renderObras(){document.getElementById("obras").innerHTML=['todas','weliving','robledo','novaeva'].map(function(o){return '<div class="chip'+(o===obra?' on':'')+'" onclick="pickObra(\''+o+'\')">'+o+'</div>';}).join("");}
function pickObra(o){obra=o;renderObras();render();}

function cargar(){
  var f=document.getElementById("fecha").value;
  document.getElementById("sub").textContent="Cargando "+f+"…";
  Promise.all([
    fetch(SB+"/rest/v1/empleados?select=id,cedula,nombre_completo,cargo,obra_id,foto_url,activo&order=obra_id,nombre_completo",{headers:H}).then(function(r){return r.json();}),
    fetch(SB+"/rest/v1/asistencia?fecha=eq."+f+"&select=cedula,estado",{headers:H}).then(function(r){return r.json();})
  ]).then(function(res){
    emps=(Array.isArray(res[0])?res[0]:[]).filter(function(e){return e.activo!==false;});
    marks={};(Array.isArray(res[1])?res[1]:[]).forEach(function(a){marks[a.cedula]=a.estado;});
    var d=new Date(f+'T12:00:00');var dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    document.getElementById("sub").textContent=dias[d.getDay()]+' · '+emps.length+' empleados';
    render();
  }).catch(function(){document.getElementById("sub").textContent="Error de conexión";});
}

function render(){
  var list=emps.filter(function(e){return obra==='todas'||e.obra_id===obra;});
  var t=0,fa=0,i=0,p=0;
  emps.forEach(function(e){var m=marks[e.cedula];if(m==='trabajo')t++;else if(m==='falta')fa++;else if(m==='incapacidad')i++;else p++;});
  document.getElementById("s-t").textContent=t;document.getElementById("s-f").textContent=fa;document.getElementById("s-i").textContent=i;document.getElementById("s-p").textContent=p;
  if(!list.length){document.getElementById("list").innerHTML='<div class="muted">Sin empleados.</div>';return;}
  document.getElementById("list").innerHTML=list.map(function(e){var m=marks[e.cedula];
    return '<div class="emp">'+avatar(e)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+'</div></div>'
      +'<div class="acts">'
      +'<div class="mk '+(m==='trabajo'?'on-t':'')+'" title="Asistió" onclick="marcar(\''+e.cedula+'\',\'trabajo\')">✓</div>'
      +'<div class="mk '+(m==='falta'?'on-f':'')+'" title="Falta" onclick="marcar(\''+e.cedula+'\',\'falta\')">✗</div>'
      +'<div class="mk '+(m==='incapacidad'?'on-i':'')+'" title="Incapacidad" onclick="marcar(\''+e.cedula+'\',\'incapacidad\')">I</div>'
      +'</div></div>';
  }).join("");
}

function marcar(ced,estado){
  var f=document.getElementById("fecha").value;
  var e=emps.find(function(x){return x.cedula===ced;});
  var prev=marks[ced];
  marks[ced]=estado; render();
  fetch(SB+"/rest/v1/asistencia?cedula=eq."+encodeURIComponent(ced)+"&fecha=eq."+f,{method:"DELETE",headers:H})
    .then(function(){return fetch(SB+"/rest/v1/asistencia",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},H),
      body:JSON.stringify({cedula:ced,nombre:e?e.nombre_completo:'',fecha:f,quincena:quincenaDe(f),obra_id:e?e.obra_id:'',estado:estado,dias:1})});})
    .then(function(r){if(!r.ok)throw 0;toast("Guardado ✓");})
    .catch(function(){marks[ced]=prev;render();toast("Error al guardar");});
}

document.getElementById("fecha").value=new Date().toISOString().slice(0,10);
document.getElementById("fecha").addEventListener("change",cargar);
renderObras();cargar();
</script>
</body>
</html>
