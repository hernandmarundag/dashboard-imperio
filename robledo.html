function plannerFechas(){var cr=CRONO.filter(function(c){return c.fecha_ini;}).slice().sort(function(a,b){return (a.fecha_ini||'')<(b.fecha_ini||'')?-1:1;});
 var MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
 function fd(f){if(!f)return '';var p=f.split('-');return (+p[2])+' '+MES[(+p[1])-1];}
 function isInd(g){var c=capByNum[g.cap_num];return c && /^INDIRECTOS/.test(c.nombre||'');}
 var totP=0;
 var rows=cr.map(function(c,i){var st=c.estado||'pendiente';var ic=st==='completado'||st==='hecho'?'✅':(st==='en_curso'?'🔵':'⚪');

  var dir=gp.filter(function(g){return !isInd(g);}).reduce(function(a,g){return a+(+g.monto||0);},0);
  var ind=gp.filter(isInd).reduce(function(a,g){return a+(+g.monto||0);},0);

  var pg=PAGOS.filter(function(p){return p.estado!=='pagado'&&p.fecha&&p.fecha>=ini&&(last?p.fecha<=end:p.fecha<end);}).reduce(function(a,p){return a+(+p.monto||0);},0);
  var right=tot>0?('<div class="lp-pg" style="color:#1a7340">'+fmt(tot)+'</div>'):(pg>0?'<div class="lp-pg" style="color:#a5710a">prog '+fmt(pg)+'</div>':'');
  var sub=tot>0?('<div class="lp-f" style="color:#a7adbf">Gastado: directo '+fmt(dir)+' · indirecto '+fmt(ind)+'</div>'):'';
  return '<div class="lprow"><span class="lp-ic">'+ic+'</span><div class="lp-mid"><div class="lp-a">'+(c.actividad||'')+'</div><div class="lp-f">'+fd(c.fecha_ini)+(c.fecha_fin&&c.fecha_fin!==c.fecha_ini?(' → '+fd(c.fecha_fin)):'')+'</div>'+sub+'</div>'+right+'</div>';}).join('');

function planAvanza(id){var a=PLAN.find(function(x){return x.id===id;});if(!a)return;a.estado=(ESTP[a.estado]||ESTP.pendiente).nx;patch('planner_cuadrillas?id=eq.'+id,{estado:a.estado}).then(function(){flash('Guardado ✓');}).catch(function(){flash('Error al guardar',true);});var b=document.getElementById('d-body');b.innerHTML=plannerCuadrillas();attachPlan();}
function moverPlan(id,col){var map={porhacer:'pendiente',encurso:'en_curso',hecho:'hecho'};var ne=map[col];if(!ne)return;var a=PLAN.find(function(x){return x.id===id;});if(!a||a.estado===ne)return;a.estado=ne;patch('planner_cuadrillas?id=eq.'+id,{estado:ne}).then(function(){flash('Movido ✓');}).catch(function(){flash('Error al guardar',true);});var b=document.getElementById('d-body');b.innerHTML=plannerCuadrillas();attachPlan();}
function attachPlan(){
 document.querySelectorAll('#d-body .pv').forEach(function(bt){bt.onclick=function(){setPlanViewC(bt.dataset.v);};});
 document.querySelectorAll('#d-body .act').forEach(function(el){el.onclick=function(){planAvanza(+el.dataset.id);};});
 document.querySelectorAll('#d-body .kadv').forEach(function(bt){bt.onclick=function(ev){ev.stopPropagation();planAvanza(+bt.dataset.id);};});
 var dragId=null;
 document.querySelectorAll('#d-body .kcard').forEach(function(c){c.addEventListener('dragstart',function(e){dragId=+c.dataset.id;if(e.dataTransfer)e.dataTransfer.effectAllowed='move';});});
 document.querySelectorAll('#d-body .kcol').forEach(function(col){col.addEventListener('dragover',function(e){e.preventDefault();col.classList.add('over');});col.addEventListener('dragleave',function(){col.classList.remove('over');});col.addEventListener('drop',function(e){e.preventDefault();col.classList.remove('over');if(dragId!=null){moverPlan(dragId,col.dataset.est);dragId=null;}});});}
function kanbanPlan(){var cols=[['⚪ Por hacer','porhacer',['pendiente']],['🔵 En curso','encurso',['en_curso']],['✅ Hecho','hecho',['hecho']]];
 var html='<div class="kanban">';
 cols.forEach(function(c){var items=PLAN.filter(function(a){return c[2].indexOf(a.estado)>=0;});
  html+='<div class="kcol" data-est="'+c[1]+'"><div class="kh"><span>'+c[0]+'</span><span>'+items.length+'</span></div>'+
   items.map(function(a){var col=a.es_hito?'#dc2626':(a.cuadrilla===1?'#4f46e5':a.cuadrilla===2?'#0ea5a3':a.cuadrilla===3?'#d97706':'#7c5cf0');
    return '<div class="kcard" draggable="true" data-id="'+a.id+'" style="border-left-color:'+col+'"><div class="kt">'+(a.es_hito?'🏗 ':'')+a.actividad+'</div><div class="kd"><span>Día '+a.dia+(a.fecha?' · '+fp(a.fecha):'')+' · Cuad '+a.cuadrilla+(a.personal?' · '+a.personal+'p':'')+'</span><button class="kadv" data-id="'+a.id+'" title="Avanzar estado">siguiente ▸</button></div></div>';}).join('')+'</div>';});
 return html+'</div><div class="grpnote" style="margin-top:10px">Arrastra una tarjeta entre columnas o usa "siguiente ▸" para avanzar su estado. Los hitos de vaciado van en rojo.</div>';}
function cuadrillasPlan(){var HOY=new Date().toISOString().slice(0,10);
 var dias={},od=[];PLAN.forEach(function(a){if(!dias[a.dia]){dias[a.dia]=[];od.push(a.dia);}dias[a.dia].push(a);});od.sort(function(x,y){return x-y;});
 var html='',curBlk=null;
 od.forEach(function(d){var acts=dias[d];var blk=acts[0].bloque||'';
  if(blk!==curBlk){curBlk=blk;var bd=acts.filter(function(a){return a.es_hito;})[0];var anyHito=PLAN.filter(function(a){return (a.bloque||'')===blk&&a.es_hito;})[0];html+='<div class="grp" style="margin-top:14px"><span>'+(blk.indexOf('Losa')>=0?'🏗 ':'🧱 ')+blk+'</span><span class="gt">'+(anyHito?('vaciado '+fp(anyHito.fecha)):'')+'</span></div>';}
  var esHito=acts.some(function(a){return a.es_hito;});var pers=acts.reduce(function(s2,a){return s2+(+a.personal||0);},0);var hech=acts.filter(function(a){return a.estado==='hecho';}).length;
  var fx=acts[0].fecha,esHoy=(fx===HOY);
  var cuas={},oc=[];acts.forEach(function(a){if(!cuas[a.cuadrilla]){cuas[a.cuadrilla]=[];oc.push(a.cuadrilla);}cuas[a.cuadrilla].push(a);});oc.sort(function(x,y){return x-y;});
  html+='<div class="dcard'+(esHito?' hito':'')+'"><div class="dhead'+(esHito?' hito':'')+'"><span class="dd">Día '+d+(fx?' · '+fp(fx):'')+(esHito?' · 🏗 Vaciado':'')+(esHoy?' · <span style="color:#dc2626;font-weight:800">HOY</span>':'')+'</span><span class="dp">'+hech+'/'+acts.length+' hechas · '+pers+' pers</span></div>';
  oc.forEach(function(c){var cp=cuas[c].reduce(function(s2,a){return s2+(+a.personal||0);},0);html+='<div class="cua"><div class="ch">Cuadrilla '+c+(cp?' · '+cp+'p':'')+'</div>';
   cuas[c].forEach(function(a){var ic=(ESTP[a.estado]||ESTP.pendiente).ic;html+='<div class="act'+(a.estado==='hecho'?' done':'')+(a.es_hito?' hito':'')+'" data-id="'+a.id+'"><span class="estd">'+ic+'</span><span class="tx">'+(a.es_hito?'🏗 ':'')+a.actividad+'</span></div>';});
   html+='</div>';});
  html+='</div>';});
 return html;}
function plannerCuadrillas(){if(!PLAN.length){return backG()+'<div class="canvas">Sin plan cargado para esta obra.</div>';}
 var total=PLAN.length,hechos=PLAN.filter(function(a){return a.estado==='hecho';}).length,enc=PLAN.filter(function(a){return a.estado==='en_curso';}).length,ppc=total?Math.round(hechos/total*100):0;
 var vc=PLAN.find(function(a){return a.es_hito&&a.dia<=5;}),vl=PLAN.find(function(a){return a.es_hito&&a.dia>5;});
 return backG()+'<div class="itemh"><span class="nm0">📅</span><h3>Last Planner · Columnas P4→P5 · Losa P5</h3></div>'+
  '<div class="grpnote">Columnas P4→P5 → Losa P5 · 🏗 Vaciado columnas '+(vc?fp(vc.fecha):'')+(vc&&vc.estado==='hecho'?' ✓':'')+' · 🏗 Vaciado losa '+(vl?fp(vl.fecha):'')+'</div>'+
  '<div class="sum">'+
   '<div class="sc to"><div class="l">PPC · cumplimiento</div><div class="v">'+ppc+'%</div><div class="n">del plan de 12 días</div></div>'+
   '<div class="sc ej"><div class="l">✅ Hechas</div><div class="v">'+hechos+' / '+total+'</div></div>'+
   '<div class="sc fa"><div class="l">🔵 En curso</div><div class="v">'+enc+'</div><div class="n">⚪ '+(total-hechos-enc)+' por hacer</div></div></div>'+
  '<div class="ptoggle"><button class="pv '+(planViewC==='tablero'?'on':'')+'" data-v="tablero">🗂 Tablero</button><button class="pv '+(planViewC==='cuadrillas'?'on':'')+'" data-v="cuadrillas">👷 Por cuadrillas</button></div>'+
  (planViewC==='tablero'?kanbanPlan():cuadrillasPlan());}
function goSection(sec){var b=document.getElementById('d-body');
 if(sec==='hoja'){hojaPage=0;b.innerHTML=hojaHTML();attach();}
 else if(sec==='presupuesto'){if(CUR==='weliving'){b.innerHTML=backG()+'<iframe src="presupuesto.html?t='+Date.now()+'" style="width:100%;height:calc(100vh - 120px);border:0;border-radius:14px;background:#f4f5f8"></iframe>';}else if(!CAPS.length){b.innerHTML=backG()+'<div class="canvas">💰 <b>Presupuesto por definir</b><br>Cada obra tiene sus propios capítulos e ítems. Cuando tengas el presupuesto de esta obra lo cargamos con la misma lógica que Robledo.</div>';}else{b.innerHTML=presSec();attach();recompute();}}
 else if(sec==='planner'){if(CUR==='weliving'){b.innerHTML=backG()+'<div class="canvas">📅 Cargando plan…</div>';loadPlan(function(){b.innerHTML=plannerCuadrillas();attachPlan();});}else if(!CRONO.length){b.innerHTML=backG()+'<div class="canvas">📅 <b>Last Planner por definir</b></div>';}else if(CRONO.some(function(c){return c.fecha_ini;})){b.innerHTML=plannerFechas();}else{b.innerHTML=renderPlanner();attachPlanner();}}
 else if(sec==='flujo'){b.innerHTML=flujoSec();}
 else if(sec==='informe'){b.innerHTML=backG()+'<div class="canvas">📊 <b>Informe general</b><br>Lo construimos paso a paso. Aquí irá el resumen ejecutivo: semáforo, gastado vs presupuesto, alertas.</div>';}
 window.scrollTo(0,0);}
function recompute(){var fa=faltaTotal();
 ACP.forEach(c=>{
  var sts=lineasOf(c).map(getE),b;
  if(sts.every(s=>s==='hecho'))b=['b-ej','✓ hecha'];else if(sts.every(s=>s==='sininiciar'))b=['b-pen','pendiente'];else b=['b-cur','en proceso'];
  var el=document.getElementById('bdg-'+c.num);if(el){el.className='badge '+b[0];el.textContent=b[1];}});
 var g=(id,v)=>{var e=document.getElementById(id);if(e)e.textContent=fmt(v);};
 g('sum-fa',fa);g('grp-falta',fa);g('sum-to',totalProy());}
function setE(key,st){ESTADOS[key]=st;saveEstados();
 document.querySelectorAll('.sg[data-key="'+key+'"]').forEach(b=>b.classList.toggle('on',b.dataset.st===st));recompute();}
function attach(){document.querySelectorAll('#d-body .sg').forEach(b=>b.onclick=()=>setE(b.dataset.key,b.dataset.st));document.querySelectorAll('#d-body input.ed').forEach(function(inp){inp.addEventListener('input',function(){liveUpd(inp);});});document.querySelectorAll('#d-body .pen').forEach(function(b){b.onclick=function(){toggleEdit(b.dataset.target,b);};});}
function cardsHome(){document.getElementById('obras').innerHTML=OBRAS.map(o=>'<div class="obra" onclick="verObra(\''+o.id+'\')"><div class="nm">'+o.nombre+'<span class="est">'+o.estado+'</span></div><div class="gl">Abrir dashboard</div><div class="gv" style="font-size:15px;color:#4f46e5;margin-top:8px">Ver →</div></div>').join('');}
async function verObra(id){var o=OBRAS.find(x=>x.id===id);
 document.getElementById('home').classList.add('hidden');document.getElementById('detalle').classList.remove('hidden');
 document.getElementById('d-nm').innerHTML=o.nombre+'<span class="live">● en vivo</span>';document.getElementById('d-meta').textContent='Conectando con tu hoja de gastos…';window.scrollTo(0,0);
 CUR=id;loadEstados();
 document.getElementById('d-body').innerHTML='<div class="loading">⏳ Leyendo tu hoja de gastos en vivo…</div>';
 try{
  var g=u=>fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(r=>r.json());
  var res=await Promise.all([g('gastos?obra=eq.'+id+'&select=id,etapa,fecha,descripcion,monto,nombre,mp,cuenta,factura_url,cap_num&order=fecha,id&limit=2000'),g('presupuesto_caps?obra_id=eq.'+id+'&order=orden'),g('presupuesto_items?obra_id=eq.'+id+'&order=orden'),g('cronograma?obra=eq.'+id+'&order=orden'),g('pagos_proyectados?obra=eq.'+id+'&order=fecha'),g('cuentas?deleted_at=is.null&order=orden')]);
  GAS=res[0]||[];CAPS=res[1]||[];ITEMS=res[2]||[];CRONO=res[3]||[];PAGOS=res[4]||[];CUENTAS=res[5]||[];
  capByNum={};CAPS.forEach(c=>capByNum[c.num]=c);
  ACP=(CUR==='robledo')?PEND.map(function(n){return capByNum[n];}).filter(Boolean):CAPS.slice();
  document.getElementById('d-meta').textContent=(o.avance!=null?('Avance '+o.avance+'% · '):'')+GAS.length+' gastos reales (en vivo)';
  renderGeneral();
 }catch(e){document.getElementById('d-body').innerHTML='<div class="canvas" style="border-color:#f3c0c0;color:#a32020">No se pudo conectar a tu base. Revisa el internet y vuelve a entrar.<br><span style="font-size:11px">('+e+')</span></div>';document.getElementById('d-meta').textContent='Sin conexión';}}
function verHome(){document.getElementById('detalle').classList.add('hidden');document.getElementById('home').classList.remove('hidden');}
function bootApp(){cardsHome();var _h=(location.hash||'').replace('#','');verObra(OBRAS.some(function(o){return o.id===_h;})?_h:'robledo');}

 var g=document.createElement('div');g.id='imp-gate';g.style.cssText='position:fixed;inset:0;background:linear-gradient(120deg,#4f46e5,#7c5cf0);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px';
 g.innerHTML='<div style="background:#fff;border-radius:18px;padding:30px 24px;max-width:330px;width:100%;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.25)"><div style="font-size:38px">🏛️</div><div style="font-size:19px;font-weight:800;margin:6px 0 2px;color:#1b2030">Imperio ERP</div><div style="font-size:12.5px;color:#8a90a6;margin-bottom:18px">Panel de control · acceso</div><input id="imppw" type="password" placeholder="Clave de acceso" style="box-sizing:border-box;width:100%;border:1.5px solid #e0e3ee;border-radius:12px;padding:12px;font-size:16px;text-align:center;margin-bottom:10px;font-family:inherit"><button id="impbtn" style="width:100%;background:#4f46e5;color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:800;cursor:pointer">Entrar</button><div id="imperr" style="color:#a32020;font-size:12px;margin-top:8px;height:14px"></div><a href="bitacora.html" style="display:block;margin-top:16px;font-size:13px;color:#4f46e5;text-decoration:none;font-weight:700">👷 Soy del campo → Bitácora</a></div>';
