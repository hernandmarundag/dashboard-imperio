 var body='<table><tr><th class="l">Ítem · actividad</th><th>Und</th><th>Cant.</th><th>V. Unit</th><th>Presupuesto</th><th class="l">Estado</th></tr>'+rows+'</table>';

  rowsHtml+='<tr><td class="mut" style="text-align:left">'+num+'</td><td class="l mut" style="white-space:nowrap">'+(g.fecha||'')+'</td><td class="l">'+(g.nombre||'—')+'</td><td class="l">'+(g.descripcion||'')+fac+'</td><td class="l mut" style="font-size:10.5px;white-space:nowrap">'+(g.etapa||'')+'</td><td class="l mut" style="font-size:10.5px">'+(g.mp||g.cuenta||'—')+'</td><td><b>'+fmt(g.monto)+'</b></td></tr>';
 }
 return backG()+'<div class="itemh"><span class="nm0">📒</span><h3>Hoja de gasto</h3></div>'+
  '<div class="notebar">Tus '+GAS.length+' gastos — el más reciente arriba, el primero abajo. En vivo de tu hoja de Supabase. Total gastado: <b>'+fmt(tot)+'</b></div>'+
  '<div class="dl" style="padding:0;overflow-x:auto"><table style="min-width:820px"><tr><th style="text-align:left">#</th><th class="l">Fecha</th><th class="l">Proveedor</th><th class="l">Descripción</th><th class="l">Categoría</th><th class="l">Pagado con</th><th>Monto</th></tr>'+rowsHtml+
  '<tr style="background:#f6f7fb"><td></td><td class="l"><b>'+GAS.length+'</b></td><td></td><td></td><td></td><td></td><td><b>'+fmt(tot)+'</b></td></tr></table></div>';}
function presSec(){var gastado=gastadoTotal();
 return backG()+'<div class="itemh"><span class="nm0">💰</span><h3>Presupuesto general</h3></div><div class="sum">'+
  '<div class="sc ej"><div class="l">✅ Ejecutado real</div><div class="v">'+fmt(gastado)+'</div><div class="n">de tu hoja</div></div>'+
  '<div class="sc fa"><div class="l">⚪ Falta por pagar</div><div class="v" id="sum-fa">—</div><div class="n">presupuesto pendiente</div></div>'+
  '<div class="sc to"><div class="l">📊 Total proyectado</div><div class="v" id="sum-to">—</div><div class="n">ejecutado + falta</div></div></div>'+
  '<div class="notebar">El Ejecutado sale de tu hoja. Toca el lápiz ✎ en "Falta por ejecutar" para editar Cant. o V.Unit; recalcula y guarda en tu base.</div>'+bloque1()+bloque2();}
function goSection(sec){var b=document.getElementById('d-body');
 if(sec==='hoja'){b.innerHTML=hojaHTML();attach();}
 else if(sec==='presupuesto'){b.innerHTML=presSec();attach();recompute();}
 else if(sec==='planner'){b.innerHTML=backG()+'<div class="canvas">📅 <b>Last Planner</b><br>Lo construimos paso a paso. Dime qué quieres ver aquí: programación semanal de actividades, fechas de pago, etc.</div>';}
 else if(sec==='informe'){b.innerHTML=backG()+'<div class="canvas">📊 <b>Informe general</b><br>Lo construimos paso a paso. Aquí irá el resumen ejecutivo: semáforo, gastado vs presupuesto, alertas.</div>';}
 window.scrollTo(0,0);}
function recompute(){var fa=0;
 ACP.forEach(c=>{lineasOf(c).forEach(l=>{if(getE(l)!=='hecho')fa+=l.total;});
  var sts=lineasOf(c).map(getE),b;
  if(sts.every(s=>s==='hecho'))b=['b-ej','✓ hecha'];else if(sts.every(s=>s==='sininiciar'))b=['b-pen','pendiente'];else b=['b-cur','en proceso'];
  var el=document.getElementById('bdg-'+c.num);if(el){el.className='badge '+b[0];el.textContent=b[1];}});
 var g=(id,v)=>{var e=document.getElementById(id);if(e)e.textContent=fmt(v);};
 g('sum-fa',fa);g('grp-falta',fa);g('sum-to',gastadoTotal()+fa);}
function setE(key,st){ESTADOS[key]=st;saveEstados();
 document.querySelectorAll('.sg[data-key="'+key+'"]').forEach(b=>b.classList.toggle('on',b.dataset.st===st));recompute();}
function attach(){document.querySelectorAll('#d-body .sg').forEach(b=>b.onclick=()=>setE(b.dataset.key,b.dataset.st));document.querySelectorAll('#d-body input.ed').forEach(function(inp){inp.addEventListener('input',function(){liveUpd(inp);});});document.querySelectorAll('#d-body .pen').forEach(function(b){b.onclick=function(){toggleEdit(b.dataset.target,b);};});}
function cardsHome(){document.getElementById('obras').innerHTML=OBRAS.map(o=>'<div class="obra" onclick="verObra(\''+o.id+'\')"><div class="nm">'+o.nombre+'<span class="est">'+o.estado+'</span></div><div class="gl">Abrir dashboard</div><div class="gv" style="font-size:15px;color:#4f46e5;margin-top:8px">Ver →</div></div>').join('');}
async function verObra(id){var o=OBRAS.find(x=>x.id===id);
 document.getElementById('home').classList.add('hidden');document.getElementById('detalle').classList.remove('hidden');
 document.getElementById('d-nm').innerHTML=o.nombre+'<span class="live">● en vivo</span>';document.getElementById('d-meta').textContent='Conectando con tu hoja de gastos…';window.scrollTo(0,0);
 if(id!=='robledo'){document.getElementById('d-body').innerHTML='<div class="canvas">Aquí construimos el dashboard de <b>'+o.nombre+'</b> paso a paso. Empezamos por Robledo.</div>';document.getElementById('d-meta').textContent='';return;}
 document.getElementById('d-body').innerHTML='<div class="loading">⏳ Leyendo tu hoja de gastos en vivo…</div>';
 try{
  var g=u=>fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(r=>r.json());
  var res=await Promise.all([g('gastos?obra=eq.robledo&select=etapa,fecha,descripcion,monto,nombre,mp,cuenta,factura_url&order=fecha,id&limit=2000'),g('presupuesto_caps?obra_id=eq.robledo&order=orden'),g('presupuesto_items?obra_id=eq.robledo&order=orden')]);
  GAS=res[0]||[];CAPS=res[1]||[];ITEMS=res[2]||[];
  capByNum={};CAPS.forEach(c=>capByNum[c.num]=c);
  ACP=PEND.map(n=>capByNum[n]).filter(Boolean);
  document.getElementById('d-meta').textContent='Avance '+o.avance+'% · '+GAS.length+' gastos reales (en vivo)';
  renderGeneral();
 }catch(e){document.getElementById('d-body').innerHTML='<div class="canvas" style="border-color:#f3c0c0;color:#a32020">No se pudo conectar a tu base. Revisa el internet y vuelve a entrar.<br><span style="font-size:11px">('+e+')</span></div>';document.getElementById('d-meta').textContent='Sin conexión';}}
function verHome(){document.getElementById('detalle').classList.add('hidden');document.getElementById('home').classList.remove('hidden');}
loadEstados();cardsHome();
</script></body></html>
