<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Imperio · SST y RRHH</title>
<style>
:root{--ind:#4f46e5;--pp:#7c5cf0;--ink:#1b2030;--mut:#6b7280;--line:#e6e8f0;--red:#dc2626;--grn:#16a34a;--amb:#d97706}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5fb;color:var(--ink);padding:16px}
.wrap{max-width:1000px;margin:0 auto}
.hd{text-align:center;margin:6px 0 12px}.hd h1{font-size:20px}.hd p{font-size:12px;color:var(--mut)}
.tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:5px;margin:0 auto 14px;max-width:520px}
.tab{flex:1;text-align:center;padding:9px 8px;border-radius:9px;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;border:none;background:none}
.tab.on{background:var(--ind);color:#fff}
.tab .bdg{display:inline-block;min-width:18px;padding:0 5px;margin-left:4px;border-radius:20px;background:var(--red);color:#fff;font-size:10px;line-height:18px}
.tab.on .bdg{background:rgba(255,255,255,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;display:flex;gap:10px;align-items:center;transition:.12s}
.card:hover{border-color:var(--ind);box-shadow:0 4px 14px rgba(79,70,229,.1)}
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#7c5cf0,#4f46e5);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.nm{font-weight:700;font-size:14px}.cg{font-size:12px;color:var(--mut)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px}
.ok{background:var(--grn)}.no{background:var(--red)}.wn{background:var(--amb)}
.ov{position:fixed;inset:0;background:rgba(15,16,36,.55);display:none;align-items:flex-start;justify-content:center;padding:20px;overflow:auto;z-index:50}
.ov.on{display:flex}
.modal{background:#fff;border-radius:16px;max-width:640px;width:100%;padding:18px;margin:auto}
.modal.sm{max-width:460px}
.sec{font-size:13px;font-weight:800;color:var(--ind);border-top:1px solid var(--line);padding-top:12px;margin:14px 0 6px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{margin-bottom:8px}.fg label{font-size:11px;color:var(--mut);display:block;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 12px;border:1.4px solid var(--line);border-radius:9px;font-size:16px;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--ind)}
.btn{background:var(--ind);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer}
.btn.s{background:#eef0f6;color:var(--ink);padding:7px 11px;font-size:13px}
.btn.g{background:var(--grn)}.btn.r{background:var(--red)}
.foot{display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff;margin:14px -18px 0;padding:12px 18px;border-top:1px solid var(--line);border-radius:0 0 16px 16px;z-index:3}
.mhead{position:sticky;top:0;background:#fff;margin:-18px -18px 4px;padding:14px 18px 10px;border-bottom:1px solid var(--line);border-radius:16px 16px 0 0;z-index:3;display:flex;justify-content:space-between;align-items:center}
.hist{background:#f7f8fc;border-radius:10px;padding:10px;margin-top:6px;font-size:12.5px}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #edeef4;gap:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1b2030;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;z-index:99}
.toast.on{opacity:1}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.nrow{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.alert{background:#fff;border:1px solid var(--line);border-left:4px solid var(--amb);border-radius:10px;padding:10px 13px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.alert.hi{border-left-color:var(--red)}
.chk{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.chk .ic{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.tag{font-size:11px;color:var(--mut)}
a.dl{color:var(--ind);font-weight:700;text-decoration:none;font-size:12px}
@media(max-width:560px){
 body{padding:12px}
 .frow{grid-template-columns:1fr}
 .grid{grid-template-columns:1fr}
 .tabs{max-width:100%}
 .modal{padding:16px;border-radius:16px 16px 0 0;margin:auto 0 0;min-height:92vh}
 .ov{padding:0;align-items:flex-end}
 .btn{padding:12px 16px}
 .btn.s{padding:9px 12px}
 .hrow{flex-wrap:wrap}
}
</style></head><body><div class="wrap">
<div class="hd"><h1>🦺 Imperio · SST y RRHH</h1><p>Gestión del personal en obra · fichas, novedades, alertas y documentos</p></div>
<div class="tabs">
  <button class="tab on" id="t-personal" onclick="setTab('personal')">Personal</button>
  <button class="tab" id="t-novedades" onclick="setTab('novedades')">Novedades</button>
  <button class="tab" id="t-alertas" onclick="setTab('alertas')">Alertas <span class="bdg" id="alert-bdg" style="display:none">0</span></button>
</div>
<div id="view"><p style="color:var(--mut)">Cargando…</p></div>
</div>
<div class="ov" id="ov"><div class="modal" id="mbody"></div></div>
<div class="ov" id="ov2"><div class="modal sm" id="mbody2"></div></div>
<div class="toast" id="toast"></div>
<script>
var SB='https://dghmgaaprlzpfnpsqzav.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
var H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
var emps=[],cur=null,edits={},novs=[],tab='personal';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast on';setTimeout(function(){t.className='toast';},1900);}
function ini(n){return (n||'?').trim().split(/\s+/).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();}
function hoy(){return new Date().toISOString().slice(0,10);}
function diasEntre(a,b){if(!a||!b)return null;var d=Math.round((new Date(b)-new Date(a))/86400000)+1;return d>0?d:null;}
function empById(id){return emps.find(function(x){return x.id===id;});}
function avHTML(e){return '<div class="av">'+(e.foto_url?'<img src="'+esc(e.foto_url)+'" alt="">':ini(e.nombre_completo))+'</div>';}

// ── CARGA ──
function cargar(){
  Promise.all([
    fetch(SB+'/rest/v1/empleados?activo=eq.true&order=nombre_completo',{headers:H}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/empleado_novedades?order=created_at.desc',{headers:H}).then(function(r){return r.json();})
  ]).then(function(a){
    emps=Array.isArray(a[0])?a[0]:[];
    novs=Array.isArray(a[1])?a[1]:[];
    var na=alertas().length;var bd=document.getElementById('alert-bdg');
    if(na){bd.textContent=na;bd.style.display='inline-block';}else{bd.style.display='none';}
    render();
  }).catch(function(){document.getElementById('view').innerHTML='<p style="color:var(--red)">Error de conexión.</p>';});
}
function setTab(t){tab=t;['personal','novedades','alertas'].forEach(function(x){document.getElementById('t-'+x).className='tab'+(x===t?' on':'');});render();}
function render(){var v=document.getElementById('view');
  if(tab==='personal')return renderPersonal(v);
  if(tab==='novedades')return renderNovedades(v);
  return renderAlertas(v);
}

// ── PERSONAL ──
function renderPersonal(v){
  v.innerHTML='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn" onclick="nuevo()">+ Nuevo empleado</button></div>'
   +'<div class="grid">'+emps.map(function(e){
      var arl=e.arl_activa?'<span class="dot ok"></span>ARL':'<span class="dot no"></span>sin ARL';
      var alt=e.curso_alturas?'<span class="dot ok"></span>alturas':'<span class="dot wn"></span>alturas';
      return '<div class="card" onclick="abrir(\''+e.id+'\')">'+avHTML(e)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cg">'+esc(e.cargo||'')+' · '+esc(e.obra_id||'')+'</div><div style="font-size:11px;margin-top:3px">'+arl+' &nbsp; '+alt+'</div></div></div>';
    }).join('')+'</div>'+(emps.length?'':'<p style="color:var(--mut)">Sin empleados activos.</p>');
}

// ── NOVEDADES ──
function renderNovedades(v){
  var ic={ausencia:'🚫',incapacidad:'🩹',permiso:'📄',vacaciones:'🏖'};
  v.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="tag">Ausencias, incapacidades, permisos y vacaciones del personal.</div><button class="btn" onclick="nuevaNovedad()">+ Registrar novedad</button></div>'
   +(novs.length?novs.map(function(n){
      var per=(n.fecha_inicio||'')+(n.fecha_fin&&n.fecha_fin!==n.fecha_inicio?' → '+n.fecha_fin:'');
      var rem=n.remunerada===false?'<span class="pill" style="background:#fde8e8;color:#b91c1c">no remunerada</span>':'<span class="pill" style="background:#e7f6ee;color:#15803d">remunerada</span>';
      return '<div class="nrow"><div><div class="nm">'+(ic[n.tipo]||'•')+' '+esc(n.nombre||'')+' <span class="tag">· '+esc(n.tipo||'')+'</span></div><div class="tag" style="margin-top:2px">'+esc(per)+' · '+(n.dias||'?')+' día(s)'+(n.motivo?' · '+esc(n.motivo):'')+'</div></div><div style="display:flex;align-items:center;gap:8px">'+rem+'<button class="btn s" onclick="editarNovedad('+n.id+')">✎</button><button class="btn s" style="color:var(--red)" onclick="borrarNovedad('+n.id+')">✕</button></div></div>';
    }).join(''):'<p style="color:var(--mut)">Sin novedades registradas.</p>');
}
var nvId=null;
function editarNovedad(id){var n=novs.find(function(x){return x.id===id;});if(n)nuevaNovedad(n);}
function nuevaNovedad(n){nvId=(n&&n.id)||null;
  var op=emps.map(function(e){return '<option value="'+e.id+'"'+((n&&n.empleado_id===e.id)?' selected':'')+'>'+esc(e.nombre_completo)+'</option>';}).join('');
  function to(t){return (n&&n.tipo===t)?' selected':'';}
  document.getElementById('mbody2').innerHTML=
    '<div class="mhead"><div style="font-weight:800;font-size:16px">'+(nvId?'Editar novedad':'Registrar novedad')+'</div><button class="btn s" onclick="cerrar2()">✕</button></div>'
    +'<div class="fg"><label>Empleado</label><select id="nv-emp">'+op+'</select></div>'
    +'<div class="fg"><label>Tipo</label><select id="nv-tipo"><option value="ausencia"'+to('ausencia')+'>Ausencia</option><option value="incapacidad"'+to('incapacidad')+'>Incapacidad</option><option value="permiso"'+to('permiso')+'>Permiso</option><option value="vacaciones"'+to('vacaciones')+'>Vacaciones</option></select></div>'
    +'<div class="frow"><div class="fg"><label>Desde</label><input type="date" id="nv-ini" value="'+esc((n&&n.fecha_inicio)||hoy())+'"></div><div class="fg"><label>Hasta</label><input type="date" id="nv-fin" value="'+esc((n&&n.fecha_fin)||hoy())+'"></div></div>'
    +'<div class="frow"><div class="fg"><label>Días (auto)</label><input type="number" id="nv-dias" value="'+esc(n&&n.dias!=null?n.dias:'')+'" placeholder="auto"></div><div class="fg"><label>¿Remunerada?</label><select id="nv-rem"><option value="si"'+(!n||n.remunerada!==false?' selected':'')+'>Sí</option><option value="no"'+(n&&n.remunerada===false?' selected':'')+'>No</option></select></div></div>'
    +'<div class="fg"><label>Motivo / observación</label><input id="nv-mot" value="'+esc((n&&n.motivo)||'')+'" placeholder="ej: cita médica, EPS..."></div>'
    +'<div class="foot"><button class="btn s" onclick="cerrar2()">Cancelar</button><button class="btn" onclick="guardarNovedad()">Guardar</button></div>';
  document.getElementById('ov2').className='ov on';
}
function guardarNovedad(){
  var id=document.getElementById('nv-emp').value;var e=empById(id);if(!e){toast('Elige empleado');return;}
  var ini=document.getElementById('nv-ini').value,fin=document.getElementById('nv-fin').value;
  var dias=document.getElementById('nv-dias').value||diasEntre(ini,fin)||1;
  var body={empleado_id:e.id,cedula:e.cedula,nombre:e.nombre_completo,tipo:document.getElementById('nv-tipo').value,
    fecha_inicio:ini,fecha_fin:fin,dias:dias,remunerada:document.getElementById('nv-rem').value==='si',
    motivo:document.getElementById('nv-mot').value||null};
  var url=SB+'/rest/v1/empleado_novedades'+(nvId?'?id=eq.'+nvId:'');
  var method=nvId?'PATCH':'POST';
  fetch(url,{method:method,headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(body)})
   .then(function(r){if(!r.ok)throw 0;toast(nvId?'Novedad actualizada ✓':'Novedad registrada ✓');cerrar2();cargar();setTab('novedades');}).catch(function(){toast('Error al guardar');});
}
function borrarNovedad(id){if(!confirm('¿Eliminar esta novedad?'))return;
  fetch(SB+'/rest/v1/empleado_novedades?id=eq.'+id,{method:'DELETE',headers:H})
   .then(function(r){if(!r.ok)throw 0;toast('Eliminada');cargar();setTab('novedades');}).catch(function(){toast('Error');});
}

// ── ALERTAS ──
function alertas(){var out=[];var t=new Date();var lim=new Date(t.getTime()+30*86400000).toISOString().slice(0,10);var h=hoy();
  emps.forEach(function(e){
    if(!e.arl_activa) out.push({e:e,hi:true,txt:'Sin ARL activa'});
    if(!e.eps||!e.afp) out.push({e:e,hi:true,txt:'Afiliación incompleta (EPS/AFP)'});
    if(e.examen_proximo&&e.examen_proximo<=lim) out.push({e:e,hi:e.examen_proximo<h,txt:(e.examen_proximo<h?'Examen médico VENCIDO':'Examen médico por vencer')+' ('+e.examen_proximo+')'});
    if(e.curso_alturas&&e.curso_alturas_vence&&e.curso_alturas_vence<=lim) out.push({e:e,hi:e.curso_alturas_vence<h,txt:(e.curso_alturas_vence<h?'Curso alturas VENCIDO':'Curso alturas por vencer')+' ('+e.curso_alturas_vence+')'});
    if(!e.curso_alturas) out.push({e:e,hi:false,txt:'Sin curso de trabajo en alturas'});
    if(!e.epp_entregado) out.push({e:e,hi:false,txt:'EPP / dotación sin entregar'});
    if(!e.induccion_sst_fecha) out.push({e:e,hi:false,txt:'Sin inducción SST registrada'});
  });
  return out;
}
function renderAlertas(v){
  var a=alertas();
  v.innerHTML=(a.length?'<div class="tag" style="margin-bottom:10px">'+a.length+' punto(s) por atender. Toca para abrir la ficha.</div>'
    +a.map(function(x){return '<div class="alert'+(x.hi?' hi':'')+'" onclick="abrir(\''+x.e.id+'\')"><div><div class="nm">'+esc(x.e.nombre_completo)+'</div><div class="tag">'+esc(x.txt)+'</div></div><span style="font-size:18px">'+(x.hi?'🔴':'🟠')+'</span></div>';}).join('')
    :'<div class="alert" style="border-left-color:var(--grn);cursor:default"><div><div class="nm">Todo al día ✓</div><div class="tag">No hay vencimientos ni afiliaciones pendientes.</div></div><span style="font-size:18px">🟢</span></div>');
}

// ── FICHA ──
function abrir(id){cur=empById(id);if(!cur)return;edits={};renderFicha();}
function nuevo(){cur={id:null,nombre_completo:"",cedula:"",obra_id:"weliving",activo:true};edits={};renderFicha();}
function renderFicha(){var e=cur;
  function f(l,k,t){return '<div class="fg"><label>'+l+'</label><input type="'+(t||'text')+'" value="'+esc(e[k]==null?'':e[k])+'" oninput="setv(\''+k+'\',this.value)"></div>';}
  function fcargo(){var v=e.cargo==null?'':e.cargo;var L=['Maestro de obra','Oficial','Ayudante','Obrero','Contramaestre','Residente de obra','Almacenista','Armador de hierro','Mampostero','Operario equipo','Conductor','Vigilante','Servicios generales','Ingeniero','SISO / SST','Administrativo'].slice();if(v&&L.indexOf(v)<0)L.unshift(v);return '<div class="fg"><label>Cargo</label><select onchange="setCargo(this.value)">'+'<option value="">— elegir cargo —</option>'+L.map(function(c){return '<option'+(c===v?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'<option value="__otro__">Otro (escribir)…</option></select></div>';}
  function sel(l,k){var y=e[k];return '<div class="fg"><label>'+l+'</label><select onchange="setv(\''+k+'\',this.value===\'si\')"><option value="no"'+(y?'':' selected')+'>No</option><option value="si"'+(y?' selected':'')+'>Sí</option></select></div>';}
  document.getElementById('mbody').innerHTML=
    '<div class="mhead"><div style="display:flex;gap:10px;align-items:center"><div style="position:relative">'+avHTML(e)+(e.id?'<label style="position:absolute;bottom:-4px;right:-4px;background:var(--ind);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:2px solid #fff">📷<input type="file" accept="image/*" capture="user" style="display:none" onchange="subirFotoCara(this)"></label>':'')+'</div><div><div style="font-weight:800;font-size:17px">'+esc(e.nombre_completo||'Nuevo empleado')+'</div><div class="cg">'+esc(e.cargo||'')+' · '+esc(e.obra_id||'')+'</div></div></div><button class="btn s" onclick="cerrar()">✕</button></div>'
    +(e.id?checklistIngreso(e):'')
    +'<div class="sec">👤 Datos personales</div>'
    +'<div class="frow">'+f('Nombre completo','nombre_completo')+f('Cédula','cedula')+'</div>'
    +'<div class="frow">'+f('Fecha nacimiento','fecha_nacimiento','date')+f('Grupo sanguíneo / RH','rh')+'</div>'
    +'<div class="frow">'+f('Teléfono','telefono')+f('Correo','email')+'</div>'
    +'<div class="fg"><label>Dirección</label><input value="'+esc(e.direccion||'')+'" oninput="setv(\'direccion\',this.value)"></div>'
    +'<div class="frow">'+f('Contacto emergencia','contacto_emergencia')+f('Tel. emergencia','telefono_emergencia')+'</div>'
    +'<div class="sec">💼 Vinculación</div>'
    +'<div class="frow">'+fcargo()+f('Obra','obra_id')+'</div>'
    +'<div class="frow">'+f('Fecha ingreso','fecha_ingreso','date')+f('Tipo de contrato','tipo_contrato')+'</div>'
    +'<div class="sec">🏥 Afiliaciones (seguridad social)</div>'
    +'<div class="frow">'+f('EPS','eps')+f('Afiliación EPS','fecha_afiliacion_eps','date')+'</div>'
    +'<div class="frow">'+f('AFP (pensión)','afp')+f('Afiliación AFP','fecha_afiliacion_afp','date')+'</div>'
    +'<div class="frow">'+f('ARL','arl')+f('Afiliación ARL','fecha_afiliacion_arl','date')+'</div>'
    +'<div class="frow">'+f('Clase riesgo ARL (V=construcción)','clase_riesgo_arl','number')+f('Caja compensación','caja_compensacion')+'</div>'
    +'<div class="frow">'+sel('¿ARL activa?','arl_activa')+'<div></div></div>'
    +'<div class="sec">🩺 Salud ocupacional</div>'
    +'<div class="frow">'+f('Examen ingreso','examen_ingreso_fecha','date')+f('Aptitud','examen_ingreso_aptitud')+'</div>'
    +'<div class="frow">'+f('Examen periódico','examen_periodico_fecha','date')+f('Próximo examen','examen_proximo','date')+'</div>'
    +'<div class="fg"><label>Restricciones médicas</label><input value="'+esc(e.restricciones_medicas||'')+'" oninput="setv(\'restricciones_medicas\',this.value)"></div>'
    +'<div class="sec">🪜 Alturas · Inducción · Dotación</div>'
    +'<div class="frow">'+sel('¿Curso trabajo en alturas?','curso_alturas')+f('Vence curso alturas','curso_alturas_vence','date')+'</div>'
    +'<div class="frow">'+f('Inducción SST (fecha)','induccion_sst_fecha','date')+sel('¿EPP/dotación entregada?','epp_entregado')+'</div>'
    +'<div class="frow">'+f('Talla camisa','talla_camisa')+f('Talla pantalón','talla_pantalon')+'</div>'
    +'<div class="frow">'+f('Talla calzado','talla_calzado')+'<div></div></div>'
    +(e.id?'<div class="sec">📎 Documentos (imagen o PDF)</div>'
      +'<div id="docbox" class="hist">Cargando documentos…</div>':'')
    +(e.id?'<div class="sec">📋 Historial SST (trazabilidad)</div>'
      +'<div class="frow"><button class="btn s" onclick="addHist(\'examen\')">+ Examen médico</button><button class="btn s" onclick="addHist(\'capacitacion\')">+ Capacitación</button></div>'
      +'<div class="frow" style="margin-top:6px"><button class="btn s" onclick="addHist(\'epp\')">+ Entrega EPP</button><div></div></div>'
      +'<div id="histbox" class="hist">Cargando historial…</div>':'')
    +'<div class="foot">'+(e.id?'<button class="btn r" style="margin-right:auto" onclick="registrarRetiro()">Registrar retiro</button>':'')+'<button class="btn s" onclick="cerrar()">Cancelar</button><button class="btn" onclick="guardar()">'+(e.id?'Guardar ficha':'Crear empleado')+'</button></div>';
  document.getElementById('ov').className='ov on';if(e.id){cargarHist(e);cargarDocs(e);}
}
function checklistIngreso(e){
  var items=[['EPS',!!e.eps],['AFP (pensión)',!!e.afp],['ARL activa',!!e.arl_activa],['Examen de ingreso',!!e.examen_ingreso_fecha],['Inducción SST',!!e.induccion_sst_fecha],['Curso alturas',!!e.curso_alturas],['EPP entregado',!!e.epp_entregado],['Contrato',false,'contrato']];
  var faltan=items.filter(function(x){return !x[1];}).length;
  var rows=items.map(function(x){return '<div class="chk"><span class="ic"'+(x[2]?' id="chk-'+x[2]+'"':'')+' style="background:'+(x[1]?'var(--grn)':'#cbd0dc')+'">'+(x[1]?'✓':'·')+'</span>'+esc(x[0])+'</div>';});
  return '<div class="sec">✅ Checklist de ingreso'+(faltan?' <span class="pill" style="background:#fde8e8;color:#b91c1c">'+faltan+' pendiente(s)</span>':' <span class="pill" style="background:#e7f6ee;color:#15803d">completo</span>')+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">'+rows.join('')+'</div>'
    +'<div class="tag" style="margin-top:4px">El contrato se marca al subirlo en Documentos.</div>';
}
function subirFotoCara(inp){var file=inp.files[0];if(!file||!cur||!cur.id)return;var e=cur;
  var ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  var path=(e.cedula||e.id)+'/cara_'+Date.now()+'.'+ext;
  toast('Subiendo foto…');
  fetch(SB+'/storage/v1/object/avatars/'+path,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':file.type||'image/jpeg'},body:file})
   .then(function(r){if(!r.ok)throw 0;var url=SB+'/storage/v1/object/public/avatars/'+path;
     return fetch(SB+'/rest/v1/empleados?id=eq.'+e.id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify({foto_url:url})}).then(function(r2){if(!r2.ok)throw 0;e.foto_url=url;var ix=emps.findIndex(function(x){return x.id===e.id;});if(ix>=0)emps[ix].foto_url=url;toast('Foto lista ✓');renderFicha();});})
   .catch(function(){toast('Error al subir foto');});
}
function setv(k,v){edits[k]=(v===''?null:v);cur[k]=v;}
function setCargo(val){if(val==='__otro__'){var c=prompt('Escribe el cargo:',cur.cargo||'');if(c===null){renderFicha();return;}setv('cargo',c);renderFicha();return;}setv('cargo',val);}
function cerrar(){document.getElementById('ov').className='ov';}
function cerrar2(){document.getElementById('ov2').className='ov';}
function guardar(){if(!cur)return;
  if(cur.id){
    if(!Object.keys(edits).length){cerrar();return;}
    fetch(SB+'/rest/v1/empleados?id=eq.'+cur.id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(edits)})
     .then(function(r){if(!r.ok)throw 0;toast('Ficha guardada ✓');cerrar();cargar();}).catch(function(){toast('Error al guardar');});
  } else {
    var body=Object.assign({activo:true,empresa_id:'230ab43f-0f77-4f84-94bf-f9bb925b384b'},edits);
    if(!body.nombre_completo||!body.cedula){toast('Falta nombre y cédula');return;}
    fetch(SB+'/rest/v1/empleados',{method:'POST',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(body)})
     .then(function(r){if(!r.ok)throw 0;toast('Empleado creado ✓');cerrar();cargar();}).catch(function(){toast('Error al crear');});
  }
}
function registrarRetiro(){if(!cur||!cur.id)return;
  var m=prompt('Motivo del retiro (renuncia / terminación / fin de obra...):','');if(m===null)return;
  var f=prompt('Fecha de retiro (AAAA-MM-DD):',hoy());if(f===null)return;
  if(!confirm('¿Registrar retiro de '+cur.nombre_completo+'? Deja de aparecer en el personal activo (se conserva el histórico).'))return;
  fetch(SB+'/rest/v1/empleados?id=eq.'+cur.id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify({activo:false,fecha_retiro:f,motivo_retiro:m})})
   .then(function(r){if(!r.ok)throw 0;toast('Retiro registrado');cerrar();cargar();}).catch(function(){toast('Error');});
}

// ── DOCUMENTOS (casillas por tipo) ──
var DOC_SLOTS=[
  ['cedula','🪪 Cédula'],
  ['contrato','📄 Contrato'],
  ['examen_ingreso','🩺 Examen de ingreso'],
  ['examen_periodico','🩺 Examen periódico'],
  ['curso_alturas','🪜 Curso de alturas'],
  ['afiliaciones','🏥 Afiliaciones (EPS/AFP/ARL)'],
  ['hoja_vida','📋 Hoja de vida']
];
function cargarDocs(e){var box=document.getElementById('docbox');if(!box)return;
  fetch(SB+'/rest/v1/empleado_documentos?empleado_id=eq.'+e.id+'&order=created_at.desc',{headers:H}).then(function(r){return r.json();}).then(function(rows){
    rows=Array.isArray(rows)?rows:[];
    var byTipo={};rows.forEach(function(d){(byTipo[d.tipo]=byTipo[d.tipo]||[]).push(d);});
    // casillas fijas
    var html=DOC_SLOTS.map(function(s){var k=s[0],lbl=s[1];var docs=byTipo[k]||[];
      var right=docs.length?docs.map(function(d){return '<a class="dl" href="'+esc(d.url)+'" target="_blank">Ver</a> <button class="btn s" style="color:var(--red);padding:3px 8px" onclick="borrarDoc('+d.id+')">✕</button>';}).join(' '):'';
      var estado=docs.length?'<span class="pill" style="background:#e7f6ee;color:#15803d">cargado</span>':'<span class="pill" style="background:#f1f2f6;color:#888">pendiente</span>';
      return '<div class="hrow"><span>'+lbl+' '+estado+'</span><span style="display:flex;gap:6px;align-items:center">'+right
        +'<label class="btn s" style="cursor:pointer;padding:6px 10px">📷 Foto<input type="file" accept="image/*" capture="environment" style="display:none" onchange="subirDoc(this,\''+k+'\')"></label>'
        +'<label class="btn s" style="cursor:pointer;padding:6px 10px">📎 Archivo<input type="file" accept="image/*,application/pdf" style="display:none" onchange="subirDoc(this,\''+k+'\')"></label></span></div>';
    }).join('');
    // otros documentos (tipos fuera de las casillas)
    var claves=DOC_SLOTS.map(function(s){return s[0];});
    var otros=rows.filter(function(d){return claves.indexOf(d.tipo)<0;});
    html+=otros.map(function(d){return '<div class="hrow"><span>📎 '+esc(d.nombre||d.tipo||'otro')+'</span><span style="display:flex;gap:8px;align-items:center"><a class="dl" href="'+esc(d.url)+'" target="_blank">Ver</a><button class="btn s" style="color:var(--red);padding:3px 8px" onclick="borrarDoc('+d.id+')">✕</button></span></div>';}).join('');
    html+='<div class="hrow" style="border:0"><span class="tag">Otro documento</span><span style="display:flex;gap:6px"><label class="btn s" style="cursor:pointer;padding:6px 10px">📷 Foto<input type="file" accept="image/*" capture="environment" style="display:none" onchange="subirDoc(this,\'otro\')"></label><label class="btn s" style="cursor:pointer;padding:6px 10px">📎 Archivo<input type="file" accept="image/*,application/pdf" style="display:none" onchange="subirDoc(this,\'otro\')"></label></span></div>';
    box.innerHTML=html;
    // marca el contrato en el checklist si existe
    var ci=document.getElementById('chk-contrato');if(ci){var ok=(byTipo['contrato']||[]).length>0;ci.style.background=ok?'var(--grn)':'#cbd0dc';ci.textContent=ok?'✓':'·';}
  }).catch(function(){box.innerHTML='<span style="color:var(--red)">Error al cargar documentos.</span>';});
}
function subirDoc(inp,tipo){var file=inp.files[0];if(!file||!cur||!cur.id)return;var e=cur;
  var safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  var path=(e.cedula||e.id)+'/'+tipo+'_'+Date.now()+'_'+safe;
  toast('Subiendo…');
  fetch(SB+'/storage/v1/object/documentos/'+path,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':file.type||'application/octet-stream'},body:file})
   .then(function(r){if(!r.ok)throw 0;var url=SB+'/storage/v1/object/public/documentos/'+path;
     return fetch(SB+'/rest/v1/empleado_documentos',{method:'POST',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify({empleado_id:e.id,cedula:e.cedula,tipo:tipo,nombre:file.name,url:url})});})
   .then(function(r){if(!r.ok)throw 0;toast('Documento subido ✓');cargarDocs(e);}).catch(function(){toast('Error al subir');});
}
function borrarDoc(id){if(!confirm('¿Eliminar este documento del registro?'))return;
  fetch(SB+'/rest/v1/empleado_documentos?id=eq.'+id,{method:'DELETE',headers:H})
   .then(function(r){if(!r.ok)throw 0;toast('Eliminado');cargarDocs(cur);}).catch(function(){toast('Error');});
}

// ── HISTORIAL SST ──
function cargarHist(e){var box=document.getElementById('histbox');if(!box)return;
  Promise.all([
    fetch(SB+'/rest/v1/empleado_examenes?empleado_id=eq.'+e.id+'&order=fecha.desc',{headers:H}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/empleado_capacitaciones?empleado_id=eq.'+e.id+'&order=fecha.desc',{headers:H}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/empleado_epp?empleado_id=eq.'+e.id+'&order=fecha.desc',{headers:H}).then(function(r){return r.json();})
  ]).then(function(a){var ex=a[0]||[],cap=a[1]||[],epp=a[2]||[];var h='';
    if(ex.length)h+='<div style="font-weight:700;margin:2px 0">Exámenes</div>'+ex.map(function(x){return '<div class="hrow"><span>'+esc(x.tipo||'')+' · '+esc(x.fecha||'')+'</span><span class="badge" style="background:#eef;color:#4f46e5">'+esc(x.aptitud||'')+'</span></div>';}).join('');
    if(cap.length)h+='<div style="font-weight:700;margin:6px 0 2px">Capacitaciones</div>'+cap.map(function(x){return '<div class="hrow"><span>'+esc(x.tema||'')+' · '+esc(x.fecha||'')+'</span><span>'+(x.vence?'vence '+esc(x.vence):'')+'</span></div>';}).join('');
    if(epp.length)h+='<div style="font-weight:700;margin:6px 0 2px">Entregas EPP</div>'+epp.map(function(x){return '<div class="hrow"><span>'+esc(x.fecha||'')+'</span><span>'+esc(x.elementos||'')+'</span></div>';}).join('');
    box.innerHTML=h||'<span style="color:var(--mut)">Sin registros. Usa los botones de arriba para agregar.</span>';
  }).catch(function(){box.innerHTML='<span style="color:var(--red)">Error al cargar historial.</span>';});
}
function addHist(tipo){if(!cur)return;var e=cur;var body,url;
  if(tipo==='examen'){var t=prompt('Tipo (ingreso/periodico/retiro):','periodico');if(t===null)return;var fe=prompt('Fecha (AAAA-MM-DD):',hoy());var ap=prompt('Aptitud:','apto');body={empleado_id:e.id,cedula:e.cedula,tipo:t,fecha:fe,aptitud:ap};url='empleado_examenes';}
  else if(tipo==='capacitacion'){var tm=prompt('Tema (ej: Trabajo en alturas):','');if(tm===null)return;var fe2=prompt('Fecha (AAAA-MM-DD):',hoy());var vn=prompt('Vence (AAAA-MM-DD, opcional):','');body={empleado_id:e.id,cedula:e.cedula,tema:tm,fecha:fe2,vence:vn||null};url='empleado_capacitaciones';}
  else{var el=prompt('Elementos entregados (casco, botas, arnés...):','');if(el===null)return;var fe3=prompt('Fecha (AAAA-MM-DD):',hoy());body={empleado_id:e.id,cedula:e.cedula,elementos:el,fecha:fe3};url='empleado_epp';}
  fetch(SB+'/rest/v1/'+url,{method:'POST',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(body)})
   .then(function(r){if(!r.ok)throw 0;toast('Registro agregado ✓');cargarHist(e);}).catch(function(){toast('Error al agregar');});
}
cargar();
</script></body></html>
