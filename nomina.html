<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Imperio · Nómina</title>
<style>
:root{--bg:#f5f4f0;--card:#fff;--ink:#1b1b19;--mut:#7a786f;--line:#e7e4dc;--acc:#5b5bd6;--accbg:#eeeefb;--grn:#1d8a5f;--amb:#c98a12;--red:#c23b2e}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
.wrap{max-width:1120px;margin:0 auto;padding:18px}
h1{font-size:19px;font-weight:700;margin:0}
.sub{font-size:12px;color:var(--mut);margin-top:2px}
.top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.cyc{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,input{height:36px;border:1px solid var(--line);border-radius:9px;padding:0 10px;font-size:14px;background:var(--card);font-family:inherit;color:var(--ink)}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:9px 15px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-size:13.5px;font-weight:500;color:var(--mut);cursor:pointer}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#999;font-size:11px;font-weight:600;padding:9px 10px;background:#fafafa;white-space:nowrap}
td{padding:8px 10px;border-top:1px solid #f0efe9;vertical-align:middle}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.inp{width:66px;height:30px;border:1px solid var(--line);border-radius:7px;padding:0 7px;font-size:13px;text-align:right;font-family:inherit}
.nm{font-weight:600}.cargo{font-size:11px;color:var(--mut)}
.tot{font-weight:700}
.av{width:38px;height:38px;border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex:0 0 auto}
.emprow{display:flex;align-items:center;gap:10px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px}
.kpi .l{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:5px}
.kpi .v{font-size:21px;font-weight:700;letter-spacing:-.02em}
.btn{height:38px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:14px;font-weight:600;padding:0 16px;cursor:pointer}
.btn.g{background:var(--grn)}.btn.s{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn:active{transform:scale(.99)}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill-pag{background:#e1f5ee;color:#0f6e56}
.hint{font-size:12px;color:var(--mut);margin:4px 2px 12px;line-height:1.5}
.foot{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
.day{width:24px;height:26px;border-radius:6px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;background:#f3faf6;color:#0f6e56;user-select:none}
.day.falta{background:#fceceb;color:var(--red);border-color:#f3c9c6}
.day.inc{background:#fbf1dd;color:var(--amb);border-color:#eeddb4}
.daystrip{display:flex;gap:3px;flex-wrap:wrap;max-width:430px}
.grid-emp{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.empcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.empcard:hover{border-color:var(--acc)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:20;overflow:auto;padding:24px 12px}
.ov.on{display:flex}
.modal{background:var(--card);border-radius:16px;max-width:640px;width:100%;padding:20px}
.fg{margin-bottom:10px}.fg label{font-size:11px;color:var(--mut);display:block;margin-bottom:3px}
.fg input,.fg select{width:100%}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:30}
.toast.on{opacity:1}
.obratag{font-size:10px;color:var(--mut);background:#f1efe8;padding:2px 7px;border-radius:12px}
.leg{font-size:11px;color:var(--mut);display:flex;gap:12px;margin:2px 2px 10px}
.leg span{display:inline-flex;align-items:center;gap:4px}
.dot{width:12px;height:12px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Nómina · Imperio</h1><div class="sub" id="sub">Cargando…</div></div>
    <div class="cyc">
      <input type="month" id="mes"/>
      <select id="quin"><option value="1">1ª quincena (1–15)</option><option value="2">2ª quincena (16–fin)</option></select>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="nomina" onclick="setTab('nomina')">🧮 Nómina</div>
    <div class="tab" data-t="pago" onclick="setTab('pago')">💸 Pago</div>
    <div class="tab" data-t="liq" onclick="setTab('liq')">📅 Liquidación</div>
    <div class="tab" data-t="prest" onclick="setTab('prest')">🛡 Seguridad social</div>
    <div class="tab" data-t="empleados" onclick="setTab('empleados')">👥 Empleados</div>
  </div>
  <div id="view"></div>
</div>
<div class="ov" id="ov-ficha"><div class="modal" id="ficha-body"></div></div>
<div class="toast" id="toast"></div>
<script>
var SB="https://dghmgaaprlzpfnpsqzav.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k";
var H={apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"};
var R={ces:0.0833,intces:0.01,prima:0.0833,vac:0.0417,salud:0.085,pension:0.12,arl:0.0696,caja:0.04};
var emps=[], nom=[], tab="nomina", liq={}, att={};
var COLORS=['#5b5bd6','#1d8a5f','#c98a12','#c23b2e','#2563eb','#7c3aed','#0f766e','#b45309'];

function fmt(n){return "$"+Math.round(n||0).toLocaleString("es-CO");}
function num(v){return parseFloat(v)||0;}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast on";setTimeout(function(){t.className="toast";},2400);}
function initials(n){var p=(n||'').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'');}
function colorFor(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))>>>0;return COLORS[h%COLORS.length];}
function avatar(e,size){var sz=size||38;var st='width:'+sz+'px;height:'+sz+'px;font-size:'+(sz*0.37)+'px';
  if(e.foto_url) return '<img class="av" style="'+st+'" src="'+esc(e.foto_url)+'" alt="">';
  return '<span class="av" style="'+st+';background:'+colorFor(e.cedula||e.nombre_completo)+'">'+esc(initials(e.nombre_completo).toUpperCase())+'</span>';}

// ── Ciclo ──
function cycle(){
  var m=document.getElementById("mes").value; if(!m){var d=new Date();m=d.toISOString().slice(0,7);}
  var y=+m.split('-')[0], mo=+m.split('-')[1];
  var q=document.getElementById("quin").value;
  var d1=q==='1'?1:16, d2=q==='1'?15:new Date(y,mo,0).getDate();
  var days=[]; for(var i=d1;i<=d2;i++){days.push(y+'-'+String(mo).padStart(2,'0')+'-'+String(i).padStart(2,'0'));}
  var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var label=d1+'-'+d2+' '+meses[mo-1]+' '+y;
  return {y:y,mo:mo,d1:d1,d2:d2,days:days,label:label,desde:days[0],hasta:days[days.length-1]};
}

function diasTrab(ced,cy){var ex=att[ced]||{};var n=cy.days.length;cy.days.forEach(function(d){if(ex[d]==='falta'||ex[d]==='inc')n--;});return n;}
function pago(e,dias,hed,hen,prest){
  var b=+e.salario_basico||0, bon=+e.bonificacion||0;
  var devB=Math.round(b/30*dias), devBon=Math.round(bon/30*dias);
  var vh=(b+bon)/240;
  var vHed=Math.round(hed*vh*1.25), vHen=Math.round(hen*vh*1.75);
  return {devB:devB,devBon:devBon,hed:vHed,hen:vHen,total:devB+devBon+vHed+vHen-prest};
}

function setTab(t){tab=t;document.querySelectorAll('.tab').forEach(function(x){x.className='tab'+(x.dataset.t===t?' on':'');});render();}

function cargar(){
  document.getElementById("sub").textContent="Cargando…";
  var cy=cycle();
  Promise.all([
    fetch(SB+"/rest/v1/empleados?select=*&order=obra_id,nombre_completo",{headers:H}).then(function(r){return r.json();}),
    fetch(SB+"/rest/v1/nomina?quincena=eq."+encodeURIComponent(cy.label)+"&order=valor.desc",{headers:H}).then(function(r){return r.json();}),
    fetch(SB+"/rest/v1/asistencia?quincena=eq."+encodeURIComponent(cy.label)+"&select=cedula,fecha,estado",{headers:H}).then(function(r){return r.json();})
  ]).then(function(res){
    emps=(Array.isArray(res[0])?res[0]:[]).filter(function(e){return e.activo!==false;});
    nom=Array.isArray(res[1])?res[1]:[];
    att={};(Array.isArray(res[2])?res[2]:[]).forEach(function(a){if(!att[a.cedula])att[a.cedula]={};att[a.cedula][a.fecha]=a.estado;});
    liq={};
    emps.forEach(function(e){var n=nom.find(function(x){return x.cedula===e.cedula;});
      liq[e.cedula]={hed:n?(+n.he_diurna||0):0, hen:n?(+n.he_nocturna||0):0, prest:n?(+n.prestamo||0):0};});
    document.getElementById("sub").textContent=emps.length+" empleados · ciclo "+cy.label+" · se paga el 15 y el 30";
    render();
  }).catch(function(){document.getElementById("sub").textContent="Error de conexión";});
}

function render(){var v=document.getElementById("view");
  if(tab==="nomina")return renderNomina(v);
  if(tab==="pago")return renderPago(v);
  if(tab==="liq")return renderLiq(v);
  if(tab==="prest")return renderPrest(v);
  if(tab==="empleados")return renderEmpleados(v);
}

// ── NÓMINA + ASISTENCIA ──
function renderNomina(v){
  var cy=cycle(); var totNet=0;
  var rows=emps.map(function(e){
    var l=liq[e.cedula]||{hed:0,hen:0,prest:0};
    var dias=diasTrab(e.cedula,cy); var p=pago(e,dias,l.hed,l.hen,l.prest); totNet+=p.total;
    var strip=cy.days.map(function(d){var st=(att[e.cedula]||{})[d];var cls=st==='falta'?'falta':st==='inc'?'inc':'';var lab=st==='falta'?'F':st==='inc'?'I':(+d.split('-')[2]);
      return '<div class="day '+cls+'" title="'+d+'" onclick="toggleDay(\''+e.cedula+'\',\''+d+'\')">'+lab+'</div>';}).join('');
    return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+' · <span class="obratag">'+esc(e.obra_id||'')+'</span></div></div></div></td>'
      +'<td><div class="daystrip">'+strip+'</div></td>'
      +'<td class="r" style="font-weight:700" id="d-'+e.cedula+'">'+dias+'</td>'
      +'<td class="r"><input class="inp" type="number" step="0.5" value="'+l.hed+'" oninput="upd(\''+e.cedula+'\',\'hed\',this.value)"></td>'
      +'<td class="r"><input class="inp" type="number" step="0.5" value="'+l.hen+'" oninput="upd(\''+e.cedula+'\',\'hen\',this.value)"></td>'
      +'<td class="r"><input class="inp" type="number" value="'+l.prest+'" oninput="upd(\''+e.cedula+'\',\'prest\',this.value)"></td>'
      +'<td class="r tot" id="tot-'+e.cedula+'">'+fmt(p.total)+'</td></tr>';
  }).join("");
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Total a pagar (quincena)</div><div class="v" id="k-net">'+fmt(totNet)+'</div></div>'
    +'<div class="kpi"><div class="l">Ciclo</div><div class="v" style="font-size:16px">'+cy.label+'</div><div style="font-size:10px;color:var(--mut)">pago el 15 y el 30</div></div>'
    +'<div class="kpi"><div class="l">Empleados</div><div class="v">'+emps.length+'</div></div></div>'
    +'<div class="leg"><span><i class="dot" style="background:#8fd8bd"></i>asistió</span><span><i class="dot" style="background:#f3c9c6"></i>falta</span><span><i class="dot" style="background:#eeddb4"></i>incapacidad</span> — toca cada día para cambiar</div>'
    +'<div class="hint">Marca la asistencia día por día; los días se suman solos. Horas extra sobre básico+bonificación: diurna ×1,25, nocturna ×1,75. El préstamo se descuenta.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th>Asistencia del ciclo</th><th class="r">Días</th><th class="r">HE día</th><th class="r">HE noche</th><th class="r">Préstamo</th><th class="r">A pagar</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div class="foot"><button class="btn g" onclick="guardarNomina()">💾 Guardar nómina del ciclo</button></div>';
}
function toggleDay(ced,d){if(!att[ced])att[ced]={};var cur=att[ced][d];
  var nx=cur===undefined?'falta':cur==='falta'?'inc':undefined;
  if(nx===undefined)delete att[ced][d];else att[ced][d]=nx;
  recalcRow(ced);
}
function recalcRow(ced){var cy=cycle();var e=emps.find(function(x){return x.cedula===ced;});var l=liq[ced]||{hed:0,hen:0,prest:0};
  var dias=diasTrab(ced,cy);var p=pago(e,dias,l.hed,l.hen,l.prest);
  var dc=document.getElementById('d-'+ced);if(dc)dc.textContent=dias;
  var tc=document.getElementById('tot-'+ced);if(tc)tc.textContent=fmt(p.total);
  // repintar strip de ese empleado
  renderNomina(document.getElementById('view'));
}
function upd(ced,c,val){if(!liq[ced])liq[ced]={hed:0,hen:0,prest:0};liq[ced][c]=num(val);
  var cy=cycle();var e=emps.find(function(x){return x.cedula===ced;});var l=liq[ced];var dias=diasTrab(ced,cy);var p=pago(e,dias,l.hed,l.hen,l.prest);
  var tc=document.getElementById('tot-'+ced);if(tc)tc.textContent=fmt(p.total);
  var tot=0;emps.forEach(function(x){var ll=liq[x.cedula]||{hed:0,hen:0,prest:0};tot+=pago(x,diasTrab(x.cedula,cy),ll.hed,ll.hen,ll.prest).total;});
  document.getElementById('k-net').textContent=fmt(tot);
}
function guardarNomina(){
  var cy=cycle();
  var nomOps=emps.map(function(e){
    var l=liq[e.cedula]||{hed:0,hen:0,prest:0};var dias=diasTrab(e.cedula,cy);var p=pago(e,dias,l.hed,l.hen,l.prest);
    var body={quincena:cy.label,nombre:e.nombre_completo,cedula:e.cedula,proyecto:(e.obra_id||'').toUpperCase(),area:e.cargo,cargo:e.cargo,
      salario_mensual:e.salario_basico,dias:dias,he_diurna:l.hed,he_nocturna:l.hen,horas_extra:(l.hed+l.hen),prestamo:l.prest,valor:p.total,
      metodo:e.metodo_pago,cuenta:e.cuenta_pago,pagado:false,estado:'liquidada'};
    var ex=nom.find(function(x){return x.cedula===e.cedula;});
    if(ex)return fetch(SB+"/rest/v1/nomina?id=eq."+ex.id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(body)});
    return fetch(SB+"/rest/v1/nomina",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(body)});
  });
  // asistencia: borrar ciclo y reinsertar excepciones
  var asisRows=[];Object.keys(att).forEach(function(ced){Object.keys(att[ced]).forEach(function(d){var e=emps.find(function(x){return x.cedula===ced;});asisRows.push({cedula:ced,nombre:e?e.nombre_completo:'',fecha:d,quincena:cy.label,obra_id:e?e.obra_id:'',estado:att[ced][d]==='inc'?'incapacidad':'falta',dias:1});});});
  fetch(SB+"/rest/v1/asistencia?quincena=eq."+encodeURIComponent(cy.label),{method:"DELETE",headers:H})
    .then(function(){return asisRows.length?fetch(SB+"/rest/v1/asistencia",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(asisRows)}):null;})
    .then(function(){return Promise.all(nomOps);})
    .then(function(){toast("Nómina y asistencia guardadas ✓");cargar();})
    .catch(function(){toast("Error al guardar");});
}

// ── PAGO ──
function renderPago(v){
  if(!nom.length){v.innerHTML='<div class="card"><div class="hint" style="padding:16px">Este ciclo aún no tiene nómina guardada. Ve a Nómina, marca la asistencia y guarda.</div></div>';return;}
  var total=nom.reduce(function(s,n){return s+(+n.valor||0);},0),pag=nom.filter(function(n){return n.pagado;}).reduce(function(s,n){return s+(+n.valor||0);},0);
  var rows=nom.map(function(n){var e=emps.find(function(x){return x.cedula===n.cedula;})||{nombre_completo:n.nombre,cedula:n.cedula};
    return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(n.nombre)+'</div><div class="cargo">'+esc(n.cargo||'')+'</div></div></div></td>'
      +'<td><div>'+esc(n.metodo||'')+'</div><div style="font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums">'+esc(n.cuenta||'')+'</div></td>'
      +'<td class="r tot">'+fmt(n.valor)+'</td>'
      +'<td class="r">'+(n.pagado?'<span class="badge pill-pag">Pagado</span>':'<button class="btn g" style="height:30px;padding:0 11px;font-size:12px" onclick="marcarPag('+n.id+')">Pagar</button>')+'</td></tr>';}).join("");
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Total ciclo</div><div class="v">'+fmt(total)+'</div></div>'
    +'<div class="kpi"><div class="l">Pagado</div><div class="v" style="color:var(--grn)">'+fmt(pag)+'</div></div>'
    +'<div class="kpi"><div class="l">Falta pagar</div><div class="v" style="color:var(--red)">'+fmt(total-pag)+'</div></div></div>'
    +'<div class="hint">Para la tesorera: a quién, cuánto y a qué cuenta. Marca cada pago al hacerlo.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th>Pago a</th><th class="r">Valor</th><th class="r">Estado</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function marcarPag(id){fetch(SB+"/rest/v1/nomina?id=eq."+id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify({pagado:true,fecha_pago:new Date().toISOString().slice(0,10)})})
  .then(function(r){if(!r.ok)throw 0;var n=nom.find(function(x){return x.id===id;});if(n)n.pagado=true;toast("Pagado ✓");render();}).catch(function(){toast("Error");});}

// ── LIQUIDACIÓN ──
function renderLiq(v){
  var hoy=new Date();var totLiq=0;
  var rows=emps.map(function(e){
    var base=(+e.salario_basico||0)+(+e.bonificacion||0);
    if(!e.fecha_ingreso) return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+'</div></div></div></td><td colspan="6" style="color:var(--amb);font-size:12px">Falta fecha de ingreso — edítala en la ficha del empleado</td></tr>';
    var ing=new Date(e.fecha_ingreso+'T12:00:00');var dias=Math.max(0,Math.round((hoy-ing)/86400000));
    var ces=Math.round(base*dias/360);var intc=Math.round(ces*0.12);var prima=Math.round(base*dias/360);var vac=Math.round(base*dias/720);
    var tl=ces+intc+prima+vac;totLiq+=tl;
    return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">desde '+esc(e.fecha_ingreso)+' · '+dias+' días</div></div></div></td>'
      +'<td class="r">'+fmt(ces)+'</td><td class="r">'+fmt(intc)+'</td><td class="r">'+fmt(prima)+'</td><td class="r">'+fmt(vac)+'</td><td class="r tot">'+fmt(tl)+'</td></tr>';
  }).join("");
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Liquidación acumulada total</div><div class="v" style="color:var(--amb)">'+fmt(totLiq)+'</div><div style="font-size:10px;color:var(--mut)">si se liquidara hoy</div></div></div>'
    +'<div class="hint">Lo que se le debe a cada empleado por prestaciones acumuladas, según su fecha de ingreso y días laborados. <strong>No se paga cada quincena</strong>; se acumula hasta la liquidación. Base = básico + bonificación.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th class="r">Cesantías</th><th class="r">Int. cesantías</th><th class="r">Prima</th><th class="r">Vacaciones</th><th class="r">Total</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// ── SEGURIDAD SOCIAL ──
function renderPrest(v){
  var sumAp=0,sumPr=0,sumBas=0;
  var rows=emps.map(function(e){var b=+e.salario_basico||0;sumBas+=b;
    var salud=Math.round(b*R.salud),pension=Math.round(b*R.pension),arl=Math.round(b*R.arl),caja=Math.round(b*R.caja);var ap=salud+pension+arl+caja;
    var pr=Math.round(b*(R.ces+R.intces+R.prima+R.vac));sumAp+=ap;sumPr+=pr;
    return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+'</div></div></div></td>'
      +'<td class="r">'+fmt(b)+'</td><td class="r">'+fmt(salud)+'</td><td class="r">'+fmt(pension)+'</td><td class="r">'+fmt(arl)+'</td><td class="r">'+fmt(caja)+'</td><td class="r tot">'+fmt(ap)+'</td><td class="r" style="color:var(--amb)">'+fmt(pr)+'</td></tr>';}).join("");
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Aportes / mes (PILA)</div><div class="v">'+fmt(sumAp)+'</div><div style="font-size:10px;color:var(--mut)">salud+pensión+ARL+caja</div></div>'
    +'<div class="kpi"><div class="l">Provisión prestaciones / mes</div><div class="v" style="color:var(--amb)">'+fmt(sumPr)+'</div><div style="font-size:10px;color:var(--mut)">se acumula</div></div>'
    +'<div class="kpi"><div class="l">Costo real / mes (aprox)</div><div class="v">'+fmt(sumBas+emps.reduce(function(s,e){return s+(+e.bonificacion||0);},0)+sumAp+sumPr)+'</div></div></div>'
    +'<div class="hint">Aportes mensuales a la PILA y provisión de prestaciones (sobre el básico). ARL clase V (construcción). No se pagan al trabajador cada quincena.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th class="r">Básico</th><th class="r">Salud</th><th class="r">Pensión</th><th class="r">ARL</th><th class="r">Caja</th><th class="r">Aportes</th><th class="r">Prest.</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// ── EMPLEADOS + FICHA ──
function renderEmpleados(v){
  v.innerHTML='<div class="hint">Toca un empleado para abrir su ficha técnica: foto, datos demográficos, afiliaciones y salario.</div>'
    +'<div class="grid-emp">'+emps.map(function(e){return '<div class="empcard" onclick="openFicha(\''+e.id+'\')">'+avatar(e,46)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+'</div><div style="margin-top:3px"><span class="obratag">'+esc(e.obra_id||'')+'</span></div></div></div>';}).join("")+'</div>';
}
var fichaId=null, fichaEdits={};
function openFicha(id){var e=emps.find(function(x){return x.id===id;});if(!e)return;fichaId=id;fichaEdits={};
  function f(lbl,key,type){var val=e[key]==null?'':e[key];return '<div class="fg"><label>'+lbl+'</label><input type="'+(type||'text')+'" value="'+esc(val)+'" oninput="fichaSet(\''+key+'\',this.value)"></div>';}
  var body='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px"><div style="display:flex;align-items:center;gap:12px">'+avatar(e,64)
    +'<div><div style="font-size:18px;font-weight:700">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+' · '+esc(e.obra_id||'')+'</div>'
    +'<label class="btn s" style="display:inline-block;height:auto;padding:5px 10px;font-size:12px;margin-top:6px;cursor:pointer">📷 Cambiar foto<input type="file" accept="image/*" style="display:none" onchange="subirFoto(this)"></label></div></div>'
    +'<button class="btn s" onclick="cerrarFicha()">✕</button></div>'
    +'<div class="frow">'+f('Nombre completo','nombre_completo')+f('Cédula / documento','cedula')+'</div>'
    +'<div class="frow">'+f('Fecha de nacimiento','fecha_nacimiento','date')+f('Teléfono','telefono')+'</div>'
    +'<div class="frow">'+f('Dirección','direccion')+f('Correo','email')+'</div>'
    +'<div class="frow">'+f('Contacto de emergencia','contacto_emergencia')+f('Tel. emergencia','telefono_emergencia')+'</div>'
    +'<div class="frow">'+f('Cargo','cargo')+f('Obra','obra_id')+'</div>'
    +'<div class="frow">'+f('Fecha de ingreso','fecha_ingreso','date')+f('Clase riesgo ARL','clase_riesgo_arl','number')+'</div>'
    +'<div class="frow">'+f('EPS','eps')+f('AFP (pensión)','afp')+'</div>'
    +'<div class="frow">'+f('ARL','arl')+f('Caja compensación','caja_compensacion')+'</div>'
    +'<div class="frow">'+f('Salario básico / mes','salario_basico','number')+f('Bonificación / mes','bonificacion','number')+'</div>'
    +'<div class="frow">'+f('Método de pago','metodo_pago')+f('Cuenta','cuenta_pago')+'</div>'
    +'<div class="frow">'+f('Saldo préstamo','prestamo_saldo','number')+'<div class="fg"><label>Activo</label><select onchange="fichaSet(\'activo\',this.value===\'si\')"><option value="si"'+(e.activo!==false?' selected':'')+'>Sí</option><option value="no"'+(e.activo===false?' selected':'')+'>No</option></select></div></div>'
    +'<div class="foot"><button class="btn s" onclick="cerrarFicha()">Cancelar</button><button class="btn g" onclick="guardarFicha()">💾 Guardar ficha</button></div>';
  document.getElementById("ficha-body").innerHTML=body;document.getElementById("ov-ficha").className="ov on";
}
function fichaSet(k,v){fichaEdits[k]=(v===''?null:v);var e=emps.find(function(x){return x.id===fichaId;});if(e)e[k]=v;}
function cerrarFicha(){document.getElementById("ov-ficha").className="ov";fichaId=null;}
function subirFoto(inp){var f=inp.files[0];if(!f||!fichaId)return;var e=emps.find(function(x){return x.id===fichaId;});
  var path=fichaId+'/'+Date.now()+'.'+(f.name.split('.').pop()||'jpg').toLowerCase();
  toast("Subiendo foto…");
  fetch(SB+"/storage/v1/object/avatars/"+path,{method:"POST",headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":f.type||"image/jpeg"},body:f})
    .then(function(r){if(!r.ok)throw 0;var url=SB+"/storage/v1/object/public/avatars/"+path;fichaEdits.foto_url=url;e.foto_url=url;openFicha(fichaId);toast("Foto lista — guarda la ficha");}).catch(function(){toast("Error al subir foto");});
}
function guardarFicha(){if(!fichaId)return;if(!Object.keys(fichaEdits).length){cerrarFicha();return;}
  fetch(SB+"/rest/v1/empleados?id=eq."+fichaId,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(fichaEdits)})
    .then(function(r){if(!r.ok)throw 0;toast("Ficha guardada ✓");cerrarFicha();cargar();}).catch(function(){toast("Error al guardar");});
}

// init
var d=new Date();document.getElementById("mes").value=d.toISOString().slice(0,7);
document.getElementById("quin").value=d.getDate()<=15?'1':'2';
document.getElementById("mes").addEventListener("change",cargar);
document.getElementById("quin").addEventListener("change",cargar);
document.getElementById("ov-ficha").addEventListener("click",function(e){if(e.target===this)cerrarFicha();});
cargar();
</script>
</body>
</html>
