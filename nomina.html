<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Imperio · Nómina</title>
<style>
:root{--bg:#f5f4f0;--card:#fff;--ink:#1b1b19;--mut:#7a786f;--line:#e7e4dc;--acc:#5b5bd6;--accbg:#eeeefb;--grn:#1d8a5f;--amb:#c98a12;--red:#c23b2e}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
.wrap{max-width:1080px;margin:0 auto;padding:18px}
h1{font-size:19px;font-weight:700;margin:0}
.sub{font-size:12px;color:var(--mut);margin-top:2px}
.top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px}
.qsel{display:flex;align-items:center;gap:8px}
.qsel select,.qsel input{height:38px;border:1px solid var(--line);border-radius:9px;padding:0 10px;font-size:14px;background:var(--card);font-family:inherit}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-size:14px;font-weight:500;color:var(--mut);cursor:pointer}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#999;font-size:11px;font-weight:600;padding:10px 12px;background:#fafafa;white-space:nowrap}
td{padding:9px 12px;border-top:1px solid #f0efe9;vertical-align:middle}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.inp{width:78px;height:32px;border:1px solid var(--line);border-radius:7px;padding:0 8px;font-size:13px;text-align:right;font-family:inherit}
.nm{font-weight:600}
.cargo{font-size:11px;color:var(--mut)}
.tot{font-weight:700}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.kpi .l{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:22px;font-weight:700;letter-spacing:-.02em}
.btn{height:40px;border:0;border-radius:10px;background:var(--acc);color:#fff;font-size:14px;font-weight:600;padding:0 18px;cursor:pointer}
.btn.g{background:var(--grn)}
.btn:active{transform:scale(.99)}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill-pag{background:#e1f5ee;color:#0f6e56}.pill-pend{background:#fdf0d8;color:#8a5a06}
.foot-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
.muted{color:var(--mut);font-size:13px;padding:14px}
.hint{font-size:12px;color:var(--mut);margin:6px 2px 12px}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:9}
.toast.on{opacity:1}
.obratag{font-size:10px;color:var(--mut);background:#f1efe8;padding:2px 7px;border-radius:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Nómina · Imperio</h1><div class="sub" id="sub">Cargando…</div></div>
    <div class="qsel"><label style="font-size:12px;color:var(--mut)">Quincena</label>
      <input type="text" id="quincena" value="" placeholder="1-15 jul 2026" style="width:150px"/></div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="nomina" onclick="setTab('nomina')">🧮 Nómina de la quincena</div>
    <div class="tab" data-t="pago" onclick="setTab('pago')">💸 Pago (tesorera)</div>
    <div class="tab" data-t="prest" onclick="setTab('prest')">🛡 Seguridad social y prestaciones</div>
    <div class="tab" data-t="empleados" onclick="setTab('empleados')">👥 Empleados</div>
  </div>
  <div id="view"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB="https://dghmgaaprlzpfnpsqzav.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k";
var H={apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"};
var emps=[], nom=[], tab="nomina", liq={};
var FACTOR_PREST=0.2183; // cesantías 8.33 + int 1 + prima 8.33 + vacaciones 4.17
// Aportes patronales mensuales (sobre el básico)
var R={ces:0.0833,intces:0.01,prima:0.0833,vac:0.0417,salud:0.085,pension:0.12,arl:0.0696,caja:0.04};

function fmt(n){return "$"+Math.round(n||0).toLocaleString("es-CO");}
function num(v){return parseFloat(v)||0;}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast on";setTimeout(function(){t.className="toast";},2400);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function defaultQuincena(){
  var d=new Date(), day=d.getDate();
  var mes=d.toLocaleString('es-CO',{month:'short'}).replace('.','');
  var y=d.getFullYear();
  return (day<=15?'1-15':'16-30')+' '+mes+' '+y;
}

function pago(e, dias, he, prest){
  var b=+e.salario_basico||0, bon=+e.bonificacion||0;
  var basicoP=Math.round(b/30*dias);
  var bonP=Math.round(bon/30*dias);
  var heV=Math.round(he*(b/192));
  var total=basicoP+bonP+heV-prest;
  return {basicoP:basicoP,bonP:bonP,heV:heV,total:total};
}

function setTab(t){tab=t;
  document.querySelectorAll('.tab').forEach(function(x){x.className='tab'+(x.dataset.t===t?' on':'');});
  render();
}

function cargar(){
  document.getElementById("sub").textContent="Cargando…";
  var q=document.getElementById("quincena").value.trim();
  Promise.all([
    fetch(SB+"/rest/v1/empleados?select=id,cedula,nombre_completo,cargo,obra_id,salario_basico,bonificacion,metodo_pago,cuenta_pago,activo&order=obra_id,nombre_completo",{headers:H}).then(function(r){return r.json();}),
    fetch(SB+"/rest/v1/nomina?quincena=eq."+encodeURIComponent(q)+"&order=area,valor.desc",{headers:H}).then(function(r){return r.json();})
  ]).then(function(res){
    emps=(Array.isArray(res[0])?res[0]:[]).filter(function(e){return e.activo!==false;});
    nom=Array.isArray(res[1])?res[1]:[];
    // precargar liq desde nomina existente si hay
    liq={};
    emps.forEach(function(e){
      var n=nom.find(function(x){return x.cedula===e.cedula;});
      liq[e.cedula]={dias:n?(+n.dias||15):15, he:n?(+n.horas_extra||0):0, prest:n?(+n.prestamo||0):0};
    });
    document.getElementById("sub").textContent=emps.length+" empleados · quincena "+q;
    render();
  }).catch(function(){document.getElementById("sub").textContent="Error de conexión";});
}

function render(){
  var v=document.getElementById("view");
  if(tab==="nomina") return renderNomina(v);
  if(tab==="empleados") return renderEmpleados(v);
  if(tab==="pago") return renderPago(v);
  if(tab==="prest") return renderPrest(v);
}

function renderNomina(v){
  var totNet=0, totBasico=0, totPrest=0;
  var rows=emps.map(function(e){
    var l=liq[e.cedula]||{dias:15,he:0,prest:0};
    var p=pago(e,l.dias,l.he,l.prest);
    totNet+=p.total; totBasico+=p.basicoP; totPrest+=Math.round(p.basicoP*FACTOR_PREST);
    return '<tr>'
      +'<td><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+' · <span class="obratag">'+esc(e.obra_id||'')+'</span></div></td>'
      +'<td class="r">'+fmt(e.salario_basico)+'</td>'
      +'<td class="r"><input class="inp" type="number" step="0.5" value="'+l.dias+'" oninput="upd(\''+e.cedula+'\',\'dias\',this.value)"></td>'
      +'<td class="r"><input class="inp" type="number" step="0.5" value="'+l.he+'" oninput="upd(\''+e.cedula+'\',\'he\',this.value)"></td>'
      +'<td class="r"><input class="inp" type="number" value="'+l.prest+'" oninput="upd(\''+e.cedula+'\',\'prest\',this.value)"></td>'
      +'<td class="r tot" id="tot-'+e.cedula+'">'+fmt(p.total)+'</td></tr>';
  }).join("");
  v.innerHTML=
    '<div class="kpis">'
    +'<div class="kpi"><div class="l">Total a pagar (quincena)</div><div class="v" id="k-net">'+fmt(totNet)+'</div></div>'
    +'<div class="kpi"><div class="l">Base prestacional (básico)</div><div class="v" id="k-bas">'+fmt(totBasico)+'</div></div>'
    +'<div class="kpi"><div class="l">Empleados</div><div class="v">'+emps.length+'</div></div>'
    +'</div>'
    +'<div class="hint">Marca los días trabajados y las horas extra de cada empleado. Se paga solo la nómina del ciclo: básico÷30×días + horas extra + bonificación − préstamos. Salud, pensión y prestaciones van en su pestaña aparte (se acumulan, no se pagan al trabajador cada quincena).</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th class="r">Básico/mes</th><th class="r">Días</th><th class="r">H. extra</th><th class="r">Préstamo</th><th class="r">A pagar</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div class="foot-actions"><button class="btn g" onclick="guardarNomina()">💾 Guardar nómina de la quincena</button></div>';
}

function upd(ced,campo,val){
  if(!liq[ced]) liq[ced]={dias:15,he:0,prest:0};
  liq[ced][campo]=num(val);
  var e=emps.find(function(x){return x.cedula===ced;});
  var p=pago(e,liq[ced].dias,liq[ced].he,liq[ced].prest);
  var c=document.getElementById('tot-'+ced); if(c) c.textContent=fmt(p.total);
  // recomputar KPIs
  var totNet=0,totBas=0;
  emps.forEach(function(x){var l=liq[x.cedula]||{dias:15,he:0,prest:0};var pp=pago(x,l.dias,l.he,l.prest);totNet+=pp.total;totBas+=pp.basicoP;});
  document.getElementById('k-net').textContent=fmt(totNet);
  document.getElementById('k-bas').textContent=fmt(totBas);
}

function guardarNomina(){
  var q=document.getElementById("quincena").value.trim();
  if(!q){toast("Escribe la quincena");return;}
  var ops=emps.map(function(e){
    var l=liq[e.cedula]||{dias:15,he:0,prest:0};
    var p=pago(e,l.dias,l.he,l.prest);
    var body={quincena:q,nombre:e.nombre_completo,cedula:e.cedula,proyecto:(e.obra_id||'').toUpperCase(),area:e.cargo,
      cargo:e.cargo,salario_mensual:e.salario_basico,dias:l.dias,horas_extra:l.he,prestamo:l.prest,valor:p.total,
      metodo:e.metodo_pago,cuenta:e.cuenta_pago,pagado:false,estado:'liquidada'};
    var existing=nom.find(function(x){return x.cedula===e.cedula;});
    if(existing){ return fetch(SB+"/rest/v1/nomina?id=eq."+existing.id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(body)}); }
    return fetch(SB+"/rest/v1/nomina",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(body)});
  });
  Promise.all(ops).then(function(){toast("Nómina guardada ✓");cargar();}).catch(function(){toast("Error al guardar");});
}

function renderEmpleados(v){
  var rows=emps.map(function(e){
    return '<tr>'
      +'<td><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+' · <span class="obratag">'+esc(e.obra_id||'')+'</span></div></td>'
      +'<td class="r"><input class="inp" style="width:110px" type="number" value="'+(+e.salario_basico||0)+'" oninput="updEmp(\''+e.id+'\',\'salario_basico\',this.value)"></td>'
      +'<td class="r"><input class="inp" style="width:110px" type="number" value="'+(+e.bonificacion||0)+'" oninput="updEmp(\''+e.id+'\',\'bonificacion\',this.value)"></td>'
      +'<td>'+esc(e.metodo_pago||'')+'</td>'
      +'<td class="r">'+fmt((+e.salario_basico||0)+(+e.bonificacion||0))+'</td></tr>';
  }).join("");
  v.innerHTML='<div class="hint">Define el <strong>básico</strong> (base de prestaciones) y la <strong>bonificación</strong> (no prestacional) de cada empleado. El total es lo que gana al mes trabajando completo.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th class="r">Básico/mes</th><th class="r">Bonificación/mes</th><th>Pago</th><th class="r">Total/mes</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div class="foot-actions"><button class="btn" onclick="guardarEmpleados()">💾 Guardar empleados</button></div>';
}
var empEdits={};
function updEmp(id,campo,val){ if(!empEdits[id])empEdits[id]={}; empEdits[id][campo]=num(val);
  var e=emps.find(function(x){return x.id===id;}); if(e){e[campo]=num(val);} }
function guardarEmpleados(){
  var ids=Object.keys(empEdits);
  if(!ids.length){toast("No hay cambios");return;}
  Promise.all(ids.map(function(id){
    return fetch(SB+"/rest/v1/empleados?id=eq."+id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(empEdits[id])});
  })).then(function(){empEdits={};toast("Empleados guardados ✓");cargar();}).catch(function(){toast("Error al guardar");});
}

function renderPago(v){
  if(!nom.length){ v.innerHTML='<div class="card"><div class="muted">Esta quincena aún no tiene nómina guardada. Ve a "Nómina de la quincena", marca la asistencia y guarda.</div></div>'; return; }
  var total=nom.reduce(function(s,n){return s+(+n.valor||0);},0);
  var pagado=nom.filter(function(n){return n.pagado;}).reduce(function(s,n){return s+(+n.valor||0);},0);
  var rows=nom.map(function(n){
    var tercero=n.tercero?('<div style="font-size:11px;color:var(--mut)">a nombre de '+esc(n.tercero)+'</div>'):'';
    return '<tr>'
      +'<td><div class="nm">'+esc(n.nombre)+'</div><div class="cargo">'+esc(n.cargo||n.area||'')+'</div></td>'
      +'<td><div>'+esc(n.metodo||'')+'</div><div style="font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums">'+esc(n.cuenta||'')+'</div>'+tercero+'</td>'
      +'<td class="r tot">'+fmt(n.valor)+'</td>'
      +'<td class="r">'+(n.pagado?'<span class="badge pill-pag">Pagado</span>':'<button class="btn g" style="height:32px;padding:0 12px;font-size:12px" onclick="marcarPag('+n.id+')">Marcar pagado</button>')+'</td></tr>';
  }).join("");
  v.innerHTML='<div class="kpis">'
    +'<div class="kpi"><div class="l">Total quincena</div><div class="v">'+fmt(total)+'</div></div>'
    +'<div class="kpi"><div class="l">Pagado</div><div class="v" style="color:var(--grn)">'+fmt(pagado)+'</div></div>'
    +'<div class="kpi"><div class="l">Falta pagar</div><div class="v" style="color:var(--red)">'+fmt(total-pagado)+'</div></div></div>'
    +'<div class="hint">Lista para la tesorera: a quién, cuánto y a qué cuenta. Marca cada pago cuando lo hagas.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th>Pago a</th><th class="r">Valor</th><th class="r">Estado</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function marcarPag(id){
  fetch(SB+"/rest/v1/nomina?id=eq."+id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify({pagado:true,fecha_pago:new Date().toISOString().slice(0,10)})})
    .then(function(r){ if(!r.ok)throw 0; var n=nom.find(function(x){return x.id===id;}); if(n)n.pagado=true; toast("Marcado pagado ✓"); render(); })
    .catch(function(){toast("Error");});
}

function renderPrest(v){
  var sumAp=0, sumPr=0, sumBas=0;
  var rows=emps.map(function(e){
    var b=+e.salario_basico||0; sumBas+=b;
    var salud=Math.round(b*R.salud), pension=Math.round(b*R.pension), arl=Math.round(b*R.arl), caja=Math.round(b*R.caja);
    var ap=salud+pension+arl+caja;
    var ces=Math.round(b*R.ces), intc=Math.round(b*R.intces), prima=Math.round(b*R.prima), vac=Math.round(b*R.vac);
    var pr=ces+intc+prima+vac;
    sumAp+=ap; sumPr+=pr;
    return '<tr>'
      +'<td><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+'</div></td>'
      +'<td class="r">'+fmt(b)+'</td>'
      +'<td class="r">'+fmt(salud)+'</td><td class="r">'+fmt(pension)+'</td><td class="r">'+fmt(arl)+'</td><td class="r">'+fmt(caja)+'</td>'
      +'<td class="r tot">'+fmt(ap)+'</td>'
      +'<td class="r" style="color:var(--amb)">'+fmt(pr)+'</td></tr>';
  }).join("");
  v.innerHTML='<div class="kpis">'
    +'<div class="kpi"><div class="l">Aportes patronales / mes (PILA)</div><div class="v">'+fmt(sumAp)+'</div><div style="font-size:10px;color:var(--mut);margin-top:3px">salud + pensión + ARL + caja</div></div>'
    +'<div class="kpi"><div class="l">Provisión prestaciones / mes</div><div class="v" style="color:var(--amb)">'+fmt(sumPr)+'</div><div style="font-size:10px;color:var(--mut);margin-top:3px">se acumula para la liquidación</div></div>'
    +'<div class="kpi"><div class="l">Costo real / mes (aprox)</div><div class="v">'+fmt(sumBas+emps.reduce(function(s,e){return s+(+e.bonificacion||0);},0)+sumAp+sumPr)+'</div></div>'
    +'</div>'
    +'<div class="hint">Estos valores <strong>no se le pagan al trabajador cada quincena</strong>. Los aportes (salud/pensión/ARL/caja) se pagan mensual a la PILA; las prestaciones (cesantías, prima, vacaciones) <strong>se acumulan</strong> hasta la liquidación. Cálculo mensual sobre el básico. ARL clase V (construcción).</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th class="r">Básico</th><th class="r">Salud</th><th class="r">Pensión</th><th class="r">ARL</th><th class="r">Caja</th><th class="r">Aportes/mes</th><th class="r">Provisión prest.</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
document.getElementById("quincena").value=defaultQuincena();
document.getElementById("quincena").addEventListener("change",cargar);
cargar();
</script>
</body>
</html>
