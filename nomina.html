<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Imperio · Nómina</title>
<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#16181d;--mut:#8a8f99;--line:#edeef1;--acc:#5b5bd6;--accbg:#eeeefb;--grn:#1d8a5f;--amb:#c98a12;--red:#e0463d;--sh:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:22px}
h1{font-size:22px;font-weight:700;margin:0;letter-spacing:-.02em}
.sub{font-size:12.5px;color:var(--mut);margin-top:3px}
.top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.cyc{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,input{height:38px;border:1px solid var(--line);border-radius:10px;padding:0 11px;font-size:14px;background:var(--card);font-family:inherit;color:var(--ink);box-shadow:var(--sh)}
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;background:#eceef1;padding:4px;border-radius:12px;width:fit-content}
.tab{padding:8px 16px;border-radius:9px;border:0;background:transparent;font-size:13.5px;font-weight:600;color:var(--mut);cursor:pointer;transition:.15s}
.tab.on{background:var(--card);color:var(--ink);box-shadow:var(--sh)}
.card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--mut);font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:12px 14px;white-space:nowrap;border-bottom:1px solid var(--line)}
td{padding:12px 14px;border-top:1px solid #f4f5f7;vertical-align:middle}
tbody tr:hover{background:#fafbfc}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.inp{width:72px;height:34px;border:1px solid var(--line);border-radius:9px;padding:0 9px;font-size:13.5px;text-align:right;font-family:inherit;background:#fbfbfc}
.inp:focus{outline:none;border-color:var(--acc);background:#fff}
.nm{font-weight:600;letter-spacing:-.01em}.cargo{font-size:11.5px;color:var(--mut);margin-top:1px}
.tot{font-weight:700}
.av{width:40px;height:40px;border-radius:50%;object-fit:cover;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex:0 0 auto;box-shadow:0 0 0 2px #fff,0 1px 3px rgba(0,0,0,.12)}
.emprow{display:flex;align-items:center;gap:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
.kpi .l{font-size:11.5px;color:var(--mut);font-weight:600;margin-bottom:7px}
.kpi .v{font-size:24px;font-weight:700;letter-spacing:-.03em}
.btn{height:40px;border:0;border-radius:11px;background:var(--acc);color:#fff;font-size:14px;font-weight:600;padding:0 18px;cursor:pointer;box-shadow:0 1px 2px rgba(91,91,214,.3)}
.btn.g{background:var(--grn);box-shadow:0 1px 2px rgba(29,138,95,.3)}.btn.s{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--sh)}
.btn:active{transform:scale(.98)}
.badge{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600}
.pill-pag{background:#e1f5ee;color:#0f6e56}
.diaspill{display:inline-flex;align-items:center;gap:6px;background:#eef7f2;color:#0f6e56;font-weight:700;font-size:14px;padding:5px 12px;border-radius:20px}
.diassub{font-size:11px;color:var(--amb);margin-top:3px}
.hint{font-size:12.5px;color:var(--mut);margin:2px 2px 14px;line-height:1.55}
.foot{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.grid-emp{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.empcard{background:var(--card);border-radius:16px;padding:15px;cursor:pointer;display:flex;align-items:center;gap:13px;box-shadow:var(--sh);transition:.15s}
.empcard:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,24,40,.08)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:20;overflow:auto;padding:24px 12px}
.ov.on{display:flex}
.modal{background:var(--card);border-radius:16px;max-width:640px;width:100%;padding:20px}
.fg{margin-bottom:10px}.fg label{font-size:11px;color:var(--mut);display:block;margin-bottom:3px}
.fg input,.fg select{width:100%}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:30}
.toast.on{opacity:1}
.obratag{font-size:10px;color:var(--mut);background:#f1efe8;padding:2px 7px;border-radius:12px}
.leg{font-size:11px;color:var(--mut);display:flex;gap:12px;margin:2px 2px 10px}
.leg span{display:inline-flex;align-items:center;gap:4px}
.dot{width:12px;height:12px;border-radius:3px;display:inline-block}
@media print{body *{visibility:hidden}#ov-recibo,#ov-recibo *{visibility:visible}#ov-recibo{position:absolute;inset:0;background:#fff;display:block;padding:0}#ov-recibo .modal{box-shadow:none;max-width:100%}#ov-recibo .btn,#ov-recibo .foot{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Nómina · Imperio</h1><div class="sub" id="sub">Cargando…</div></div>
    <div class="cyc">
      <input type="month" id="mes"/>
      <select id="quin"><option value="1">1ª quincena (1–15)</option><option value="2">2ª quincena (16–fin)</option></select>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="nomina" onclick="setTab('nomina')">🧮 Nómina</div>
    <div class="tab" data-t="pago" onclick="setTab('pago')">💸 Pago</div>
    <div class="tab" data-t="hist" onclick="setTab('hist')">📚 Historial</div>
    <div class="tab" data-t="liq" onclick="setTab('liq')">📅 Liquidación</div>
    <div class="tab" data-t="prest" onclick="setTab('prest')">🛡 Seguridad social</div>
    <div class="tab" data-t="empleados" onclick="setTab('empleados')">👥 Empleados</div>
  </div>
  <div id="view"></div>
</div>
<div class="ov" id="ov-ficha"><div class="modal" id="ficha-body"></div></div>
<div class="ov" id="ov-recibo"><div class="modal" id="recibo-body" style="max-width:440px"></div></div>
<div class="toast" id="toast"></div>
<script>
var SB="https://dghmgaaprlzpfnpsqzav.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k";
var H={apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"};
var R={ces:0.0833,intces:0.01,prima:0.0833,vac:0.0417,salud:0.085,pension:0.12,arl:0.0696,caja:0.04};
var SMLMV=1750905, AUX_TRANSPORTE=249095; // paramétricas 2026
var emps=[], nom=[], tab="nomina", liq={}, att={}, snap=false, rost=[];
var COLORS=['#5b5bd6','#1d8a5f','#c98a12','#c23b2e','#2563eb','#7c3aed','#0f766e','#b45309'];

function fmt(n){return "$"+Math.round(n||0).toLocaleString("es-CO");}
function num(v){return parseFloat(v)||0;}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast on";setTimeout(function(){t.className="toast";},2400);}
function initials(n){var p=(n||'').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'');}
function colorFor(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))>>>0;return COLORS[h%COLORS.length];}
function avatar(e,size){var sz=size||38;var st='width:'+sz+'px;height:'+sz+'px;font-size:'+(sz*0.37)+'px';
  if(e.foto_url) return '<img class="av" style="'+st+'" src="'+esc(e.foto_url)+'" alt="">';
  return '<span class="av" style="'+st+';background:'+colorFor(e.cedula||e.nombre_completo)+'">'+esc(initials(e.nombre_completo).toUpperCase())+'</span>';}

// ── Ciclo ──
function cycle(){
  var m=document.getElementById("mes").value; if(!m){var d=new Date();m=d.toISOString().slice(0,7);}
  var y=+m.split('-')[0], mo=+m.split('-')[1];
  var q=document.getElementById("quin").value;
  var d1=q==='1'?1:16, d2=q==='1'?15:new Date(y,mo,0).getDate();
  var days=[]; for(var i=d1;i<=d2;i++){days.push(y+'-'+String(mo).padStart(2,'0')+'-'+String(i).padStart(2,'0'));}
  var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var label=d1+'-'+d2+' '+meses[mo-1]+' '+y;
  return {y:y,mo:mo,d1:d1,d2:d2,days:days,label:label,desde:days[0],hasta:days[days.length-1]};
}

function diasTrab(ced,cy){
  var hoy=new Date().toISOString().slice(0,10);
  var transcurridos=cy.days.filter(function(d){return d<=hoy;}).length;
  var base=Math.min(15,transcurridos); // asalariado 15, topado a días ya transcurridos (no cuenta quincena futura)
  var ex=att[ced]||{};
  cy.days.forEach(function(d){if(d<=hoy && (ex[d]==='falta'||ex[d]==='incapacidad'||ex[d]==='inc'))base--;});
  return Math.max(0,base);
}
function pago(e,dias,hed,hen,prest){
  var b=+e.salario_basico||0, bon=+e.bonificacion||0;
  var devB=Math.round(b/30*dias), devBon=Math.round(bon/30*dias);
  var vh=(b+bon)/240;
  var vHed=Math.round(hed*vh*1.25), vHen=Math.round(hen*vh*1.75);
  return {devB:devB,devBon:devBon,hed:vHed,hen:vHen,total:devB+devBon+vHed+vHen-prest};
}

function setTab(t){tab=t;document.querySelectorAll('.tab').forEach(function(x){x.className='tab'+(x.dataset.t===t?' on':'');});render();}

var hxA={};
function cargar(){
  document.getElementById("sub").textContent="Cargando…";
  var cy=cycle();
  Promise.all([
    fetch(SB+"/rest/v1/empleados?select=*&order=obra_id,nombre_completo",{headers:H}).then(function(r){return r.json();}),
    fetch(SB+"/rest/v1/nomina?quincena=eq."+encodeURIComponent(cy.label)+"&order=valor.desc",{headers:H}).then(function(r){return r.json();}),
    fetch(SB+"/rest/v1/asistencia?quincena=eq."+encodeURIComponent(cy.label)+"&select=cedula,fecha,estado,he_diurna,he_nocturna",{headers:H}).then(function(r){return r.json();})
  ]).then(function(res){
    emps=(Array.isArray(res[0])?res[0]:[]).filter(function(e){return e.activo!==false;});
    nom=Array.isArray(res[1])?res[1]:[];
    att={};hxA={};(Array.isArray(res[2])?res[2]:[]).forEach(function(a){if(a.estado==='extras'){hxA[a.cedula]={hed:+a.he_diurna||0,hen:+a.he_nocturna||0};return;}if(!att[a.cedula])att[a.cedula]={};att[a.cedula][a.fecha]=a.estado;});
    snap=nom.length>0; // quincena ya guardada = foto congelada
    rost = snap ? nom.map(function(n){
        var e=emps.find(function(x){return x.cedula===n.cedula;})||{cedula:n.cedula,nombre_completo:n.nombre,cargo:(n.cargo||n.area||''),obra_id:(n.proyecto||'').toLowerCase(),salario_basico:n.salario_mensual,bonificacion:0,metodo_pago:n.metodo,cuenta_pago:n.cuenta,__inactivo:true};
        if(!emps.some(function(x){return x.cedula===n.cedula;})) e.__inactivo=true; else e.__inactivo=false;
        return {e:e,n:n};
      }) : emps.map(function(e){return {e:e,n:null};});
    liq={};rost.forEach(function(it){var ha=hxA[it.e.cedula]||{};liq[it.e.cedula]={hed:it.n?(+it.n.he_diurna||0):(ha.hed||0),hen:it.n?(+it.n.he_nocturna||0):(ha.hen||0),prest:it.n?(+it.n.prestamo||0):0};});
    document.getElementById("sub").textContent=rost.length+(snap?" empleados (guardada)":" empleados")+" · ciclo "+cy.label+" · se paga el 15 y el 30";
    render();
  }).catch(function(){document.getElementById("sub").textContent="Error de conexión";});
}

function render(){var v=document.getElementById("view");
  if(tab==="nomina")return renderNomina(v);
  if(tab==="pago")return renderPago(v);
  if(tab==="hist")return renderHistorial(v);
  if(tab==="liq")return renderLiq(v);
  if(tab==="prest")return renderPrest(v);
  if(tab==="empleados")return renderEmpleados(v);
}

// ── NÓMINA + ASISTENCIA ──
function diasItem(it,cy){if(it.n&&it.n.pagado)return +it.n.dias||0;return diasTrab(it.e.cedula,cy);}
function pagoItem(it,cy,l){
  if(it.n&&it.n.pagado)return {total:+it.n.valor||0,locked:true,dias:+it.n.dias||0};
  var dias=diasItem(it,cy);var p=pago(it.e,dias,l.hed,l.hen,l.prest);
  return {total:p.total,locked:false,dias:dias};
}
function renderNomina(v){
  var cy=cycle(); var totNet=0;
  var rows=rost.map(function(it){
    var e=it.e,n=it.n;var l=liq[e.cedula]||{hed:0,hen:0,prest:0};
    var pi=pagoItem(it,cy,l);totNet+=pi.total;
    var inact=e.__inactivo?' <span style="font-size:10px;color:var(--mut)">· inactivo</span>':'';
    var name='<td><div class="emprow">'+avatar(e,40)+'<div><div class="nm">'+esc(e.nombre_completo)+inact+'</div><div class="cargo">'+esc(e.cargo||'')+' · '+esc(e.obra_id||'')+'</div></div></div></td>';
    if(pi.locked){
      return '<tr>'+name+'<td><span class="diaspill">'+pi.dias+' días</span></td>'
        +'<td class="r">'+(n.he_diurna||0)+'</td><td class="r">'+(n.he_nocturna||0)+'</td><td class="r">'+fmt(n.prestamo||0)+'</td>'
        +'<td class="r tot">'+fmt(pi.total)+' <span class="badge pill-pag" style="font-size:9px">pagada</span></td></tr>';
    }
    return '<tr>'+name+'<td><span class="diaspill">'+pi.dias+' días</span></td>'
      +'<td class="r"><input class="inp" type="number" step="0.5" value="'+l.hed+'" oninput="upd(\''+e.cedula+'\',\'hed\',this.value)"></td>'
      +'<td class="r"><input class="inp" type="number" step="0.5" value="'+l.hen+'" oninput="upd(\''+e.cedula+'\',\'hen\',this.value)"></td>'
      +'<td class="r"><input class="inp" type="number" value="'+l.prest+'" oninput="upd(\''+e.cedula+'\',\'prest\',this.value)"></td>'
      +'<td class="r tot" id="tot-'+e.cedula+'">'+fmt(pi.total)+'</td></tr>';
  }).join("");
  var aviso=snap?'<div class="hint" style="background:#eef7f2;border-radius:10px;padding:10px 12px"><strong>Quincena guardada</strong> — muestra lo que se registró y pagó (queda congelada; incluye empleados ya inactivos con su valor real). Puedes ajustar horas extra/préstamo de las que no estén pagadas.</div>':'<div class="hint">Los <strong>días vienen de Asistencia</strong>, donde el ingeniero marca a diario. Aquí ajustas horas extra (diurna ×1,25 · nocturna ×1,75) y préstamos, y guardas para pagar.</div>';
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Total '+(snap?'de la quincena':'a pagar')+'</div><div class="v" id="k-net">'+fmt(totNet)+'</div></div>'
    +'<div class="kpi"><div class="l">Ciclo</div><div class="v" style="font-size:17px">'+cy.label+'</div><div style="font-size:11px;color:var(--mut);margin-top:2px">pago el 15 y el 30</div></div>'
    +'<div class="kpi"><div class="l">Personas</div><div class="v">'+rost.length+'</div></div></div>'
    +aviso
    +'<div class="card"><table><thead><tr><th>Empleado</th><th>Días trabajados</th><th class="r">HE día</th><th class="r">HE noche</th><th class="r">Préstamo</th><th class="r">A pagar</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div class="foot"><button class="btn g" onclick="guardarNomina()">Guardar nómina del ciclo</button></div>';
}
function toggleDay(ced,d){if(!att[ced])att[ced]={};var cur=att[ced][d];
  var nx=cur===undefined?'falta':cur==='falta'?'inc':undefined;
  if(nx===undefined)delete att[ced][d];else att[ced][d]=nx;
  recalcRow(ced);
}
function recalcRow(ced){var cy=cycle();var e=emps.find(function(x){return x.cedula===ced;});var l=liq[ced]||{hed:0,hen:0,prest:0};
  var dias=diasTrab(ced,cy);var p=pago(e,dias,l.hed,l.hen,l.prest);
  var dc=document.getElementById('d-'+ced);if(dc)dc.textContent=dias;
  var tc=document.getElementById('tot-'+ced);if(tc)tc.textContent=fmt(p.total);
  // repintar strip de ese empleado
  renderNomina(document.getElementById('view'));
}
function upd(ced,c,val){if(!liq[ced])liq[ced]={hed:0,hen:0,prest:0};liq[ced][c]=num(val);
  var cy=cycle();var it=rost.find(function(x){return x.e.cedula===ced;});if(!it)return;
  var tc=document.getElementById('tot-'+ced);if(tc)tc.textContent=fmt(pagoItem(it,cy,liq[ced]).total);
  var tot=0;rost.forEach(function(x){tot+=pagoItem(x,cy,liq[x.e.cedula]||{hed:0,hen:0,prest:0}).total;});
  document.getElementById('k-net').textContent=fmt(tot);
}
function guardarNomina(){
  var cy=cycle();
  var nomOps=rost.map(function(it){var e=it.e,n=it.n;
    var l=liq[e.cedula]||{hed:0,hen:0,prest:0};var pi=pagoItem(it,cy,l);
    var body={quincena:cy.label,nombre:e.nombre_completo,cedula:e.cedula,proyecto:(e.obra_id||'').toUpperCase(),area:e.cargo,cargo:e.cargo,
      salario_mensual:e.salario_basico,dias:pi.dias,he_diurna:l.hed,he_nocturna:l.hen,horas_extra:(l.hed+l.hen),prestamo:l.prest,valor:pi.total,
      metodo:e.metodo_pago,cuenta:e.cuenta_pago,
      pagado:(n?!!n.pagado:false),estado:(n&&n.pagado?'pagada':'liquidada')};
    if(n&&n.id)return fetch(SB+"/rest/v1/nomina?id=eq."+n.id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(body)});
    return fetch(SB+"/rest/v1/nomina",{method:"POST",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify(body)});
  });
  Promise.all(nomOps).then(function(){toast("Nómina guardada ✓");cargar();}).catch(function(){toast("Error al guardar");});
}

// ── PAGO ──
function renderPago(v){
  if(!nom.length){v.innerHTML='<div class="card"><div class="hint" style="padding:16px">Este ciclo aún no tiene nómina guardada. Ve a Nómina, marca la asistencia y guarda.</div></div>';return;}
  var total=nom.reduce(function(s,n){return s+(+n.valor||0);},0),pag=nom.filter(function(n){return n.pagado;}).reduce(function(s,n){return s+(+n.valor||0);},0);
  var rows=nom.map(function(n){var e=emps.find(function(x){return x.cedula===n.cedula;})||{nombre_completo:n.nombre,cedula:n.cedula};
    return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(n.nombre)+'</div><div class="cargo">'+esc(n.cargo||'')+'</div></div></div></td>'
      +'<td><div>'+esc(n.metodo||'')+'</div><div style="font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums">'+esc(n.cuenta||'')+'</div></td>'
      +'<td class="r tot">'+fmt(n.valor)+'</td>'
      +'<td class="r" style="white-space:nowrap"><button class="btn s" style="height:30px;padding:0 10px;font-size:12px;margin-right:6px" onclick="openRecibo('+n.id+')">🧾 Recibo</button>'
      +(n.pagado?'<span class="badge pill-pag">Pagado'+(n.fecha_pago?' '+esc(n.fecha_pago):'')+'</span>':'<button class="btn g" style="height:30px;padding:0 11px;font-size:12px" onclick="marcarPag('+n.id+')">Pagar</button>')+'</td></tr>';}).join("");
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Total ciclo</div><div class="v">'+fmt(total)+'</div></div>'

function mostrarRecibo(n){
  if(!n)return;
  var e=emps.find(function(x){return x.cedula===n.cedula;})||{cedula:n.cedula,nombre_completo:n.nombre};
  var salmes=+n.salario_mensual||+e.salario_basico||0, dias=+n.dias||0;
  var basico=Math.round(SMLMV/30*dias);
  var aplicaAux = salmes<=2*SMLMV;
  var aux = aplicaAux ? Math.round(AUX_TRANSPORTE/30*dias) : 0;
  var bonifMes = Math.max(0, salmes - SMLMV - (aplicaAux?AUX_TRANSPORTE:0));
  var bonif = Math.round(bonifMes/30*dias);
  var rateD=Math.round(salmes/192), rateN=Math.round(salmes/240*1.75);
  var hd=+n.he_diurna||0, hn=+n.he_nocturna||0, heD=Math.round(hd*rateD), heN=Math.round(hn*rateN);
  var prest=+n.prestamo||0, neto=+n.valor||0;
  var salud=Math.round(basico*0.04), pension=Math.round(basico*0.04);
  function row(l,r,bold){return '<div style="display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed #d9dce3"><span>'+l+'</span><span style="font-weight:'+(bold===false?'400':'700')+';text-align:right">'+r+'</span></div>';}
  var it='';
  it+=row('Salario base mínimo · '+dias+' días', fmt(basico));
  if(aux)it+=row('Auxilio de transporte · '+dias+' días', fmt(aux));
  if(bonif)it+=row('Bonificación · '+dias+' días', fmt(bonif));
  if(heD)it+=row('Horas extra diurnas', hd+' h × '+fmt(rateD)+' = '+fmt(heD));
  if(heN)it+=row('Horas extra nocturnas', hn+' h × '+fmt(rateN)+' = '+fmt(heN));
  if(prest)it+=row('Préstamo', (prest<0?'+ ':'− ')+fmt(Math.abs(prest)));
  var body='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><div style="font-size:20px;font-weight:800;letter-spacing:-.02em">Recibo de pago · Nómina</div><div style="font-size:12px;color:var(--mut)">Imperio Constructora · Quincena '+esc(n.quincena||'')+'</div></div><button class="btn s" onclick="cerrarRecibo()">✕</button></div>'
    +'<div style="margin-bottom:14px">'
    +row('Empleado', esc(n.nombre||e.nombre_completo||''))
    +row('Cédula', esc(e.cedula||n.cedula||''))
    +row('Cargo', esc(n.cargo||e.cargo||''))
    +row('Obra', esc(n.proyecto||e.obra_id||''))
    +row('Cuenta', esc(((n.metodo||'')+' '+(n.cuenta||'')).trim()))
    +'</div>'
    +'<div style="font-size:12px;font-weight:800;color:var(--acc);letter-spacing:.4px">LIQUIDACIÓN DE LA QUINCENA ('+dias+' DÍAS)</div>'
    +'<div style="font-size:12px;color:var(--mut);margin-bottom:6px">Salario mensual: '+fmt(salmes)+' · esta liquidación es la quincena (medio mes)</div>'
    +it
    +'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--ink);color:#fff;border-radius:12px;padding:15px 18px;margin-top:14px"><span style="font-size:16px;font-weight:800">TOTAL A PAGAR</span><span style="font-size:19px;font-weight:800">'+fmt(neto)+'</span></div>'
    +'<div style="background:#eef7f2;border:1px solid #cfe9dd;border-radius:12px;padding:14px;margin-top:14px;font-size:13px">'
      +'<div style="font-weight:700;color:var(--grn);margin-bottom:8px">🛡 Beneficios que asume la empresa por ti <span style="font-weight:400;color:var(--mut)">(no se te descuentan):</span></div>'
      +'<div style="display:flex;justify-content:space-between;padding:3px 0"><span>Salud (4%)</span><span style="font-weight:700;color:var(--grn)">'+fmt(salud)+'</span></div>'
      +'<div style="display:flex;justify-content:space-between;padding:3px 0"><span>Pensión (4%)</span><span style="font-weight:700;color:var(--grn)">'+fmt(pension)+'</span></div>'
      +'<div style="color:var(--grn);margin-top:8px;font-size:12px">La empresa paga estos <strong>'+fmt(salud+pension)+'</strong> que normalmente se te descontarían del salario. Aquí los recibes completos, como un beneficio extra.</div>'
    +'</div>'
    +'<div class="foot"><button class="btn s" onclick="window.print()">🖨 Imprimir</button><button class="btn" onclick="cerrarRecibo()">Cerrar</button></div>';
  document.getElementById("recibo-body").innerHTML=body;document.getElementById("ov-recibo").className="ov on";

// ── LIQUIDACIÓN ──
function renderLiq(v){
  var hoy=new Date();var totLiq=0;
  var rows=emps.map(function(e){
    var base=(+e.salario_basico||0)+(+e.bonificacion||0);
    if(!e.fecha_ingreso) return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">'+esc(e.cargo||'')+'</div></div></div></td><td colspan="6" style="color:var(--amb);font-size:12px">Falta fecha de ingreso — edítala en la ficha del empleado</td></tr>';
    var ing=new Date(e.fecha_ingreso+'T12:00:00');var dias=Math.max(0,Math.round((hoy-ing)/86400000));
    // La prima se pagó hasta el 30-jun-2026; la nueva acumula solo desde el 1-jul
    var iniPrima=new Date(Math.max(ing.getTime(), new Date('2026-07-01T12:00:00').getTime()));var diasPrima=Math.max(0,Math.round((hoy-iniPrima)/86400000));
    var ces=Math.round(base*dias/360);var intc=Math.round(ces*0.12*dias/360);var prima=Math.round(base*diasPrima/360);var vac=Math.round(base*dias/720);
    var tl=ces+intc+prima+vac;totLiq+=tl;
    return '<tr><td><div class="emprow">'+avatar(e,34)+'<div><div class="nm">'+esc(e.nombre_completo)+'</div><div class="cargo">desde '+esc(e.fecha_ingreso)+' · '+dias+' días</div></div></div></td>'
      +'<td class="r">'+fmt(ces)+'</td><td class="r">'+fmt(intc)+'</td><td class="r">'+fmt(prima)+'</td><td class="r">'+fmt(vac)+'</td><td class="r tot">'+fmt(tl)+'</td></tr>';
  }).join("");
  v.innerHTML='<div class="kpis"><div class="kpi"><div class="l">Liquidación acumulada total</div><div class="v" style="color:var(--amb)">'+fmt(totLiq)+'</div><div style="font-size:10px;color:var(--mut)">si se liquidara hoy</div></div></div>'
    +'<div class="hint">Prestaciones acumuladas por empleado, según fecha de ingreso y días laborados. <strong>No se paga cada quincena</strong>; se acumula hasta la liquidación. Base = básico + bonificación. <strong>La prima acumula solo desde el 1-jul</strong> (la anterior se pagó el 30-jun-2026); cesantías y vacaciones van desde el ingreso.</div>'
    +'<div class="card"><table><thead><tr><th>Empleado</th><th class="r">Cesantías</th><th class="r">Int. cesantías</th><th class="r">Prima</th><th class="r">Vacaciones</th><th class="r">Total</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

  }
}
function inactivarEmp(){if(!_fe||!_fe.id)return;if(!confirm('¿Inactivar a '+_fe.nombre_completo+'? Deja de aparecer en nómina, pero se conserva el histórico.'))return;
  fetch(SB+"/rest/v1/empleados?id=eq."+_fe.id,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},H),body:JSON.stringify({activo:false})})
    .then(function(r){if(!r.ok)throw 0;toast("Empleado inactivado");cerrarFicha();cargar();}).catch(function(){toast("Error");});
}

// init
var MESN={ene:'01',feb:'02',mar:'03',abr:'04',may:'05',jun:'06',jul:'07',ago:'08',sep:'09',oct:'10',nov:'11',dic:'12'};
function histKey(q){var p=(q||'').split(' ');var y=+p[2]||0,mo=+(MESN[p[1]]||0),q2=(p[0]||'').indexOf('16')===0?2:1;return y*100+mo*2+q2;}
function renderHistorial(v){
  v.innerHTML='<div class="hint">Cargando historial…</div>';
  fetch(SB+"/rest/v1/nomina?select=quincena,valor,pagado",{headers:H}).then(function(r){return r.json();}).then(function(rows){
    var g={};(Array.isArray(rows)?rows:[]).forEach(function(n){var q=n.quincena||'—';if(!g[q])g[q]={q:q,n:0,tot:0,pag:0};g[q].n++;g[q].tot+=(+n.valor||0);if(n.pagado)g[q].pag++;});
    var arr=Object.keys(g).map(function(k){return g[k];}).sort(function(a,b){return histKey(b.q)-histKey(a.q);});
    if(!arr.length){v.innerHTML='<div class="hint">Aún no hay quincenas registradas.</div>';return;}
    var body=arr.map(function(x){
      var est=x.pag===x.n?'<span class="badge pill-pag">Pagada</span>':(x.pag>0?'<span class="badge" style="background:#fdf0d8;color:#8a5a06">Parcial '+x.pag+'/'+x.n+'</span>':'<span class="badge" style="background:#eef0f3;color:#777">Liquidada</span>');
      return '<tr style="cursor:pointer" onclick="irCiclo(\''+x.q.replace(/'/g,"")+'\')"><td class="nm">'+esc(x.q)+'</td><td class="r">'+x.n+'</td><td class="r tot">'+fmt(x.tot)+'</td><td class="r">'+est+'</td></tr>';
    }).join("");
    v.innerHTML='<div class="hint">Todas las quincenas registradas, ordenadas de la más reciente. Toca una para ver su detalle y recibos — queda <strong>congelada</strong>: no cambia aunque hoy inactives empleados.</div>'
      +'<div class="card"><table><thead><tr><th>Quincena</th><th class="r">Personas</th><th class="r">Total</th><th class="r">Estado</th></tr></thead><tbody>'+body+'</tbody></table></div>';
  }).catch(function(){v.innerHTML='<div class="hint" style="color:var(--red)">Error al cargar el historial.</div>';});
}
function irCiclo(q){var p=q.split(' ');var y=p[2]||'2026',mo=MESN[p[1]]||'01',q2=(p[0]||'').indexOf('16')===0?'2':'1';
  document.getElementById("mes").value=y+'-'+mo;document.getElementById("quin").value=q2;setTab('nomina');cargar();}
var d=new Date();document.getElementById("mes").value=d.toISOString().slice(0,7);
document.getElementById("quin").value='1';
document.getElementById("mes").addEventListener("change",cargar);
document.getElementById("quin").addEventListener("change",cargar);
document.getElementById("ov-ficha").addEventListener("click",function(e){if(e.target===this)cerrarFicha();});
document.getElementById("ov-recibo").addEventListener("click",function(e){if(e.target===this)cerrarRecibo();});
cargar();
</script>
</body>
