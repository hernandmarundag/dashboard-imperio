<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Weliving · Flujo de caja</title>
<style>
:root{--indigo:#4f46e5;--purple:#7c5cf0;--ok:#16a34a;--danger:#dc2626;--warn:#d97706;--ink:#1b2030;--muted:#6b7280;--faint:#9aa2b1;--line:#e6e8f0;--bg:#f4f5f8;--surface:#fff;--r:16px;--shadow:0 1px 2px rgba(16,24,40,.04),0 4px 14px rgba(16,24,40,.04)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:40px}
.top{background:linear-gradient(120deg,var(--indigo),var(--purple));color:#fff;padding:20px}
.top h1{font-size:20px;font-weight:800}
.top .d{font-size:12.5px;opacity:.9;margin-top:3px}
.wrap{max-width:1120px;margin:0 auto;padding:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.kc .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
.kc .v{font-size:22px;font-weight:800;margin-top:5px;font-variant-numeric:tabular-nums}
.kc .n{font-size:11px;color:var(--faint);margin-top:3px}
.kc.green .v{color:var(--ok)}.kc.red .v{color:var(--danger)}.kc.amber .v{color:var(--warn)}.kc.purp .v{color:var(--indigo)}
.kc input{font-size:20px;font-weight:800;border:1px solid #cbd2e0;border-radius:8px;padding:4px 8px;width:100%;font-variant-numeric:tabular-nums;color:var(--indigo)}
.sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.sec h2{font-size:15px;font-weight:800;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.note{font-size:12px;color:var(--muted);margin:2px 0 10px}
.tblwrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
.tblwrap table{min-width:520px}
th,td{padding:9px 10px;text-align:left;border-top:1px solid #f0f1f6;vertical-align:middle}
th{background:#fafbff;color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
tr.neg td{background:#fef2f2}
tr.grand td{background:var(--ink);color:#fff;font-weight:800}
.b{border:1.5px solid var(--ok);background:#fff;color:var(--ok);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.b.red{border-color:var(--danger);color:var(--danger)}
.b:active{transform:translateY(1px)}
.pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px}
.pill.due{background:#fee2e2;color:#991b1b}.pill.soon{background:#fef3c7;color:#92400e}.pill.ok{background:#dcfce7;color:#166534}
.add{border:1.5px dashed #cbd2e0;background:#fff;color:var(--indigo);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:700;cursor:pointer;margin-top:8px}
.form{display:none;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:end}
.form.on{display:flex}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.fld input{border:1px solid #cbd2e0;border-radius:8px;padding:7px 9px;font-size:13px}
.save{background:var(--indigo);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer}
.loading{text-align:center;padding:50px;color:var(--muted)}
.retry{background:var(--indigo);color:#fff;border:none;border-radius:11px;padding:10px 18px;font-weight:700;cursor:pointer;margin-top:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a7340;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:9;pointer-events:none}
.toast.on{opacity:1}.toast.err{background:var(--danger)}
.alert{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13.5px;color:#9a3412}
.alert b{color:#7c2d12}
.abin{width:110px;border:1px solid #cbd2e0;border-radius:6px;padding:4px 7px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;background:#fffdf5}
.abin:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
</style></head>
<body>
<div class="top"><h1>💵 Weliving · Flujo de caja</h1><div class="d">qué debes · cuándo · qué esperas cobrar · saldo proyectado</div></div>
<div class="wrap"><div id="body"><div class="loading"><div style="font-size:30px">⏳</div><p style="margin-top:8px">Cargando flujo…</p></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SB_URL='https://dghmgaaprlzpfnpsqzav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
const SBH={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
var CAJA=0,PAG=[],ING=[];
function fmt(n){n=Math.round(+n||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString('es-CO');}
function num(v){return parseInt(String(v).replace(/[^0-9-]/g,''))||0;}
function g(u){return fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(function(r){return r.json();});}
function post(p,b){return fetch(SB_URL+'/rest/v1/'+p,{method:'POST',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=representation'}),body:JSON.stringify(b)});}
function patch(p,b){return fetch(SB_URL+'/rest/v1/'+p,{method:'PATCH',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=minimal'}),body:JSON.stringify(b)});}
function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.classList.toggle('err',!!e);t.classList.add('on');setTimeout(function(){t.classList.remove('on');},1600);}
function hoy(){return new Date().toISOString().slice(0,10);}
function dias(f){if(!f)return 9999;return Math.round((new Date(f)-new Date(hoy()))/86400000);}
function pillFecha(f){var d=dias(f);if(d<0)return '<span class="pill due">Vencido</span>';if(d<=7)return '<span class="pill due">'+d+'d</span>';if(d<=21)return '<span class="pill soon">'+d+'d</span>';return '<span class="pill ok">'+d+'d</span>';}
function boot(){
 document.getElementById('body').innerHTML='<div class="loading"><div style="font-size:30px">⏳</div><p style="margin-top:8px">Cargando flujo…</p></div>';
 Promise.all([
  g('caja_obra?obra=eq.weliving'),
  g('pagos_proyectados?obra=eq.weliving&order=fecha'),
  g('ingresos_esperados?obra=eq.weliving&order=fecha'),
  g('requisiciones?obra=eq.weliving&estado=eq.aprobado&pagado=eq.false&order=fecha')
 ]).then(function(r){CAJA=(r[0]&&r[0][0]?+r[0][0].saldo:0)||0;PAG=r[1]||[];ING=r[2]||[];
   var rq=(r[3]||[]).map(function(x){return {id:'rq'+x.id,concepto:'📋 '+(x.proveedor||'')+' · '+(x.descripcion||''),monto:x.valor,fecha:x.fecha,fase:x.etapa||'Requisición',estado:'pendiente',_rq:true};});
   PAG=PAG.concat(rq);render();})
 .catch(function(){document.getElementById('body').innerHTML='<div class="loading"><div style="font-size:32px">⚠️</div><p style="margin:10px 0">No pude conectar a la base.</p><button class="retry" onclick="boot()">↻ Reintentar</button></div>';});
}
function pend(){return PAG.filter(function(p){return p.estado!=='pagado';});}
function esper(){return ING.filter(function(i){return i.estado!=='recibido';});}
function sum(a,k){return a.reduce(function(s,x){return s+(+x[k]||0);},0);}
function saldoDe(p){return Math.max(0,(+p.monto||0)-(+p.pagado_parcial||0));}
function render(){
 var porPagar=pend().reduce(function(s,p){return s+saldoDe(p);},0),porCobrar=sum(esper(),'monto'),saldoProy=CAJA+porCobrar-porPagar;
 var pag7=pend().filter(function(p){return dias(p.fecha)<=7;}).reduce(function(s,p){return s+saldoDe(p);},0);
 var alerta='';
 if(pag7>0){alerta='<div class="alert">⚠️ En los próximos 7 días necesitas <b>'+fmt(pag7)+'</b> para pagos. Caja hoy: <b>'+fmt(CAJA)+'</b>. '+(CAJA<pag7?'<b style="color:#b91c1c">Falta '+fmt(pag7-CAJA)+'</b>.':'Alcanza.')+'</div>';}
 var cards='<div class="cards">'+
  '<div class="kc purp"><div class="l">💵 Caja hoy</div><input id="caja" value="'+CAJA+'" onchange="saveCaja(this)"><div class="n">edítala con lo real</div></div>'+
  '<div class="kc red"><div class="l">🔴 Por pagar</div><div class="v">'+fmt(porPagar)+'</div><div class="n">'+pend().length+' pagos pendientes</div></div>'+
  '<div class="kc green"><div class="l">🟢 Por cobrar / entrar</div><div class="v">'+fmt(porCobrar)+'</div><div class="n">'+esper().length+' ingresos esperados</div></div>'+
  '<div class="kc '+(saldoProy<0?'red':'green')+'"><div class="l">📊 Saldo proyectado</div><div class="v">'+fmt(saldoProy)+'</div><div class="n">caja + por cobrar − por pagar</div></div>'+
 '</div>';
 // POR PAGAR
 var pr=pend().slice().sort(function(a,b){return (a.fecha||'')<(b.fecha||'')?-1:1;});
 var pagRows=pr.map(function(p){
   var sal=saldoDe(p),ab=(+p.pagado_parcial||0),rq=p._rq;
   var montoCell=fmt(p.monto)+(rq?'':'<div class="note" style="margin:3px 0 0">Abonado <input class="abin" value="'+ab+'" onchange="setAbono(\''+p.id+'\',this)"> · saldo <b>'+fmt(sal)+'</b></div>');
   var btns=rq?'<button class="b" onclick="pagar(\''+p.id+'\')">✓ Pagado</button>':'<button class="b" onclick="pagar(\''+p.id+'\')">✓ Todo</button>';
   return '<tr><td>'+(p.fecha||'—')+' '+pillFecha(p.fecha)+'</td><td>'+(p.concepto||'')+'</td><td class="muted" style="font-size:11px">'+(p.fase||'')+'</td><td class="n">'+montoCell+'</td><td>'+btns+'</td></tr>';
 }).join('')||'<tr><td colspan="5" class="note" style="text-align:center;padding:16px">Sin pagos pendientes.</td></tr>';
 var secPagar='<div class="sec"><h2>🔴 Cuentas por pagar</h2><div class="note">Deudas y pagos programados. Puedes <b>abonar parcial</b> (escribe lo abonado y editas cuando quieras) o "✓ Todo". Al pagar completo salen del flujo.</div><div class="tblwrap"><table><tr><th>Fecha</th><th>Concepto</th><th>Etapa</th><th class="n">Monto</th><th></th></tr>'+pagRows+'<tr class="grand"><td colspan="3">TOTAL POR PAGAR</td><td class="n">'+fmt(porPagar)+'</td><td></td></tr></table></div>'+
   '<button class="add" onclick="tog(\'fp\')">＋ Agregar pago / deuda</button>'+
   '<div class="form" id="fp"><div class="fld"><label>Concepto</label><input id="fp-c" placeholder="Ej: Nómina quincena"></div><div class="fld"><label>Monto</label><input id="fp-m" placeholder="$"></div><div class="fld"><label>Fecha</label><input id="fp-f" type="date" value="'+hoy()+'"></div><div class="fld"><label>Etapa</label><input id="fp-e" placeholder="Estructura / Gris..."></div><button class="save" onclick="addPago()">Guardar</button></div></div>';
 // POR COBRAR
 var ir=esper().slice().sort(function(a,b){return (a.fecha||'')<(b.fecha||'')?-1:1;});
 var ingRows=ir.map(function(i){return '<tr><td>'+(i.fecha||'—')+' '+pillFecha(i.fecha)+'</td><td>'+(i.fuente||'')+(i.concepto?' · '+i.concepto:'')+'</td><td class="n">'+(i.probabilidad!=null?i.probabilidad+'%':'')+'</td><td class="n">'+fmt(i.monto)+'</td><td><button class="b" onclick="cobrar('+i.id+')">✓ Recibido</button></td></tr>';}).join('')||'<tr><td colspan="5" class="note" style="text-align:center;padding:16px">Sin ingresos cargados. Agrega lo que esperas recibir y cuándo.</td></tr>';
 var secCobrar='<div class="sec"><h2>🟢 Ingresos esperados</h2><div class="note">De dónde y cuándo esperas plata (inversionistas, ventas, aportes). % = qué tan seguro.</div><div class="tblwrap"><table><tr><th>Fecha</th><th>Fuente</th><th class="n">Prob.</th><th class="n">Monto</th><th></th></tr>'+ingRows+'<tr class="grand"><td colspan="3">TOTAL POR COBRAR</td><td class="n">'+fmt(porCobrar)+'</td><td></td></tr></table></div>'+
   '<button class="add" onclick="tog(\'fi\')">＋ Agregar ingreso esperado</button>'+
   '<div class="form" id="fi"><div class="fld"><label>Fuente</label><input id="fi-s" placeholder="Ej: Inversionista X / Venta apto"></div><div class="fld"><label>Concepto</label><input id="fi-c" placeholder="Detalle"></div><div class="fld"><label>Monto</label><input id="fi-m" placeholder="$"></div><div class="fld"><label>Fecha</label><input id="fi-f" type="date" value="'+hoy()+'"></div><div class="fld"><label>Prob. %</label><input id="fi-p" value="100"></div><button class="save" onclick="addIngreso()">Guardar</button></div></div>';
 // PROYECCION timeline
 var mov=[];pend().forEach(function(p){mov.push({f:p.fecha,c:p.concepto,e:+p.monto||0,i:0});});esper().forEach(function(x){mov.push({f:x.fecha,c:(x.fuente||'')+(x.concepto?' · '+x.concepto:''),e:0,i:+x.monto||0});});
 mov.sort(function(a,b){return (a.f||'9999')<(b.f||'9999')?-1:1;});
 var saldo=CAJA;var proyRows='<tr><td>Hoy '+hoy()+'</td><td>Caja inicial</td><td class="n"></td><td class="n"></td><td class="n">'+fmt(saldo)+'</td></tr>';
 mov.forEach(function(m){saldo+=m.i-m.e;proyRows+='<tr class="'+(saldo<0?'neg':'')+'"><td>'+(m.f||'—')+'</td><td>'+m.c+'</td><td class="n" style="color:var(--danger)">'+(m.e?'-'+fmt(m.e):'')+'</td><td class="n" style="color:var(--ok)">'+(m.i?fmt(m.i):'')+'</td><td class="n"><b>'+fmt(saldo)+'</b></td></tr>';});
 var secProy='<div class="sec"><h2>📅 Proyección de saldo</h2><div class="note">Ordenado por fecha. El saldo en rojo = te quedas sin caja ese día; ahí tienes que conseguir plata antes.</div><div class="tblwrap"><table><tr><th>Fecha</th><th>Movimiento</th><th class="n">Egreso</th><th class="n">Ingreso</th><th class="n">Saldo</th></tr>'+proyRows+'</table></div></div>';
 document.getElementById('body').innerHTML=alerta+cards+secPagar+secCobrar+secProy;
}
function tog(id){document.getElementById(id).classList.toggle('on');}
function saveCaja(el){CAJA=num(el.value);patch('caja_obra?obra=eq.weliving',{saldo:CAJA,actualizado:hoy()}).then(function(){toast('Caja actualizada ✓');render();}).catch(function(){toast('Error',true);});}
function addPago(){var c=(document.getElementById('fp-c').value||'').trim(),m=num(document.getElementById('fp-m').value),f=document.getElementById('fp-f').value,e=(document.getElementById('fp-e').value||'').trim();if(!m){toast('Pon el monto',true);return;}post('pagos_proyectados',{obra:'weliving',concepto:c||'Pago',monto:m,fecha:f||null,fase:e||null,estado:'pendiente'}).then(function(r){return r.json();}).then(function(rows){PAG.push((rows&&rows[0])||{});toast('Pago agregado ✓');render();}).catch(function(){toast('Error',true);});}
function addIngreso(){var s=(document.getElementById('fi-s').value||'').trim(),c=(document.getElementById('fi-c').value||'').trim(),m=num(document.getElementById('fi-m').value),f=document.getElementById('fi-f').value,p=num(document.getElementById('fi-p').value);if(!m){toast('Pon el monto',true);return;}post('ingresos_esperados',{obra:'weliving',fuente:s||'Ingreso',concepto:c||null,monto:m,fecha:f||null,probabilidad:p||100,estado:'esperado'}).then(function(r){return r.json();}).then(function(rows){ING.push((rows&&rows[0])||{});toast('Ingreso agregado ✓');render();}).catch(function(){toast('Error',true);});}
function pagar(id){id=String(id);var p=PAG.find(function(x){return String(x.id)===id;});if(p)p.estado='pagado';
 if(id.indexOf('rq')===0){patch('requisiciones?id=eq.'+id.slice(2),{pagado:true,fecha_pago:hoy()}).then(function(){toast('Requisición pagada ✓');boot();}).catch(function(){toast('Error',true);});}
 else{if(p)p.pagado_parcial=(+p.monto||0);patch('pagos_proyectados?id=eq.'+id,{estado:'pagado',pagado_parcial:(p?(+p.monto||0):0)}).then(function(){toast('Marcado pagado ✓');render();}).catch(function(){toast('Error',true);});}}
function setAbono(id,el){id=String(id);var p=PAG.find(function(x){return String(x.id)===id;});if(!p)return;var m=Math.max(0,num(el.value));var full=m>=(+p.monto||0);p.pagado_parcial=m;p.estado=full?'pagado':'pendiente';patch('pagos_proyectados?id=eq.'+id,{pagado_parcial:m,estado:(full?'pagado':'pendiente')}).then(function(){toast(full?'Pago completado ✓':'Abono guardado ✓');render();}).catch(function(){toast('Error',true);});}
function cobrar(id){var i=ING.find(function(x){return x.id===id;});if(i)i.estado='recibido';patch('ingresos_esperados?id=eq.'+id,{estado:'recibido'}).then(function(){toast('Marcado recibido ✓');render();}).catch(function(){toast('Error',true);});}
boot();
</script>
</body></html>
