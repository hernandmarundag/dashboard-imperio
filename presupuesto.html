<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weliving · Presupuesto para terminar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5f8;color:#1b2030;font-size:15px;padding-bottom:40px}
.top{background:linear-gradient(120deg,#4f46e5,#7c5cf0);color:#fff;padding:20px 20px 16px}
.top h1{font-size:20px;font-weight:800}
.top .d{font-size:12.5px;opacity:.92;margin-top:3px}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tab{padding:9px 15px;border-radius:11px;background:rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;border:none}
.tab.on{background:#fff;color:#4f46e5}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kc{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:15px 16px}
.kc .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:#8a90a6;font-weight:700}
.kc .v{font-size:22px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.kc .n{font-size:11px;color:#a7adbf;margin-top:3px}
.kc.ink .v{color:#1b2030}.kc.green .v{color:#16a34a}.kc.red .v{color:#dc2626}.kc.amber .v{color:#d97706}.kc.purp .v{color:#4f46e5}
.sec{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:16px;margin-bottom:16px}
.sec h2{font-size:15px;font-weight:800;margin-bottom:12px}
.hidden{display:none}
.fase{margin-bottom:12px}
.faseh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;color:#fff;font-weight:800;cursor:pointer;font-size:14px}
.cap{border:1px solid #eef0f6;border-radius:11px;margin:8px 0;overflow:hidden}
.caph{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:#f7f8fc;cursor:pointer;font-weight:700;font-size:13.5px}
.caph .r{color:#4f46e5;font-variant-numeric:tabular-nums}
.items{padding:0}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:8px 13px;text-align:left;border-top:1px solid #f0f1f6}
th{background:#fafbff;color:#8a90a6;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
.catbar{color:#fff;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 13px;border-radius:9px;margin:14px 0 8px}
.pill{display:inline-block;background:#eef0fe;color:#4f46e5;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.muted{color:#a7adbf}
.chartbox{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:16px;margin-bottom:16px}
.note{font-size:12px;color:#8a90a6;margin-top:8px}
.loading{text-align:center;padding:50px;color:#8a90a6}
</style></head>
<body>
<div class="top">
  <h1>🏗 Weliving · Presupuesto para terminar</h1>
  <div class="d">Edificio 8 pisos · ~20 apartamentos · 24 baños · en vivo desde tu base</div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-t="resumen">📊 Resumen</button>
    <button class="tab" data-t="obra">🧱 Obra por etapa</button>
    <button class="tab" data-t="cant">📐 Cantidades clave</button>
    <button class="tab" data-t="dot">🛋 Dotación Airbnb</button>
  </div>
</div>
<div class="wrap">
  <div id="body"><div class="loading">Cargando presupuesto… ⏳</div></div>
</div>
<script>
const SB_URL='https://dghmgaaprlzpfnpsqzav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
const SBH={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
var CAPS=[],ITEMS=[],GAS=[],DOT=[],CUR='resumen',chart=null;
function fmt(n){n=Math.round(+n||0);return '$'+n.toLocaleString('es-CO');}
function g(u){return fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(function(r){return r.json();});}
var GC={'NEGRA':'#111827','GRIS':'#0ea5a3','BLANCA':'#7c5cf0','INDIRECTOS':'#d97706'};
function grupoDe(nm){return (nm||'').split(' · ')[0];}
function capTit(nm){var p=(nm||'').split(' · ');return p.length>1?p.slice(1).join(' · '):nm;}
function totalObra(){return CAPS.reduce(function(a,c){return a+(+c.ppto||0);},0);}
function gastado(){return GAS.reduce(function(a,x){return a+(+x.monto||0);},0);}
function porFase(){var m={};CAPS.forEach(function(c){var gr=grupoDe(c.nombre);m[gr]=(m[gr]||0)+(+c.ppto||0);});return m;}
function dotTotal(){return DOT.reduce(function(a,d){var q=d.es_comun?(+d.cant_apto||0):(+d.cant_apto||0)*20;return a+(+d.precio||0)*q;},0);}
function dotPend(){return DOT.filter(function(d){return !d.precio;}).length;}

function boot(){
 Promise.all([
  g('presupuesto_caps?obra_id=eq.weliving&order=orden'),
  g('presupuesto_items?obra_id=eq.weliving&order=id'),
  g('gastos?obra=eq.weliving&select=monto&limit=2000'),
  g('dotacion_airbnb?order=orden')
 ]).then(function(r){CAPS=r[0]||[];ITEMS=r[1]||[];GAS=r[2]||[];DOT=r[3]||[];render();})
 .catch(function(e){document.getElementById('body').innerHTML='<div class="loading">No pude conectar a la base. Revisa el internet.<br><span style="font-size:11px">('+e+')</span></div>';});
}
function render(){
 var b=document.getElementById('body');
 if(CUR==='resumen')b.innerHTML=vResumen();
 else if(CUR==='obra')b.innerHTML=vObra();
 else if(CUR==='cant')b.innerHTML=vCant();
 else b.innerHTML=vDot();
 attach();
 if(CUR==='resumen')drawChart();
}
function vResumen(){
 var to=totalObra(),ej=gastado(),fa=to-ej,dt=dotTotal(),dp=dotPend();
 var dotv=dt>0?fmt(dt):'Por cotizar';
 var gt=dt>0?fmt(to+dt):'Obra + dotación';
 var cards='<div class="cards">'+
  card('ink','Presupuesto total obra',fmt(to),'todas las etapas para terminar')+
  card('green','Ejecutado a la fecha',fmt(ej),GAS.length+' gastos reales')+
  card('red','Falta por ejecutar',fmt(fa),'de aquí al final')+
  card('amber','Dotación Airbnb',dotv,dp+' ítems por cotizar')+
  card('purp','Gran total estimado',gt,'obra + dotación')+
  card('ink','Apartamentos','20 · 24 baños','base de cantidades')+
 '</div>';
 var chart='<div class="chartbox"><h2 style="font-size:15px;font-weight:800;margin-bottom:10px">Presupuesto por etapa</h2><div style="height:260px"><canvas id="cv"></canvas></div></div>';
 return cards+chart;
}
function card(cls,l,v,n){return '<div class="kc '+cls+'"><div class="l">'+l+'</div><div class="v">'+v+'</div><div class="n">'+n+'</div></div>';}
function drawChart(){
 var m=porFase();var labels=['NEGRA','GRIS','BLANCA','INDIRECTOS'].filter(function(k){return m[k];});
 var data=labels.map(function(k){return m[k];});var cols=labels.map(function(k){return GC[k];});
 var ctx=document.getElementById('cv');if(!ctx)return;if(chart)chart.destroy();
 chart=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:cols,borderRadius:8}]},
  options:{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return fmt(c.raw);}}}},
   scales:{x:{ticks:{callback:function(v){return '$'+(v/1e6)+'M';}}}},maintainAspectRatio:false}});
}
function vObra(){
 var m=porFase();var orden=['NEGRA','GRIS','BLANCA','INDIRECTOS'];
 var html='';
 orden.forEach(function(gr){
  if(!m[gr])return;
  var caps=CAPS.filter(function(c){return grupoDe(c.nombre)===gr;});
  html+='<div class="fase"><div class="faseh" style="background:'+GC[gr]+'" onclick="tog(this)"><span>'+gr+' · '+caps.length+' capítulos</span><span>'+fmt(m[gr])+'</span></div><div class="fbody">';
  caps.forEach(function(c){
   var its=ITEMS.filter(function(i){return i.cap_num===c.num;});
   html+='<div class="cap"><div class="caph" onclick="tog(this)"><span>'+capTit(c.nombre)+'</span><span class="r">'+fmt(c.ppto)+'</span></div><div class="items hidden">';
   if(its.length){html+='<table><tr><th>Ítem</th><th>Und</th><th class="n">Cant</th><th class="n">Precio</th><th class="n">Total</th></tr>';
    its.forEach(function(i){html+='<tr><td>'+(i.descripcion||'')+'</td><td class="muted">'+(i.und||'')+'</td><td class="n">'+(i.cant||'')+'</td><td class="n">'+(i.punit?fmt(i.punit):'—')+'</td><td class="n">'+(i.total?fmt(i.total):'—')+'</td></tr>';});
    html+='</table>';}
   else html+='<div class="note" style="padding:10px 13px">Sin ítems cargados — por presupuestar.</div>';
   html+='</div></div>';
  });
  html+='</div></div>';
 });
 return '<div class="sec"><h2>Obra por etapa · toca para desplegar</h2>'+html+'</div>';
}
function vCant(){
 var uds=['und','m2','ml'];
 var its=ITEMS.filter(function(i){return uds.indexOf((i.und||'').toLowerCase())>=0;});
 var byc={};its.forEach(function(i){var c=CAPS.find(function(x){return x.num===i.cap_num;});var k=c?capTit(c.nombre):i.cap_num;(byc[k]=byc[k]||[]).push(i);});
 var html='<div class="sec"><h2>Cantidades clave para compras <span class="pill">'+its.length+' ítems</span></h2><div class="note" style="margin-bottom:10px">Puertas, ventanas, cabinas, aparatos, salidas eléctricas/hidráulicas, closets… para que no se olvide nada al comprar.</div>';
 Object.keys(byc).forEach(function(k){
  html+='<div class="catbar" style="background:#0ea5a3">'+k+'</div><table><tr><th>Ítem</th><th>Und</th><th class="n">Cantidad</th></tr>';
  byc[k].forEach(function(i){html+='<tr><td>'+(i.descripcion||'')+'</td><td class="muted">'+(i.und||'')+'</td><td class="n">'+(i.cant||'')+'</td></tr>';});
  html+='</table>';
 });
 return html+'</div>';
}
function vDot(){
 var cats={},oc=[];DOT.forEach(function(d){if(!cats[d.categoria]){cats[d.categoria]=[];oc.push(d.categoria);}cats[d.categoria].push(d);});
 var dt=dotTotal(),dp=dotPend();
 var head='<div class="cards"><div class="kc amber"><div class="l">Dotación · total</div><div class="v">'+(dt>0?fmt(dt):'Por cotizar')+'</div><div class="n">'+DOT.length+' ítems · '+dp+' sin precio</div></div>'+
  '<div class="kc ink"><div class="l">Escala</div><div class="v">× 20 aptos</div><div class="n">zonas comunes = 1 vez</div></div></div>';
 var html='<div class="sec"><h2>Dotación tipo Airbnb</h2><div class="note" style="margin-bottom:6px">Todo lo que lleva cada apartamento amoblado (aires, colchones, menaje, chapas electrónicas…). Cotiza los precios en la base y el total se actualiza solo.</div>';
 oc.forEach(function(cat){
  var col=cat.indexOf('Comunes')>=0?'#d97706':'#4f46e5';
  html+='<div class="catbar" style="background:'+col+'">'+cat+'</div><table><tr><th>Ítem</th><th class="n">Cant/apto</th><th class="n">Cant total</th><th class="n">Precio unit</th><th class="n">Subtotal</th></tr>';
  cats[cat].forEach(function(d){var q=d.es_comun?(+d.cant_apto||0):(+d.cant_apto||0)*20;var sub=(+d.precio||0)*q;
   html+='<tr><td>'+d.item+(d.es_comun?' <span class="pill">común</span>':'')+'</td><td class="n">'+(d.cant_apto||'')+'</td><td class="n">'+q+'</td><td class="n">'+(d.precio?fmt(d.precio):'—')+'</td><td class="n">'+(d.precio?fmt(sub):'—')+'</td></tr>';});
  html+='</table>';
 });
 return head+html+'</div>';
}
function tog(el){var nx=el.nextElementSibling;if(nx)nx.classList.toggle('hidden');}
function attach(){
 document.querySelectorAll('#tabs .tab').forEach(function(t){t.onclick=function(){CUR=t.dataset.t;document.querySelectorAll('#tabs .tab').forEach(function(x){x.classList.toggle('on',x===t);});render();};});
}
boot();
</script>
</body></html>
