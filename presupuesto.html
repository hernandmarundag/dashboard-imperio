<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weliving · Presupuesto para terminar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5f8;color:#1b2030;font-size:15px;padding-bottom:40px}
.top{background:linear-gradient(120deg,#4f46e5,#7c5cf0);color:#fff;padding:20px 20px 16px}
.top h1{font-size:20px;font-weight:800}
.top .d{font-size:12.5px;opacity:.92;margin-top:3px}
.wrap{max-width:1120px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tab{padding:9px 15px;border-radius:11px;background:rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;border:none}
.tab.on{background:#fff;color:#4f46e5}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kc{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:15px 16px}
.kc .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:#8a90a6;font-weight:700}
.kc .v{font-size:21px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.kc .n{font-size:11px;color:#a7adbf;margin-top:3px}
.kc.ink .v{color:#1b2030}.kc.green .v{color:#16a34a}.kc.red .v{color:#dc2626}.kc.amber .v{color:#d97706}.kc.purp .v{color:#4f46e5}
.sec{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:16px;margin-bottom:16px}
.sec h2{font-size:15px;font-weight:800;margin-bottom:6px}
.hidden{display:none}
.fase{margin-bottom:14px}
.faseh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px 12px 0 0;color:#fff;font-weight:800;font-size:14px}
.fbar{height:8px;background:rgba(255,255,255,.25)}
.fbarf{height:100%;background:rgba(255,255,255,.9)}
.fbody{border:1px solid #eef0f6;border-top:none;border-radius:0 0 12px 12px;padding:10px}
.cap{border:1px solid #eef0f6;border-radius:11px;margin:8px 0;overflow:hidden}
.caph{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:#f7f8fc;cursor:pointer;font-weight:700;font-size:13.5px;gap:8px}
.caph .r{color:#4f46e5;font-variant-numeric:tabular-nums;white-space:nowrap}
.bar{height:7px;background:#eef0f6;overflow:hidden}
.barf{height:100%}
.capsub{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:7px 13px;font-size:12px;background:#fcfcff}
.capsub .fal{margin-left:auto;font-weight:800}
.bdg{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap}
.bdg.ok{background:#dcfce7;color:#16a34a}.bdg.cur{background:#e0e7ff;color:#4f46e5}.bdg.pen{background:#f1f5f9;color:#94a3b8}
.tg{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:5px;background:#eef0fe;color:#4f46e5;margin-right:5px}
.tg.h{background:#fde8e8;color:#c0392b}.tg.c{background:#e8eef8;color:#2451b8}.tg.f{background:#eaf6ee;color:#1a7340}
.items{padding:0}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:7px 10px;text-align:left;border-top:1px solid #f0f1f6;vertical-align:middle}
th{background:#fafbff;color:#8a90a6;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
.ped{width:96px;border:1px solid #cbd2e0;border-radius:7px;padding:4px 7px;font-size:11.5px;text-align:right;font-variant-numeric:tabular-nums;background:#fffdf5}
.ped.sm{width:62px}
.ped:focus{outline:none;border-color:#4f46e5;background:#fff}
.ib{border:1.5px solid #16a34a;background:#fff;color:#16a34a;border-radius:7px;padding:3px 8px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.ib:active{background:#16a34a;color:#fff}
.stb{border:1.5px solid;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;background:#fff}
.stb.st-por_hacer{border-color:#cbd2e0;color:#94a3b8}
.stb.st-en_curso{border-color:#4f46e5;color:#4f46e5;background:#eef0fe}
.stb.st-hecho{border-color:#16a34a;color:#16a34a;background:#dcfce7}
.addb{border:1.5px dashed #cbd2e0;background:#fff;color:#4f46e5;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;margin:8px 13px}
.catbar{color:#fff;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 13px;border-radius:9px;margin:14px 0 8px}
.pill{display:inline-block;background:#eef0fe;color:#4f46e5;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.muted{color:#a7adbf}
.chartbox{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:16px;margin-bottom:16px}
.note{font-size:12px;color:#8a90a6;margin:6px 0 10px}
.loading{text-align:center;padding:50px;color:#8a90a6}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a7340;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:9;pointer-events:none}
.toast.on{opacity:1}
</style></head>
<body>
<div class="top">
  <h1>🏗 Weliving · Presupuesto para terminar</h1>
  <div class="d">~20 aptos · 25 camas · Pagado = gastos reales · Estado físico por ítem</div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-t="resumen">📊 Resumen</button>
    <button class="tab" data-t="obra">🧱 Obra por etapa</button>
    <button class="tab" data-t="cant">📐 Cantidades clave</button>
    <button class="tab" data-t="dot">🛋 Dotación Airbnb</button>
  </div>
</div>
<div class="wrap"><div id="body"><div class="loading">Cargando presupuesto… ⏳</div></div></div>
<div class="toast" id="toast"></div>
<script>
const SB_URL='https://dghmgaaprlzpfnpsqzav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
const SBH={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
var CAPS=[],ITEMS=[],GAS=[],DOT=[],PC={},CUR='resumen',chart=null,openCaps={};
function fmt(n){n=Math.round(+n||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString('es-CO');}
function num(v){return parseInt(String(v).replace(/[^0-9-]/g,''))||0;}
function numF(v){return parseFloat(String(v).replace(/[^0-9.]/g,''))||0;}
function g(u){return fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(function(r){return r.json();});}
function patch(path,body){return fetch(SB_URL+'/rest/v1/'+path,{method:'PATCH',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=minimal'}),body:JSON.stringify(body)});}
function post(path,body){return fetch(SB_URL+'/rest/v1/'+path,{method:'POST',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=representation'}),body:JSON.stringify(body)});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},1400);}
var GC={'PROYECTO':'#334155','NEGRA':'#111827','GRIS':'#0ea5a3','BLANCA':'#7c5cf0','INDIRECTOS':'#d97706'};
var EST={por_hacer:{ic:'⚪',lbl:'Por hacer',nx:'en_curso'},en_curso:{ic:'🔵',lbl:'En curso',nx:'hecho'},hecho:{ic:'✅',lbl:'Hecho',nx:'por_hacer'}};
function estBtn(i){var e=EST[i.estado]||EST.por_hacer;return '<button class="stb st-'+(i.estado||'por_hacer')+'" onclick="cicloEstado('+i.id+')">'+e.ic+' '+e.lbl+'</button>';}
function grupoDe(nm){return (nm||'').split(' · ')[0];}
function capTit(nm){var p=(nm||'').split(' · ');return p.length>1?p.slice(1).join(' · '):nm;}
function itemsOf(c){return ITEMS.filter(function(i){return i.cap_num===c.num;});}
function capTotal(c){var its=itemsOf(c);return its.length?its.reduce(function(a,i){return a+(+i.total||0);},0):(+c.ppto||0);}
function capGasto(c){return (c.pagado_manual!=null)?(+c.pagado_manual):(PC[c.num]||0);}
function totalObra(){return CAPS.reduce(function(a,c){return a+capTotal(c);},0);}
function capEjec(c){return itemsOf(c).reduce(function(a,i){return a+(i.estado==='hecho'?(+i.total||0):0);},0);}
function ejecObra(){return CAPS.reduce(function(a,c){return a+capEjec(c);},0);}
function gastadoReal(){return GAS.reduce(function(a,x){return a+(+x.monto||0);},0);}
function porFase(){var m={};CAPS.forEach(function(c){var gr=grupoDe(c.nombre);m[gr]=(m[gr]||0)+capTotal(c);});return m;}
function ejecFase(){var m={};CAPS.forEach(function(c){var gr=grupoDe(c.nombre);m[gr]=(m[gr]||0)+capEjec(c);});return m;}
function fisicoCap(c){var its=itemsOf(c);var nH=its.filter(function(i){return i.estado==='hecho';}).length,nC=its.filter(function(i){return i.estado==='en_curso';}).length;return {nH:nH,nC:nC,nT:its.length};}
function dotQ(d){return d.es_comun?(+d.cant_apto||0):(+d.cant_apto||0)*20;}
function dotSub(d){return (+d.precio||0)*dotQ(d);}
function dotTotal(){return DOT.reduce(function(a,d){return a+dotSub(d);},0);}
function dotPagado(){return DOT.reduce(function(a,d){return a+(+d.pagado||0);},0);}

function boot(){
 Promise.all([
  g('presupuesto_caps?obra_id=eq.weliving&order=orden'),
  g('presupuesto_items?obra_id=eq.weliving&order=id'),
  g('gastos?obra=eq.weliving&select=monto,cap_num&limit=3000'),
  g('dotacion_airbnb?order=orden')
 ]).then(function(r){CAPS=r[0]||[];ITEMS=r[1]||[];GAS=r[2]||[];DOT=r[3]||[];PC={};GAS.forEach(function(x){if(x.cap_num)PC[x.cap_num]=(PC[x.cap_num]||0)+(+x.monto||0);});render();})
 .catch(function(e){document.getElementById('body').innerHTML='<div class="loading">No pude conectar a la base.<br><span style="font-size:11px">('+e+')</span></div>';});
}
function render(){var b=document.getElementById('body');
 if(CUR==='resumen')b.innerHTML=vResumen();else if(CUR==='obra')b.innerHTML=vObra();else if(CUR==='cant')b.innerHTML=vCant();else b.innerHTML=vDot();
 attach();if(CUR==='resumen')drawChart();}
function card(cls,l,v,n){return '<div class="kc '+cls+'"><div class="l">'+l+'</div><div class="v">'+v+'</div><div class="n">'+n+'</div></div>';}
function vResumen(){
 function grpTot(gr){return CAPS.filter(function(c){return grupoDe(c.nombre)===gr;}).reduce(function(x,c){return x+capTotal(c);},0);}
 var civ=grpTot('NEGRA')+grpTot('GRIS')+grpTot('BLANCA');
 var ind=grpTot('INDIRECTOS');
 var proy=grpTot('PROYECTO');
 var loteIt=ITEMS.find(function(i){return (i.descripcion||'')==='Lote';});var lote=loteIt?(+loteIt.total||0):0;
 var legales=proy-lote;
 var dot=dotTotal();
 var gran=civ+ind+lote+legales+dot;
 var to=totalObra(),ej=ejecObra(),fa=to-ej,grl=gastadoReal(),pct=to?Math.round(ej/to*100):0;
 var cards='<div class="cards">'+
  card('ink','Gran total del proyecto',fmt(gran),'todo incluido')+
  card('green','Ejecutado (físico)',fmt(ej),pct+'% de la obra')+
  card('red','Falta por gastar (obra)',fmt(fa),'desde aquí')+
  card('purp','Gastado real (control)',fmt(grl),'plata que ya salió')+'</div>';
 function frow(nm,val,col){var p=gran?(val/gran*100):0;return '<tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+col+';margin-right:7px"></span>'+nm+'</td><td class="n">'+fmt(val)+'</td><td class="n">'+p.toFixed(1)+'%</td></tr>';}
 var div='<div class="sec"><h2>💰 División del costo del proyecto</h2><div class="note">Cómo se compone el gran total. Suma exacta de todas las partes.</div><table><tr><th>Concepto</th><th class="n">Monto</th><th class="n">% del total</th></tr>'+
  frow('Obra civil directa (negra + gris + blanca)',civ,'#7c5cf0')+
  frow('Indirectos de obra (admin, imprevistos, servicios)',ind,'#d97706')+
  frow('Lote (terreno)',lote,'#334155')+
  frow('Legales y trámites (URB, EPM, licencia, escrituras…)',legales,'#0ea5a3')+
  frow('Dotación / amoblamiento',dot,'#16a34a')+
  '<tr style="font-weight:800;background:#eef0fe"><td>GRAN TOTAL DEL PROYECTO</td><td class="n">'+fmt(gran)+'</td><td class="n">100%</td></tr>'+
  '</table></div>';
 var av='<div class="chartbox"><h2 style="font-size:15px;font-weight:800;margin-bottom:10px">Avance físico vs presupuesto de obra</h2><div class="bar" style="border-radius:6px"><div class="barf" style="width:'+pct+'%;background:#16a34a"></div></div><div class="note">'+pct+'% de la obra ejecutado (físico) · <b>Falta por gastar '+fmt(fa)+'</b>. Control: llevas gastado '+fmt(grl)+' real.</div></div>';
 var chart='<div class="chartbox"><h2 style="font-size:15px;font-weight:800;margin-bottom:10px">Presupuesto por etapa</h2><div style="height:260px"><canvas id="cv"></canvas></div></div>';
 return cards+div+av+chart;
}
function drawChart(){var m=porFase();var labels=['PROYECTO','NEGRA','GRIS','BLANCA','INDIRECTOS'].filter(function(k){return m[k];});
 var data=labels.map(function(k){return m[k];});var cols=labels.map(function(k){return GC[k];});
 var ctx=document.getElementById('cv');if(!ctx)return;if(chart)chart.destroy();
 chart=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:cols,borderRadius:8}]},
  options:{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return fmt(c.raw);}}}},scales:{x:{ticks:{callback:function(v){return '$'+(v/1e6)+'M';}}}},maintainAspectRatio:false}});
}
function compTag(i,gr){if(gr!=='NEGRA')return '';var u=(i.und||'').toLowerCase();if(u==='kg')return '<span class="tg h">Hierro</span>';if(u==='m3')return '<span class="tg c">Concreto</span>';if(u==='m2')return '<span class="tg f">Formaleta</span>';return '';}
function vObra(){
 var m=porFase(),ef=ejecFase();var orden=['PROYECTO','NEGRA','GRIS','BLANCA','INDIRECTOS'];var html='';
 orden.forEach(function(gr){
  if(!m[gr])return;
  var caps=CAPS.filter(function(c){return grupoDe(c.nombre)===gr;});
  var ppF=m[gr],ejF=ef[gr]||0,pF=ppF?Math.min(100,Math.round(ejF/ppF*100)):0;
  html+='<div class="fase"><div class="faseh" style="background:'+GC[gr]+'"><span>'+gr+' · '+caps.length+' cap · '+pF+'% ejecutado</span><span>Falta por gastar '+fmt(ppF-ejF)+'</span></div><div class="fbar"><div class="fbarf" style="width:'+pF+'%"></div></div><div class="fbody">';
  caps.forEach(function(c){
   var its=itemsOf(c),tot=capTotal(c),ej=capEjec(c),pct=tot?Math.min(100,Math.round(ej/tot*100)):0,fal=tot-ej;
   var fx=fisicoCap(c);
   var badge=fx.nT===0?'':(fx.nH>=fx.nT?'<span class="bdg ok">✅ Hecho</span>':((fx.nH>0||fx.nC>0)?'<span class="bdg cur">🔵 En curso</span>':'<span class="bdg pen">⚪ Por hacer</span>'));
   var open=openCaps[c.num];
   html+='<div class="cap" data-num="'+c.num+'"><div class="caph" onclick="togCap(this)"><span>'+capTit(c.nombre)+' '+badge+'</span><span class="r">'+fmt(tot)+'</span></div>'+
    '<div class="bar"><div class="barf" style="width:'+pct+'%;background:'+GC[gr]+'"></div></div>'+
    '<div class="capsub"><b>'+fx.nH+'/'+fx.nT+' ítems hechos</b> · Ejecutado '+fmt(ej)+'<button class="ib" onclick="event.stopPropagation();todoHecho(\''+c.num+'\')">✓ Todo hecho</button><span class="fal" style="color:#dc2626">Falta por gastar '+fmt(fal)+'</span></div>'+
    '<div class="items'+(open?'':' hidden')+'">';
   if(its.length){html+='<table><tr><th>Ítem</th><th>Und</th><th class="n">Cant</th><th class="n">Precio</th><th class="n">Total</th><th>Estado físico</th></tr>';
    its.forEach(function(i){html+='<tr><td>'+compTag(i,gr)+(i.descripcion||'')+'</td><td class="muted">'+(i.und||'')+'</td>'+
      '<td class="n"><input class="ped sm" value="'+(i.cant||0)+'" onchange="saveItemCant('+i.id+',this.value)"></td>'+
      '<td class="n"><input class="ped" value="'+(i.punit||0)+'" onchange="saveItemPrecio('+i.id+',this.value)"></td>'+
      '<td class="n">'+fmt(+i.total||0)+'</td>'+
      '<td>'+estBtn(i)+'</td></tr>';});
    html+='</table>';}
   else html+='<div class="note" style="padding:10px 13px">Sin ítems.</div>';
   html+='<button class="addb" onclick="addAdicional(\''+c.num+'\')">＋ Adicional</button>';
   html+='</div></div>';
  });
  html+='</div></div>';
 });
 return '<div class="sec"><h2>Obra por etapa · físico vs pagado real</h2><div class="note">Cada ítem muestra su <b>estado físico</b> (⚪ por hacer → 🔵 en curso → ✅ hecho). El <b>Pagado</b> del capítulo viene de tus <b>gastos reales</b> (contabilidad). Si el gasto supera el presupuesto, se marca <b>Sobrecosto</b>. Editas cantidad y precio; "＋ Adicional" agrega líneas (MO, imprevistos).</div>'+html+'</div>';
}
function vCant(){
 var uds=['und','m2','ml'];var its=ITEMS.filter(function(i){return uds.indexOf((i.und||'').toLowerCase())>=0;});
 var byc={};its.forEach(function(i){var c=CAPS.find(function(x){return x.num===i.cap_num;});var k=c?capTit(c.nombre):i.cap_num;(byc[k]=byc[k]||[]).push(i);});
 var html='<div class="sec"><h2>Cantidades clave para compras <span class="pill">'+its.length+' ítems</span></h2><div class="note">Puertas, ventanas, cabinas, aparatos, salidas, closets… edita la cantidad si cambia.</div>';
 Object.keys(byc).forEach(function(k){html+='<div class="catbar" style="background:#0ea5a3">'+k+'</div><table><tr><th>Ítem</th><th>Und</th><th class="n">Cantidad</th></tr>';
  byc[k].forEach(function(i){html+='<tr><td>'+(i.descripcion||'')+'</td><td class="muted">'+(i.und||'')+'</td><td class="n"><input class="ped sm" value="'+(i.cant||0)+'" onchange="saveItemCant('+i.id+',this.value)"></td></tr>';});
  html+='</table>';});
 return html+'</div>';
}
function vDot(){
 var cats={},oc=[];DOT.forEach(function(d){if(!cats[d.categoria]){cats[d.categoria]=[];oc.push(d.categoria);}cats[d.categoria].push(d);});
 var dt=dotTotal(),dpg=dotPagado();
 var head='<div class="cards"><div class="kc amber"><div class="l">Dotación · total</div><div class="v">'+fmt(dt)+'</div><div class="n">'+DOT.length+' ítems</div></div>'+
  '<div class="kc green"><div class="l">Pagado</div><div class="v">'+fmt(dpg)+'</div><div class="n">de la dotación</div></div>'+
  '<div class="kc red"><div class="l">Falta por pagar</div><div class="v">'+fmt(dt-dpg)+'</div><div class="n">dotación</div></div></div>';
 var html='<div class="sec"><h2>Dotación tipo Airbnb</h2><div class="note">Edita cantidad/apto, precio y lo pagado. Precios de referencia Colombia (a confirmar con cotización).</div>';
 oc.forEach(function(cat){var col=cat.indexOf('Comunes')>=0?'#d97706':'#4f46e5';
  html+='<div class="catbar" style="background:'+col+'">'+cat+'</div><table><tr><th>Ítem</th><th class="n">Cant/apto</th><th class="n">Total</th><th class="n">Precio</th><th class="n">Subtotal</th><th class="n">Pagado</th><th class="n">Falta</th></tr>';
  cats[cat].forEach(function(d){var q=dotQ(d),sub=dotSub(d),pgd=+d.pagado||0,fal=sub-pgd;
   html+='<tr><td>'+d.item+(d.es_comun?' <span class="pill">común</span>':'')+'</td>'+
    '<td class="n"><input class="ped sm" value="'+(d.cant_apto||0)+'" onchange="saveDotCant('+d.id+',this.value)"></td><td class="n">'+q+'</td>'+
    '<td class="n"><input class="ped" value="'+(d.precio||'')+'" placeholder="—" onchange="saveDotPrecio('+d.id+',this.value)"></td>'+
    '<td class="n">'+(d.precio?fmt(sub):'—')+'</td>'+
    '<td class="n"><input class="ped" value="'+(d.pagado||'')+'" placeholder="0" onchange="saveDotPagado('+d.id+',this.value)"></td>'+
    '<td class="n" style="color:'+(fal>0?'#dc2626':'#16a34a')+'">'+(d.precio?fmt(fal):'—')+'</td></tr>';});
  html+='</table>';});
 return head+html+'</div>';
}
function saveItemCant(id,v){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;it.cant=numF(v);it.total=it.cant*(+it.punit||0);var c=CAPS.find(function(x){return x.num===it.cap_num;});if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{cant:it.cant,total:it.total}).then(function(){toast('Cantidad guardada ✓');}).catch(function(){toast('Error');});render();}
function saveItemPrecio(id,v){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;it.punit=num(v);it.total=(+it.cant||0)*it.punit;var c=CAPS.find(function(x){return x.num===it.cap_num;});if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{punit:it.punit,total:it.total}).then(function(){toast('Precio guardado ✓');}).catch(function(){toast('Error');});render();}
function cicloEstado(id){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;it.estado=(EST[it.estado]||EST.por_hacer).nx;var c=CAPS.find(function(x){return x.num===it.cap_num;});if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{estado:it.estado}).then(function(){toast('Estado: '+(EST[it.estado]||EST.por_hacer).lbl);}).catch(function(){toast('Error');});render();}
function todoHecho(numc){var c=CAPS.find(function(x){return x.num===numc;});if(!c)return;var its=itemsOf(c);openCaps[numc]=true;its.forEach(function(i){i.estado='hecho';patch('presupuesto_items?id=eq.'+i.id,{estado:'hecho'});});toast('Todo marcado hecho ✓');render();}
function addAdicional(numc){post('presupuesto_items',{obra_id:'weliving',cap_num:numc,descripcion:'Adicional',und:'gl',cant:1,punit:0,total:0,estado:'por_hacer'}).then(function(r){return r.json();}).then(function(rows){if(rows&&rows[0])ITEMS.push(rows[0]);openCaps[numc]=true;toast('Adicional agregado ✓');render();}).catch(function(){toast('Error');});}
function saveDotCant(id,v){var d=DOT.find(function(x){return x.id===id;});if(!d)return;d.cant_apto=numF(v);patch('dotacion_airbnb?id=eq.'+id,{cant_apto:d.cant_apto}).then(function(){toast('Guardado ✓');}).catch(function(){toast('Error');});render();}
function saveDotPrecio(id,v){var d=DOT.find(function(x){return x.id===id;});if(!d)return;var p=num(v);d.precio=p||null;patch('dotacion_airbnb?id=eq.'+id,{precio:d.precio}).then(function(){toast('Guardado ✓');}).catch(function(){toast('Error');});render();}
function saveDotPagado(id,v){var d=DOT.find(function(x){return x.id===id;});if(!d)return;d.pagado=num(v)||null;patch('dotacion_airbnb?id=eq.'+id,{pagado:d.pagado}).then(function(){toast('Guardado ✓');}).catch(function(){toast('Error');});render();}
function togCap(el){var c=el.closest('.cap');var n=c.dataset.num;openCaps[n]=!openCaps[n];var it=c.querySelector('.items');if(it)it.classList.toggle('hidden',!openCaps[n]);}
function attach(){document.querySelectorAll('#tabs .tab').forEach(function(t){t.onclick=function(){CUR=t.dataset.t;document.querySelectorAll('#tabs .tab').forEach(function(x){x.classList.toggle('on',x===t);});render();};});}
boot();
</script>
</body></html>
