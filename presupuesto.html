<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Weliving · Presupuesto del proyecto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
 --indigo:#4f46e5;--purple:#7c5cf0;
 --g-proyecto:#334155;--g-negra:#111827;--g-gris:#0ea5a3;--g-blanca:#7c5cf0;--g-indirectos:#d97706;--g-otros:#94a3b8;
 --ok:#16a34a;--danger:#dc2626;--warn:#d97706;
 --ink:#1b2030;--muted:#6b7280;--faint:#9aa2b1;--line:#e6e8f0;--bg:#f4f5f8;--surface:#fff;
 --r:16px;--shadow:0 1px 2px rgba(16,24,40,.04),0 4px 14px rgba(16,24,40,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:40px}
.top{background:linear-gradient(120deg,var(--indigo),var(--purple));color:#fff;padding:20px 20px 16px}
.top h1{font-size:20px;font-weight:800}
.top .d{font-size:12.5px;opacity:.9;margin-top:3px}
.wrap{max-width:1120px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tab{padding:9px 15px;border-radius:11px;background:rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;border:none}
.tab.on{background:#fff;color:var(--indigo)}
/* hero KPIs */
.hero{display:grid;grid-template-columns:1.35fr 1fr;gap:12px;margin-bottom:18px}
.hero-side{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kc-hero{background:linear-gradient(135deg,var(--indigo),var(--purple));color:#fff;border-radius:18px;padding:22px 24px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 8px 24px rgba(79,70,229,.22)}
.kc-hero .l{color:rgba(255,255,255,.85);font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.kc-hero .v{font-size:32px;line-height:1.05;margin-top:8px;letter-spacing:-.5px;font-weight:800;font-variant-numeric:tabular-nums}
.kc-hero .n{color:rgba(255,255,255,.82);font-size:12px;margin-top:6px}
.kc{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.kc .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
.kc .v{font-size:19px;font-weight:800;margin-top:5px;font-variant-numeric:tabular-nums}
.kc .n{font-size:11px;color:var(--faint);margin-top:3px}
.kc.green .v{color:var(--ok)}.kc.red .v{color:var(--danger)}.kc.amber .v{color:var(--warn)}.kc.purp .v{color:var(--indigo)}.kc.ink .v{color:var(--ink)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.sec h2{font-size:15px;font-weight:800;margin-bottom:6px}
.hidden{display:none}
/* stacked composition bar */
.stack{display:flex;height:16px;border-radius:8px;overflow:hidden;margin:6px 0 14px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
.stack span{display:block;height:100%}
/* fases/caps */
.fase{margin-bottom:14px}
.faseh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:12px 12px 0 0;color:#fff;font-weight:800;font-size:15px}
.fbar{height:8px;background:rgba(255,255,255,.25)}
.fbarf{height:100%;background:rgba(255,255,255,.92);transition:width .4s ease}
.fbody{border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:10px}
.cap{border:1px solid var(--line);border-radius:11px;margin:8px 0;overflow:hidden;transition:box-shadow .15s}
.cap.open{box-shadow:0 2px 10px rgba(79,70,229,.08)}
.caph{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:#f7f8fc;cursor:pointer;font-weight:700;font-size:13.5px;gap:8px}
.caph:hover{background:#eef0fe}
.caph .r{color:var(--indigo);font-variant-numeric:tabular-nums;white-space:nowrap;display:flex;align-items:center;gap:6px}
.caph .r::after{content:'⌄';color:var(--faint);font-weight:800;transition:transform .2s}
.cap.open .caph .r::after{transform:rotate(180deg)}
.bar{height:7px;background:#eef0f6;overflow:hidden}
.barf{height:100%;transition:width .4s ease}
.capsub{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 13px;font-size:12px;background:#fcfcff;color:var(--muted)}
.capsub .fal{margin-left:auto;font-weight:800}
.bdg{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap}
.bdg.ok{background:#dcfce7;color:var(--ok)}.bdg.cur{background:#e0e7ff;color:var(--indigo)}.bdg.pen{background:#f1f5f9;color:var(--faint)}.bdg.over{background:#fef3c7;color:var(--warn)}
.tg{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:5px;margin-right:5px}
.tg.h{background:#fde8e8;color:#c0392b}.tg.c{background:#e8eef8;color:#2451b8}.tg.f{background:#eaf6ee;color:#1a7340}
.items{padding:0}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
.tblwrap table{min-width:520px}
th,td{padding:8px 10px;text-align:left;border-top:1px solid #f0f1f6;vertical-align:middle}
th{background:#fafbff;color:var(--muted);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
td.calc{background:#fafbff;color:var(--muted)}
tr.grand td{background:var(--ink);color:#fff;font-weight:800;font-size:13px;border-top:2px solid var(--indigo)}
.ped{width:96px;border:1px solid #cbd2e0;border-radius:7px;padding:5px 8px;font-size:12px;text-align:right;font-variant-numeric:tabular-nums;background:#fffdf5;transition:border-color .15s,box-shadow .15s}
.ped.sm{width:64px}
.ped:hover{border-color:var(--indigo)}
.ped:focus{outline:none;border-color:var(--indigo);background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
@keyframes saved{0%{background:#dcfce7}100%{background:#fffdf5}}
.ped.ok{animation:saved 1s ease}
.ib{border:1.5px solid var(--ok);background:#fff;color:var(--ok);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.ib:active{background:var(--ok);color:#fff}
.pb{border:1.5px solid #cbd2e0;background:#fff;color:var(--muted);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}.pb.on{border-color:var(--ok);color:var(--ok);background:#dcfce7}
.stb{border:1.5px solid;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;background:#fff}
.stb.st-por_hacer{border-color:#cbd2e0;color:var(--faint)}
.stb.st-en_curso{border-color:var(--indigo);color:var(--indigo);background:#eef0fe}
.stb.st-hecho{border-color:var(--ok);color:var(--ok);background:#dcfce7}
.addb{border:1.5px dashed #cbd2e0;background:#fff;color:var(--indigo);border-radius:9px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;margin:8px 13px}
.catbar{color:#fff;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 13px;border-radius:9px;margin:14px 0 8px}
.pill{display:inline-block;background:#eef0fe;color:var(--indigo);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.muted{color:var(--faint)}
.note{font-size:12px;color:var(--muted);margin:6px 0 10px}
.loading{text-align:center;padding:50px;color:var(--muted)}
.retry{background:var(--indigo);color:#fff;border:none;border-radius:11px;padding:10px 18px;font-weight:700;cursor:pointer;margin-top:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a7340;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:9;pointer-events:none}
.toast.on{opacity:1}.toast.err{background:var(--danger)}
@media(max-width:720px){.hero{grid-template-columns:1fr}.kc-hero .v{font-size:27px}}
@media(max-width:600px){
 .top{padding:14px 16px 12px}.top h1{font-size:17px}.wrap{padding:12px}
 .tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto}
 .hero-side{grid-template-columns:1fr 1fr}
 .ped{padding:8px 9px;font-size:14px;min-height:38px}.ped.sm{width:74px}
 .stb,.ib{padding:8px 10px;min-height:36px}
}
</style></head>
<body>
<div class="top">
  <h1>🏗 Weliving · Presupuesto del proyecto</h1>
  <div class="d">~20 aptos · 25 camas · avance físico por ítem · pagado = gastos reales</div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-t="resumen">📊 Resumen</button>
    <button class="tab" data-t="obra">🧱 Obra por etapa</button>
    <button class="tab" data-t="cant">📐 Cantidades clave</button>
    <button class="tab" data-t="dot">🛋 Dotación Airbnb</button>
  </div>
</div>
<div class="wrap"><div id="body"><div class="loading"><div style="font-size:30px">⏳</div><p style="margin-top:8px">Cargando presupuesto…</p></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SB_URL='https://dghmgaaprlzpfnpsqzav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
const SBH={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
const APTOS=20;
var CAPS=[],ITEMS=[],GAS=[],DOT=[],PC={},CUR='resumen',chart=null,openCaps={};
function fmt(n){n=Math.round(+n||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString('es-CO');}
function num(v){return parseInt(String(v).replace(/[^0-9-]/g,''))||0;}
function numF(v){return parseFloat(String(v).replace(/[^0-9.]/g,''))||0;}
function g(u){return fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(function(r){return r.json();});}
function patch(path,body){return fetch(SB_URL+'/rest/v1/'+path,{method:'PATCH',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=minimal'}),body:JSON.stringify(body)});}
function post(path,body){return fetch(SB_URL+'/rest/v1/'+path,{method:'POST',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=representation'}),body:JSON.stringify(body)});}
function toast(m,err){var t=document.getElementById('toast');t.textContent=m;t.classList.toggle('err',!!err);t.classList.add('on');setTimeout(function(){t.classList.remove('on');},1500);}
function flashOk(el){if(el){el.classList.add('ok');setTimeout(function(){el.classList.remove('ok');},1000);}}
var GC={'PROYECTO':'#334155','NEGRA':'#111827','GRIS':'#0ea5a3','BLANCA':'#7c5cf0','INDIRECTOS':'#d97706','OTROS':'#94a3b8'};
var EST={por_hacer:{ic:'⚪',lbl:'Por hacer',nx:'en_curso'},en_curso:{ic:'🔵',lbl:'En curso',nx:'hecho'},hecho:{ic:'✅',lbl:'Hecho',nx:'por_hacer'}};
function estBtn(i){var e=EST[i.estado]||EST.por_hacer;return '<button class="stb st-'+(i.estado||'por_hacer')+'" onclick="cicloEstado('+i.id+',this)">'+e.ic+' '+e.lbl+'</button>';}
function grupoDe(nm){return (nm||'').split(' · ')[0];}
function capTit(nm){var p=(nm||'').split(' · ');return p.length>1?p.slice(1).join(' · '):nm;}
function capByNum(n){return CAPS.find(function(c){return String(c.num)===String(n);});}
function itemsOf(c){return ITEMS.filter(function(i){return String(i.cap_num)===String(c.num);});}
function capTotal(c){var its=itemsOf(c);return its.length?its.reduce(function(a,i){return a+(+i.total||0);},0):(+c.ppto||0);}
function capEjec(c){return itemsOf(c).reduce(function(a,i){return a+(i.estado==='hecho'?(+i.total||0):0);},0);}
function capPagMarc(c){return itemsOf(c).reduce(function(a,i){return a+(+i.pagado||0);},0);}
function pagoBtn(i){var p=(+i.pagado||0)>0;return '<button class="pb'+(p?' on':'')+'" onclick="togPago('+i.id+',this)">'+(p?'✅ Pagado':'⬜ Pagar')+'</button>';}
function capGasto(c){return (c.pagado_manual!=null)?(+c.pagado_manual):(PC[String(c.num)]||0);}
function totalObra(){return CAPS.reduce(function(a,c){return a+capTotal(c);},0);}
function gastadoReal(){return GAS.reduce(function(a,x){return a+(+x.monto||0);},0);}
function grpTot(gr){return CAPS.filter(function(c){return grupoDe(c.nombre)===gr;}).reduce(function(x,c){return x+capTotal(c);},0);}
function dotQ(d){return d.es_comun?(+d.cant_apto||0):(+d.cant_apto||0)*APTOS;}
function dotSub(d){return (+d.precio||0)*dotQ(d);}
function dotTotal(){return DOT.reduce(function(a,d){return a+dotSub(d);},0);}
function dotPagado(){return DOT.reduce(function(a,d){return a+(+d.pagado||0);},0);}
function gastoEtapa(){var order=['PRELIMINARES','CIMENTACION','ESTRUCTURA','INDIRECTOS','SIN CLASIFICAR'];var m={};GAS.forEach(function(x){var e=(x.etapa_contable||'SIN CLASIFICAR');var o=m[e]||(m[e]={dir:0,ind:0,aju:0,rev:0,tot:0});var v=+x.monto||0;o.tot+=v;var c=(x.clase||'').toUpperCase();if(c==='DIRECTO')o.dir+=v;else if(c==='INDIRECTO')o.ind+=v;else if(c==='AJUSTE')o.aju+=v;else o.rev+=v;});return {m:m,order:order};}
function secEtapaGasto(){
 var r=gastoEtapa(),m=r.m;
 var lbl={PRELIMINARES:'Preliminares',CIMENTACION:'Cimentación',ESTRUCTURA:'Estructura',INDIRECTOS:'Indirectos','SIN CLASIFICAR':'Sin clasificar'};
 var sub={PRELIMINARES:'campamento · localización · topografía · admin inicial',CIMENTACION:'excavación · retiro · pilas · vigas cim. · bombeo · muros de contención',ESTRUCTURA:'columnas · vigas · losas P1→P4',INDIRECTOS:'seguros · SISO · servicios · admin'};
 var col={PRELIMINARES:'#334155',CIMENTACION:'#111827',ESTRUCTURA:'#7c5cf0',INDIRECTOS:'#d97706','SIN CLASIFICAR':'#94a3b8'};
 var order=r.order.filter(function(k){return m[k];});
 var tot=order.reduce(function(a,k){return a+m[k].tot;},0);
 var dir=order.reduce(function(a,k){return a+m[k].dir;},0);
 var ind=order.reduce(function(a,k){return a+m[k].ind;},0);
 var otr=tot-dir-ind;
 function p(v){return tot?(v/tot*100):0;}
 var stack='<div class="stack">'+order.map(function(k){return seg(p(m[k].tot),col[k]);}).join('')+'</div>';
 var rows=order.map(function(k){var o=m[k];return '<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+col[k]+';margin-right:8px;vertical-align:middle"></span><b>'+lbl[k]+'</b><div class="note" style="margin:2px 0 0">'+(sub[k]||'')+'</div></td><td class="n">'+fmt(o.dir)+'</td><td class="n">'+fmt(o.ind)+'</td><td class="n">'+((o.aju+o.rev)?fmt(o.aju+o.rev):'—')+'</td><td class="n"><b>'+fmt(o.tot)+'</b></td><td class="n">'+p(o.tot).toFixed(1)+'%</td></tr>';}).join('');
 return '<div class="sec"><h2>🏗 Gasto real por etapa (lógica contable)</h2><div class="note">Cada peso gastado clasificado a su etapa real, separando <b>directo de obra</b> (materiales, mano de obra, equipos) de <b>indirecto</b> (admin, seguros, SISO, servicios). Cimentación abarca toda la fundación, no solo pilas.</div>'+stack+'<div class="tblwrap"><table><tr><th>Etapa</th><th class="n">Directo</th><th class="n">Indirecto</th><th class="n">Ajuste/rev.</th><th class="n">Total</th><th class="n">%</th></tr>'+rows+'<tr class="grand"><td>TOTAL GASTADO REAL</td><td class="n">'+fmt(dir)+'</td><td class="n">'+fmt(ind)+'</td><td class="n">'+fmt(otr)+'</td><td class="n">'+fmt(tot)+'</td><td class="n">100%</td></tr></table></div><div class="note">Total conciliado con contabilidad ('+fmt(tot)+'). El mayor peso es <b>cimentación</b>: la roca y el nivel freático (registrados en la bitácora) elevaron la fundación por encima del estimado inicial.</div></div>';
}

function boot(){
 document.getElementById('body').innerHTML='<div class="loading"><div style="font-size:30px">⏳</div><p style="margin-top:8px">Cargando presupuesto…</p></div>';
 Promise.all([
  g('presupuesto_caps?obra_id=eq.weliving&order=orden'),
  g('presupuesto_items?obra_id=eq.weliving&order=id&limit=5000'),
  g('gastos?obra=eq.weliving&select=monto,cap_num,etapa_contable,clase&limit=5000'),
  g('dotacion_airbnb?order=orden&limit=1000')
 ]).then(function(r){CAPS=r[0]||[];ITEMS=r[1]||[];GAS=r[2]||[];DOT=r[3]||[];PC={};GAS.forEach(function(x){if(x.cap_num!=null)PC[String(x.cap_num)]=(PC[String(x.cap_num)]||0)+(+x.monto||0);});render();})
 .catch(function(e){document.getElementById('body').innerHTML='<div class="loading"><div style="font-size:32px">⚠️</div><p style="margin:10px 0">No pude conectar a la base. Revisa el internet.</p><button class="retry" onclick="boot()">↻ Reintentar</button></div>';});
}
function render(){var b=document.getElementById('body');
 if(CUR==='resumen')b.innerHTML=vResumen();else if(CUR==='obra')b.innerHTML=vObra();else if(CUR==='cant')b.innerHTML=vCant();else b.innerHTML=vDot();
 attach();if(CUR==='resumen')drawChart();}
function vResumen(){
 var civ=grpTot('NEGRA')+grpTot('GRIS')+grpTot('BLANCA');
 var ind=grpTot('INDIRECTOS');
 var proy=grpTot('PROYECTO');
 var proyIt=ITEMS.filter(function(i){return grupoDe((capByNum(i.cap_num)||{}).nombre)==='PROYECTO';});
 var loteIt=proyIt.find(function(i){return /lote/i.test(i.descripcion||'');});
 var lote=loteIt?(+loteIt.total||0):0;
 var legales=proy-lote;
 var dot=dotTotal();
 var otros=totalObra()-(civ+ind+proy);
 var gran=civ+ind+lote+legales+dot+otros;
 var obraT=civ+ind;
 var ej=CAPS.filter(function(c){return ['NEGRA','GRIS','BLANCA','INDIRECTOS'].indexOf(grupoDe(c.nombre))>=0;}).reduce(function(a,c){return a+capEjec(c);},0);
 var fa=obraT-ej,grl=gastadoReal(),pct=obraT?Math.round(ej/obraT*100):0;
 var pagMarc=CAPS.filter(function(c){return ['NEGRA','GRIS','BLANCA','INDIRECTOS'].indexOf(grupoDe(c.nombre))>=0;}).reduce(function(a,c){return a+capPagMarc(c);},0);
 var faPagar=obraT-pagMarc;
 var hero='<div class="hero" style="grid-template-columns:1fr"><div class="kc-hero"><div class="l">Gran total del proyecto</div><div class="v">'+fmt(gran)+'</div><div class="n">todo incluido · obra + lote + legales + dotación</div></div></div>';
 var cards='<div class="cards">'+
   kc('green','Ejecutado (físico)',fmt(ej),pct+'% construido')+
   kc('red','Falta por ejecutar',fmt(fa),'obra pendiente')+
   kc('ink','Pagado (marcado)',fmt(pagMarc),'según presupuesto')+
   kc('amber','Falta por pagar',fmt(faPagar),'por desembolsar')+
   kc('purp','Gastado real',fmt(grl),'contabilidad · control')+
   kc('green','Dotación',fmt(dot),(dot?Math.round(dot/gran*100):0)+'% del total')+
  '</div>';
 function pc(v){return gran?(v/gran*100):0;}
 var stack='<div class="stack">'+
  seg(pc(civ),'#7c5cf0')+seg(pc(ind),'#d97706')+seg(pc(lote),'#334155')+seg(pc(legales),'#0ea5a3')+seg(pc(dot),'#16a34a')+(otros?seg(pc(otros),'#94a3b8'):'')+'</div>';
 function frow(nm,val,col){return '<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+col+';margin-right:8px;vertical-align:middle"></span>'+nm+'</td><td class="n">'+fmt(val)+'</td><td class="n">'+pc(val).toFixed(1)+'%</td></tr>';}
 var div='<div class="sec"><h2>💰 División del costo del proyecto</h2><div class="note">Cómo se compone el gran total. Suma exacta de todas las partes.</div>'+stack+'<div class="tblwrap"><table><tr><th>Concepto</th><th class="n">Monto</th><th class="n">%</th></tr>'+
  frow('Obra civil directa (negra + gris + blanca)',civ,'#7c5cf0')+
  frow('Indirectos de obra (admin, imprevistos, servicios)',ind,'#d97706')+
  frow('Lote (terreno)',lote,'#334155')+
  frow('Legales y trámites (URB, EPM, licencia, escrituras…)',legales,'#0ea5a3')+
  frow('Dotación / amoblamiento',dot,'#16a34a')+
  (otros?frow('Otros (sin clasificar)',otros,'#94a3b8'):'')+
  '<tr class="grand"><td>GRAN TOTAL DEL PROYECTO</td><td class="n">'+fmt(gran)+'</td><td class="n">100%</td></tr>'+
  '</table></div></div>';
 var av='<div class="sec"><h2>📈 Avance físico de la obra</h2><div class="bar" style="border-radius:6px"><div class="barf" style="width:'+pct+'%;background:var(--ok)"></div></div><div class="note" style="margin-top:8px">'+pct+'% de la construcción ejecutado (físico) · <b>Falta por ejecutar '+fmt(fa)+'</b>. Control: llevas gastado '+fmt(grl)+' real en gastos.</div></div>';
 var chart='<div class="sec"><h2>Presupuesto por etapa</h2><div style="height:260px"><canvas id="cv"></canvas></div></div>';
 var recon=secEtapaGasto();
 return hero+cards+div+av+recon+chart;
}
function kc(cls,l,v,n){return '<div class="kc '+cls+'"><div class="l">'+l+'</div><div class="v">'+v+'</div><div class="n">'+n+'</div></div>';}
function seg(p,col){return '<span style="width:'+p+'%;background:'+col+'" title="'+p.toFixed(1)+'%"></span>';}
function drawChart(){var orden=['PROYECTO','NEGRA','GRIS','BLANCA','INDIRECTOS'];var m={};CAPS.forEach(function(c){var gr=grupoDe(c.nombre);m[gr]=(m[gr]||0)+capTotal(c);});
 var labels=orden.filter(function(k){return m[k];});var data=labels.map(function(k){return m[k];});var cols=labels.map(function(k){return GC[k];});
 var ctx=document.getElementById('cv');if(!ctx)return;if(chart)chart.destroy();
 chart=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:cols,borderRadius:8}]},
  options:{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return fmt(c.raw);}}}},scales:{x:{ticks:{callback:function(v){return '$'+(v/1e6)+'M';}}}},maintainAspectRatio:false}});
}
function compTag(i,gr){if(gr!=='NEGRA')return '';var u=(i.und||'').toLowerCase();if(u==='kg')return '<span class="tg h">Hierro</span>';if(u==='m3')return '<span class="tg c">Concreto</span>';if(u==='m2')return '<span class="tg f">Formaleta</span>';return '';}
function vObra(){
 var orden=['PROYECTO','NEGRA','GRIS','BLANCA','INDIRECTOS'];var m={},gf={};
 CAPS.forEach(function(c){var gr=grupoDe(c.nombre);m[gr]=(m[gr]||0)+capTotal(c);gf[gr]=(gf[gr]||0)+capEjec(c);});
 var html='';
 orden.forEach(function(gr){
  if(!m[gr])return;
  var caps=CAPS.filter(function(c){return grupoDe(c.nombre)===gr;});
  var ppF=m[gr],ejF=gf[gr]||0,pF=ppF?Math.min(100,Math.round(ejF/ppF*100)):0;
  html+='<div class="fase"><div class="faseh" style="background:'+GC[gr]+'"><span>'+gr+' · '+caps.length+' cap · '+pF+'% ejecutado</span><span>Falta '+fmt(ppF-ejF)+'</span></div><div class="fbar"><div class="fbarf" style="width:'+pF+'%"></div></div><div class="fbody">';
  caps.forEach(function(c){
   var its=itemsOf(c),tot=capTotal(c),ej=capEjec(c),pct=tot?Math.min(100,Math.round(ej/tot*100)):0,fal=tot-ej;
   var pgr=capGasto(c),sc=pgr-tot,pm=capPagMarc(c);
   var nH=its.filter(function(i){return i.estado==='hecho';}).length,nT=its.length;
   var badge=nT===0?'':(nH>=nT?'<span class="bdg ok">✅ Hecho</span>':(nH>0?'<span class="bdg cur">🔵 En curso</span>':'<span class="bdg pen">⚪ Por hacer</span>'));
   var open=openCaps[c.num];
   html+='<div class="cap'+(open?' open':'')+'" data-num="'+c.num+'"><div class="caph" onclick="togCap(this)"><span>'+capTit(c.nombre)+' '+badge+'</span><span class="r">'+fmt(tot)+'</span></div>'+
    '<div class="bar"><div class="barf" style="width:'+pct+'%;background:'+GC[gr]+'"></div></div>'+
    '<div class="capsub"><b>'+nH+'/'+nT+' hechos</b> · Pagado '+fmt(pm)+' · Gasto real '+fmt(pgr)+'<button class="ib" onclick="event.stopPropagation();todoHecho(\''+c.num+'\')">✓ Hecho</button><button class="ib" onclick="event.stopPropagation();todoPagado(\''+c.num+'\')">$ Pagado</button><span class="fal" style="color:'+(fal>0?'var(--danger)':'var(--ok)')+'">Falta '+fmt(fal)+'</span></div>'+
    '<div class="items'+(open?'':' hidden')+'">';
   if(its.length){html+='<div class="tblwrap"><table><tr><th>Ítem</th><th>Und</th><th class="n">Cant</th><th class="n">Precio</th><th class="n">Total</th><th>Estado</th><th>Pago</th></tr>';
    its.forEach(function(i){html+='<tr><td>'+compTag(i,gr)+(i.descripcion||'')+'</td><td class="muted">'+(i.und||'')+'</td>'+
      '<td class="n"><input class="ped sm" value="'+(i.cant||0)+'" onchange="saveItemCant('+i.id+',this)"></td>'+
      '<td class="n"><input class="ped" value="'+(i.punit||0)+'" onchange="saveItemPrecio('+i.id+',this)"></td>'+
      '<td class="n calc">'+fmt(+i.total||0)+'</td>'+
      '<td>'+estBtn(i)+'</td><td>'+pagoBtn(i)+'</td></tr>';});
    html+='</table></div>';}
   else html+='<div class="note" style="padding:14px 13px;text-align:center">Este capítulo aún no tiene ítems. Usa <b>＋ Adicional</b> para agregar el primero.</div>';
   html+='<button class="addb" onclick="addAdicional(\''+c.num+'\')">＋ Adicional</button></div></div>';
  });
  html+='</div></div>';
 });
 return '<div class="sec"><h2>🧱 Obra por etapa · físico vs pagado real</h2><div class="note">Cada ítem trae su <b>estado físico</b> (⚪→🔵→✅). El <b>gasto real</b> del capítulo viene de la contabilidad. Edita cantidad y precio; "＋ Adicional" agrega líneas (MO, imprevistos).</div>'+html+'</div>';
}
function vCant(){
 var uds=['und','m2','ml'];var its=ITEMS.filter(function(i){return uds.indexOf((i.und||'').toLowerCase())>=0;});
 var byc={};its.forEach(function(i){var c=capByNum(i.cap_num);var k=c?capTit(c.nombre):i.cap_num;(byc[k]=byc[k]||[]).push(i);});
 var html='<div class="sec"><h2>📐 Cantidades clave para compras <span class="pill">'+its.length+' ítems</span></h2><div class="note">Puertas, ventanas, cabinas, aparatos, salidas, closets… edita la cantidad si cambia.</div>';
 Object.keys(byc).forEach(function(k){html+='<div class="catbar" style="background:#0ea5a3">'+k+'</div><div class="tblwrap"><table><tr><th>Ítem</th><th>Und</th><th class="n">Cantidad</th></tr>';
  byc[k].forEach(function(i){html+='<tr><td>'+(i.descripcion||'')+'</td><td class="muted">'+(i.und||'')+'</td><td class="n"><input class="ped sm" value="'+(i.cant||0)+'" onchange="saveItemCant('+i.id+',this)"></td></tr>';});
  html+='</table></div>';});
 return html+'</div>';
}
function vDot(){
 var cats={},oc=[];DOT.forEach(function(d){if(!cats[d.categoria]){cats[d.categoria]=[];oc.push(d.categoria);}cats[d.categoria].push(d);});
 var dt=dotTotal(),dpg=dotPagado();
 var head='<div class="cards"><div class="kc purp"><div class="l">Dotación · total</div><div class="v">'+fmt(dt)+'</div><div class="n">'+DOT.length+' ítems</div></div>'+
  '<div class="kc green"><div class="l">Pagado</div><div class="v">'+fmt(dpg)+'</div><div class="n">de la dotación</div></div>'+
  '<div class="kc red"><div class="l">Falta por pagar</div><div class="v">'+fmt(dt-dpg)+'</div><div class="n">dotación</div></div></div>';
 var html='<div class="sec"><h2>🛋 Dotación tipo Airbnb</h2><div class="note">Edita cantidad/apto, precio y lo pagado. Precios de referencia Colombia (a confirmar con cotización).</div>';
 oc.forEach(function(cat){var col=cat.indexOf('Comunes')>=0?'#d97706':'#4f46e5';
  html+='<div class="catbar" style="background:'+col+'">'+cat+'</div><div class="tblwrap"><table><tr><th>Ítem</th><th class="n">Cant/apto</th><th class="n">Total</th><th class="n">Precio</th><th class="n">Subtotal</th><th class="n">Pagado</th><th class="n">Falta</th></tr>';
  cats[cat].forEach(function(d){var q=dotQ(d),sub=dotSub(d),pgd=+d.pagado||0,fal=sub-pgd;
   html+='<tr><td>'+d.item+(d.es_comun?' <span class="pill">común</span>':'')+'</td>'+
    '<td class="n"><input class="ped sm" value="'+(d.cant_apto||0)+'" onchange="saveDotCant('+d.id+',this)"></td><td class="n calc">'+q+'</td>'+
    '<td class="n"><input class="ped" value="'+(d.precio||'')+'" placeholder="—" onchange="saveDotPrecio('+d.id+',this)"></td>'+
    '<td class="n calc">'+(d.precio?fmt(sub):'—')+'</td>'+
    '<td class="n"><input class="ped" value="'+(d.pagado||'')+'" placeholder="0" onchange="saveDotPagado('+d.id+',this)"></td>'+
    '<td class="n" style="color:'+(fal>0?'var(--danger)':'var(--ok)')+'">'+(d.precio?fmt(fal):'—')+'</td></tr>';});
  html+='</table></div>';});
 return head+html+'</div>';
}
function saveItemCant(id,el){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;it.cant=numF(el.value);it.total=it.cant*(+it.punit||0);var c=capByNum(it.cap_num);if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{cant:it.cant,total:it.total}).then(function(){toast('Cantidad guardada ✓');flashOk(el);render();}).catch(function(){toast('Error al guardar',true);});}
function saveItemPrecio(id,el){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;it.punit=num(el.value);it.total=(+it.cant||0)*it.punit;var c=capByNum(it.cap_num);if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{punit:it.punit,total:it.total}).then(function(){toast('Precio guardado ✓');flashOk(el);render();}).catch(function(){toast('Error al guardar',true);});}
function cicloEstado(id,el){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;it.estado=(EST[it.estado]||EST.por_hacer).nx;var c=capByNum(it.cap_num);if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{estado:it.estado}).then(function(){toast('Estado: '+(EST[it.estado]||EST.por_hacer).lbl);render();}).catch(function(){toast('Error al guardar',true);});}
function todoHecho(numc){var c=capByNum(numc);if(!c)return;var its=itemsOf(c);openCaps[String(numc)]=true;Promise.all(its.map(function(i){i.estado='hecho';return patch('presupuesto_items?id=eq.'+i.id,{estado:'hecho'});})).then(function(){toast('Todo marcado hecho ✓');render();}).catch(function(){toast('Error al guardar',true);render();});}
function togPago(id,el){var it=ITEMS.find(function(x){return x.id===id;});if(!it)return;var p=(+it.pagado||0)>0;it.pagado=p?null:(+it.total||0);var c=capByNum(it.cap_num);if(c)openCaps[c.num]=true;patch('presupuesto_items?id=eq.'+id,{pagado:it.pagado}).then(function(){toast(it.pagado?'Marcado pagado ✓':'Pago quitado');render();}).catch(function(){toast('Error',true);});}
function todoPagado(numc){var c=capByNum(numc);if(!c)return;var its=itemsOf(c);openCaps[String(numc)]=true;Promise.all(its.map(function(i){i.pagado=+i.total||0;return patch('presupuesto_items?id=eq.'+i.id,{pagado:i.pagado});})).then(function(){toast('Capítulo pagado ✓');render();}).catch(function(){toast('Error',true);render();});}
function addAdicional(numc){post('presupuesto_items',{obra_id:'weliving',cap_num:numc,descripcion:'Adicional',und:'gl',cant:1,punit:0,total:0,estado:'por_hacer'}).then(function(r){return r.json();}).then(function(rows){if(rows&&rows[0]){ITEMS.push(rows[0]);openCaps[String(numc)]=true;toast('Adicional agregado ✓');render();}else{toast('No se pudo agregar',true);}}).catch(function(){toast('Error',true);});}
function saveDotCant(id,el){var d=DOT.find(function(x){return x.id===id;});if(!d)return;d.cant_apto=numF(el.value);patch('dotacion_airbnb?id=eq.'+id,{cant_apto:d.cant_apto}).then(function(){toast('Guardado ✓');flashOk(el);render();}).catch(function(){toast('Error',true);});}
function saveDotPrecio(id,el){var d=DOT.find(function(x){return x.id===id;});if(!d)return;var p=num(el.value);d.precio=p||null;patch('dotacion_airbnb?id=eq.'+id,{precio:d.precio}).then(function(){toast('Guardado ✓');flashOk(el);render();}).catch(function(){toast('Error',true);});}
function saveDotPagado(id,el){var d=DOT.find(function(x){return x.id===id;});if(!d)return;d.pagado=num(el.value)||null;patch('dotacion_airbnb?id=eq.'+id,{pagado:d.pagado}).then(function(){toast('Guardado ✓');flashOk(el);render();}).catch(function(){toast('Error',true);});}
function togCap(el){var c=el.closest('.cap');var n=c.dataset.num;openCaps[n]=!openCaps[n];c.classList.toggle('open',!!openCaps[n]);var it=c.querySelector('.items');if(it)it.classList.toggle('hidden',!openCaps[n]);}
function attach(){document.querySelectorAll('#tabs .tab').forEach(function(t){t.onclick=function(){CUR=t.dataset.t;document.querySelectorAll('#tabs .tab').forEach(function(x){x.classList.toggle('on',x===t);});render();};});}
boot();
</script>
</body></html>
