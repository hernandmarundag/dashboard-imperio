<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Imperio · Compras</title>
<style>
:root{--ind:#4f46e5;--ink:#1b2030;--mut:#6b7280;--line:#e6e8f0;--red:#e0463d;--amb:#d97706;--grn:#16a34a;--bg:#f4f5fb}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:14px;font-size:15px}
.wrap{max-width:820px;margin:0 auto}
.hd{text-align:center;margin:4px 0 12px}.hd h1{font-size:20px}.hd p{font-size:12px;color:var(--mut)}
.tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:5px;margin:0 auto 14px}
.tab{flex:1;text-align:center;padding:10px 6px;border-radius:9px;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;border:none;background:none}
.tab.on{background:var(--ind);color:#fff}
.tab .bdg{display:inline-block;min-width:18px;padding:0 5px;margin-left:3px;border-radius:20px;background:var(--red);color:#fff;font-size:10px;line-height:18px}
.tab.on .bdg{background:rgba(255,255,255,.3)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
.card.lft{border-left:5px solid var(--line)}
.card.rojo{border-left-color:var(--red)}.card.naranja{border-left-color:var(--amb)}.card.verde{border-left-color:var(--grn)}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.nm{font-weight:700;font-size:15px}.sub{font-size:12px;color:var(--mut);margin-top:2px}
.tag{font-size:11px;color:var(--mut)}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
.p-rojo{background:#fdeceb;color:#b42318}.p-naranja{background:#fbf1dd;color:#8a5a00}.p-verde{background:#e7f6ee;color:#15803d}
.p-gris{background:#f1f2f6;color:#666}
.money{font-weight:800;font-variant-numeric:tabular-nums}
.fg{margin-bottom:9px}.fg label{font-size:11px;color:var(--mut);display:block;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 12px;border:1.4px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn{background:var(--ind);color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:14px;font-weight:700;cursor:pointer}
.btn.s{background:#eef0f6;color:var(--ink);padding:8px 11px;font-size:13px}
.btn.g{background:var(--grn)}.btn.r{background:var(--red)}.btn.a{background:var(--amb)}
.btn.blk{display:block;width:100%;margin-top:4px}
.seg{display:flex;gap:8px;margin-bottom:10px}
.seg button{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:14px;cursor:pointer;color:var(--mut)}
.seg button.on{border-color:var(--ind);background:#eef0ff;color:var(--ind)}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
.ov{position:fixed;inset:0;background:rgba(15,16,36,.55);display:none;align-items:flex-end;justify-content:center;z-index:50}
.ov.on{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;max-width:820px;width:100%;padding:16px;max-height:94vh;overflow:auto}
.foot{position:sticky;bottom:0;background:#fff;display:flex;gap:8px;justify-content:flex-end;padding:12px 0 2px;border-top:1px solid var(--line);margin-top:12px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1b2030;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.2s;z-index:99}
.toast.on{opacity:1}
.cmp{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
.cmp.best{border-color:var(--grn);background:#f2fbf6}
.muted{color:var(--mut);text-align:center;padding:22px}
@media(max-width:560px){.frow{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<div class="hd"><h1>🛒 Imperio · Compras</h1><p>Pedir · aprobar · pagar — con semáforo por fecha de pago</p></div>
<div class="tabs">
  <button class="tab on" id="t-pedir" onclick="setTab('pedir')">Pedir</button>
  <button class="tab" id="t-aprobar" onclick="setTab('aprobar')">Aprobar <span class="bdg" id="bd-ap" style="display:none">0</span></button>
  <button class="tab" id="t-pagar" onclick="setTab('pagar')">Pagar <span class="bdg" id="bd-pg" style="display:none">0</span></button>
</div>
<div id="view"><p class="muted">Cargando…</p></div>
</div>
<div class="ov" id="ov"><div class="modal" id="mbody"></div></div>
<div class="toast" id="toast"></div>
<script>
var SB='https://dghmgaaprlzpfnpsqzav.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
var H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
var reqs=[],cots=[],provs=[],tab='pedir',cur=null,nuevoTipo='compra';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast on';setTimeout(function(){t.className='toast';},2000);}
function fmt(n){n=+n||0;return '$'+n.toLocaleString('es-CO');}
function hoy(){return new Date().toISOString().slice(0,10);}
function req(id){return reqs.find(function(x){return x.id===id;});}

function semaforo(r){
  if(r.semaforo==='rojo')return 'rojo';
  if(!r.fecha_vence)return 'verde';
  var d=Math.ceil((new Date(r.fecha_vence+'T12:00:00')-new Date())/86400000);
  if(d<=0)return 'rojo'; if(d<=3)return 'naranja'; return 'verde';
}
function pill(s){var m={rojo:'p-rojo',naranja:'p-naranja',verde:'p-verde'};var t={rojo:'🔴 Urgente',naranja:'🟠 Pronto',verde:'🟢 Con tiempo'};return '<span class="pill '+(m[s]||'p-gris')+'">'+(t[s]||s)+'</span>';}
function tipoTxt(t){return t==='pago'?'Pago a proveedor':'Compra nueva';}

function cargar(){
  Promise.all([
    fetch(SB+'/rest/v1/requisiciones?order=created_at.desc&limit=300',{headers:H}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cotizaciones_prov?order=created_at.desc',{headers:H}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/terceros?es_proveedor=eq.true&select=id,razon_social&limit=200',{headers:H}).then(function(r){return r.json();})
  ]).then(function(a){
    reqs=Array.isArray(a[0])?a[0]:[];
    cots=Array.isArray(a[1])?a[1]:[];
    provs=Array.isArray(a[2])?a[2]:[];
    var nap=reqs.filter(esSolicitada).length, npg=reqs.filter(esAprobada).length;
    badge('bd-ap',nap);badge('bd-pg',npg);
    render();
  }).catch(function(){document.getElementById('view').innerHTML='<p class="muted" style="color:var(--red)">Error de conexión.</p>';});
}
function badge(id,n){var b=document.getElementById(id);if(n){b.textContent=n;b.style.display='inline-block';}else{b.style.display='none';}}
function esSolicitada(r){return (r.estado||'')==='solicitada'||(r.estado==null&&!r.pagado&&!r.aprobada_el);}
function esAprobada(r){return (r.estado==='aprobado'||r.estado==='aprobada')&&!r.pagado;}
function esPagada(r){return !!r.pagado||r.estado==='pagada';}

function setTab(t){tab=t;['pedir','aprobar','pagar'].forEach(function(x){document.getElementById('t-'+x).className='tab'+(x===t?' on':'');});render();}
function render(){var v=document.getElementById('view');
  if(tab==='pedir')return renderPedir(v);
  if(tab==='aprobar')return renderAprobar(v);
  return renderPagar(v);
}

// ── PEDIR (ingeniero) ──
function renderPedir(v){
  v.innerHTML='<button class="btn blk" onclick="nuevo()">+ Nueva solicitud</button>'
   +'<div style="margin-top:12px">'+reqs.slice(0,30).map(cardMini).join('')+'</div>';
}
function cardMini(r){var s=semaforo(r);var est=esPagada(r)?'Pagada':esAprobada(r)?'Aprobada':'Solicitada';
  return '<div class="card lft '+s+'"><div class="row"><div><div class="nm">'+esc(r.descripcion||r.material||'—')+'</div>'
    +'<div class="sub">'+esc(tipoTxt(r.tipo))+' · '+esc(r.obra||'')+(r.cantidad?' · '+esc(r.cantidad)+' und':'')+'</div></div>'
    +'<div style="text-align:right"><div class="money">'+(r.valor?fmt(r.valor):'')+'</div><div class="tag">'+est+'</div></div></div></div>';
}
function nuevo(){cur={id:null};nuevoTipo='compra';
  document.getElementById('mbody').innerHTML=
   '<div class="row" style="margin-bottom:8px"><div style="font-weight:800;font-size:16px">Nueva solicitud</div><button class="btn s" onclick="cerrar()">✕</button></div>'
   +'<div class="seg"><button id="sg-compra" class="on" onclick="setTipo(\'compra\')">🧱 Compra nueva</button><button id="sg-pago" onclick="setTipo(\'pago\')">🧾 Pago a proveedor</button></div>'
   +'<div class="fg"><label>¿Qué necesitas? (libre)</label><input id="q-desc" placeholder="ej: madera, 34 tacos"></div>'
   +'<div class="frow"><div class="fg"><label>Cantidad</label><input id="q-cant" type="number" inputmode="decimal" placeholder="34"></div><div class="fg"><label>Obra</label><input id="q-obra" list="dl-obra" value="weliving"><datalist id="dl-obra"><option>weliving</option><option>robledo</option><option>novaeva</option></datalist></div></div>'
   +'<div class="frow"><div class="fg"><label>Etapa / capítulo (opcional)</label><input id="q-etapa" placeholder="ej: estructura"></div><div class="fg"><label>Proveedor (si aplica)</label><input id="q-prov" list="dl-prov" placeholder="opcional"><datalist id="dl-prov">'+provs.map(function(p){return '<option>'+esc(p.razon_social)+'</option>';}).join('')+'</datalist></div></div>'
   +'<div class="fg"><label>Valor estimado (opcional)</label><input id="q-valor" type="number" inputmode="numeric" placeholder="lo puede poner quien paga"></div>'
   +'<div class="fg"><label id="lb-foto">Foto de la cotización</label><div class="acts"><label class="btn s" style="cursor:pointer">📷 Foto<input type="file" accept="image/*" capture="environment" style="display:none" onchange="addFotoNueva(this)"></label><label class="btn s" style="cursor:pointer">📎 Archivo<input type="file" accept="image/*,application/pdf" style="display:none" onchange="addFotoNueva(this)"></label><span id="foto-st" class="tag"></span></div></div>'
   +'<div class="foot"><button class="btn s" onclick="cerrar()">Cancelar</button><button class="btn" onclick="guardarSolicitud()">Enviar solicitud</button></div>';
  document.getElementById('ov').className='ov on';
  window._fotos=[];
}
function setTipo(t){nuevoTipo=t;document.getElementById('sg-compra').className=(t==='compra'?'on':'');document.getElementById('sg-pago').className=(t==='pago'?'on':'');
  document.getElementById('lb-foto').textContent=(t==='pago'?'Foto de factura / cuenta de cobro':'Foto de la cotización');}
function addFotoNueva(inp){var f=inp.files[0];if(!f)return;window._fotos=window._fotos||[];window._fotos.push(f);document.getElementById('foto-st').textContent=window._fotos.length+' archivo(s) ✓';}
function guardarSolicitud(){
  var desc=document.getElementById('q-desc').value.trim();if(!desc){toast('Escribe qué necesitas');return;}
  var body={tipo:nuevoTipo,descripcion:desc,cantidad:(+document.getElementById('q-cant').value||null),
    obra:document.getElementById('q-obra').value||null,etapa:document.getElementById('q-etapa').value||null,
    proveedor:document.getElementById('q-prov').value||null,valor:(+document.getElementById('q-valor').value||null),
    estado:'solicitada',semaforo:null};
  fetch(SB+'/rest/v1/requisiciones',{method:'POST',headers:Object.assign({Prefer:'return=representation'},H),body:JSON.stringify(body)})
   .then(function(r){return r.json();}).then(function(rows){
     var id=rows&&rows[0]&&rows[0].id;var fotos=window._fotos||[];
     if(!fotos.length){toast('Solicitud enviada ✓');cerrar();cargar();return;}
     var ups=fotos.map(function(f){var path='req'+id+'/'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
       return fetch(SB+'/storage/v1/object/compras/'+path,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':f.type||'application/octet-stream'},body:f})
        .then(function(rr){if(!rr.ok)throw 0;var url=SB+'/storage/v1/object/public/compras/'+path;
          return fetch(SB+'/rest/v1/cotizaciones_prov',{method:'POST',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify({requisicion_id:id,proveedor_texto:document.getElementById('q-prov').value||null,material:document.getElementById('q-desc').value,archivo_url:url})});});});
     Promise.all(ups).then(function(){toast('Solicitud enviada ✓');cerrar();cargar();}).catch(function(){toast('Solicitud creada (revisa fotos)');cerrar();cargar();});
   }).catch(function(){toast('Error al enviar');});
}

// ── APROBAR (dirección) ──
function renderAprobar(v){
  var list=reqs.filter(esSolicitada);
  v.innerHTML=list.length?list.map(cardAprobar).join(''):'<p class="muted">No hay solicitudes por aprobar.</p>';
}
function cardAprobar(r){var nc=cots.filter(function(c){return c.requisicion_id===r.id;}).length;
  return '<div class="card"><div class="row"><div><div class="nm">'+esc(r.descripcion||'—')+'</div>'
    +'<div class="sub">'+esc(tipoTxt(r.tipo))+' · '+esc(r.obra||'')+(r.cantidad?' · '+esc(r.cantidad)+' und':'')+(r.proveedor?' · '+esc(r.proveedor):'')+'</div></div>'
    +'<div class="money">'+(r.valor?fmt(r.valor):'')+'</div></div>'
    +(nc?'<div class="tag" style="margin-top:6px">'+nc+' cotización(es) adjunta(s)</div>':'')
    +'<div class="acts"><button class="btn s" onclick="revisar('+r.id+')">🔎 Revisar</button>'
    +'<button class="btn g" onclick="aprobar('+r.id+')">Aprobar + fecha</button>'
    +'<button class="btn r" onclick="negar('+r.id+')">Negar</button></div></div>';
}
function revisar(id){cur=req(id);var cs=cots.filter(function(c){return c.requisicion_id===id;});
  var body='<div class="row" style="margin-bottom:8px"><div style="font-weight:800;font-size:16px">🔎 Revisar cotizaciones</div><button class="btn s" onclick="cerrar()">✕</button></div>';
  body+='<div class="sub" style="margin-bottom:10px">'+esc(cur.descripcion||'')+' · '+esc(cur.obra||'')+'</div>';
  if(!cs.length){body+='<p class="muted">Sin cotizaciones cargadas. Puedes aprobar directo si es pequeña o pago a proveedor.</p>';}
  else{
    var rows=cs.map(function(c){var tot=(+c.precio_unit||0)*(+c.cantidad||cur.cantidad||1)+(+c.flete||0);return Object.assign({},c,{_tot:tot});});
    var conPrecio=rows.filter(function(x){return x._tot>0;});
    var best=conPrecio.length?conPrecio.reduce(function(a,b){return b._tot<a._tot?b:a;}):null;
    rows.forEach(function(c){
      body+='<div class="cmp'+(best&&c.id===best.id?' best':'')+'"><div class="row"><div><div class="nm">'+esc(c.proveedor_texto||'Proveedor')+(best&&c.id===best.id?' ⭐':'')+'</div>'
        +'<div class="tag">'+(c.precio_unit?fmt(c.precio_unit)+'/und':'sin precio')+(c.flete?' · flete '+fmt(c.flete):'')+'</div></div>'
        +'<div style="text-align:right"><div class="money">'+(c._tot?fmt(c._tot):'—')+'</div>'
        +(c.archivo_url?'<a class="tag" href="'+esc(c.archivo_url)+'" target="_blank" style="color:var(--ind)">ver</a>':'')+'</div></div>'
        +'<div class="frow" style="margin-top:6px"><input type="number" placeholder="precio/und" value="'+(c.precio_unit||'')+'" oninput="setCot('+c.id+',\'precio_unit\',this.value)"><input type="number" placeholder="flete" value="'+(c.flete||'')+'" oninput="setCot('+c.id+',\'flete\',this.value)"></div></div>';
    });
    if(best){body+='<div class="card" style="background:#f2fbf6;border-color:var(--grn)"><b>Recomendado:</b> '+esc(best.proveedor_texto||'')+' · '+fmt(best._tot)+' (más barato con flete). <span id="hist-tip" class="tag"></span></div>';}
    body+='<div class="tag">Ajusta precios y toca Guardar para recalcular. La elegida alimenta tu base de precios.</div>';
  }
  body+='<div class="foot"><button class="btn s" onclick="cerrar()">Cerrar</button>'+(cs.length?'<button class="btn" onclick="revisar('+id+')">Recalcular</button>':'')+'</div>';
  document.getElementById('mbody').innerHTML=body;document.getElementById('ov').className='ov on';
  if(cs.length)histTip(cur.descripcion);
}
function setCot(id,k,v){var patch={};patch[k]=(+v||0);fetch(SB+'/rest/v1/cotizaciones_prov?id=eq.'+id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(patch)}).then(function(){var c=cots.find(function(x){return x.id===id;});if(c)c[k]=+v||0;});}
function histTip(material){if(!material)return;var m=material.split(/[ ,]/)[0];
  fetch(SB+'/rest/v1/precios_historicos?material=ilike.*'+encodeURIComponent(m)+'*&select=precio&limit=50',{headers:H}).then(function(r){return r.json();}).then(function(rows){
    rows=Array.isArray(rows)?rows:[];if(!rows.length)return;var avg=rows.reduce(function(s,x){return s+(+x.precio||0);},0)/rows.length;
    var el=document.getElementById('hist-tip');if(el)el.textContent='Histórico ~'+fmt(Math.round(avg))+'/und ('+rows.length+' compras).';
  }).catch(function(){});
}
function aprobar(id){cur=req(id);
  var f=prompt('Fecha máxima de pago (AAAA-MM-DD):',hoy());if(f===null)return;
  var forzar=confirm('¿Marcar como URGENTE (rojo) aunque la fecha no apriete?\nAceptar = urgente · Cancelar = normal');
  var body={estado:'aprobada',aprobada_por:'Dirección',aprobada_el:new Date().toISOString(),fecha_vence:f,semaforo:(forzar?'rojo':null)};
  fetch(SB+'/rest/v1/requisiciones?id=eq.'+id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(body)})
   .then(function(r){if(!r.ok)throw 0;toast('Aprobada ✓ pasa a Pagar');cerrar();cargar();setTab('pagar');}).catch(function(){toast('Error');});
}
function negar(id){if(!confirm('¿Negar esta solicitud?'))return;
  fetch(SB+'/rest/v1/requisiciones?id=eq.'+id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify({estado:'negada'})})
   .then(function(r){if(!r.ok)throw 0;toast('Negada');cargar();}).catch(function(){toast('Error');});
}

// ── PAGAR (tesorera) ──
function renderPagar(v){
  var list=reqs.filter(esAprobada);
  var ord={rojo:0,naranja:1,verde:2};
  list.sort(function(a,b){return ord[semaforo(a)]-ord[semaforo(b)];});
  v.innerHTML=list.length?list.map(cardPagar).join(''):'<p class="muted">No hay nada por pagar.</p>';
}
function cardPagar(r){var s=semaforo(r);
  return '<div class="card lft '+s+'"><div class="row"><div><div class="nm">'+esc(r.descripcion||'—')+'</div>'
    +'<div class="sub">'+esc(r.obra||'')+(r.proveedor?' · '+esc(r.proveedor):'')+(r.fecha_vence?' · límite '+esc(r.fecha_vence):'')+'</div></div>'
    +'<div style="text-align:right">'+pill(s)+'<div class="money" style="margin-top:4px">'+(r.valor?fmt(r.valor):'')+'</div></div></div>'
    +'<div class="acts"><button class="btn g" onclick="pagar('+r.id+')">💳 Pagar + foto</button></div></div>';
}
function pagar(id){cur=req(id);var r=cur;
  document.getElementById('mbody').innerHTML=
   '<div class="row" style="margin-bottom:8px"><div style="font-weight:800;font-size:16px">Registrar pago</div><button class="btn s" onclick="cerrar()">✕</button></div>'
   +'<div class="sub" style="margin-bottom:10px">'+esc(r.descripcion||'')+' · '+esc(r.obra||'')+'</div>'
   +'<div class="frow"><div class="fg"><label>Proveedor</label><input id="pg-prov" list="dl-prov2" value="'+esc(r.proveedor||'')+'"><datalist id="dl-prov2">'+provs.map(function(p){return '<option>'+esc(p.razon_social)+'</option>';}).join('')+'</datalist></div><div class="fg"><label>Valor pagado</label><input id="pg-valor" type="number" value="'+(r.valor||'')+'"></div></div>'
   +'<div class="frow"><div class="fg"><label>Flete / transporte (opcional)</label><input id="pg-flete" type="number" value="'+(r.flete||'')+'"></div><div class="fg"><label>Medio / cuenta</label><input id="pg-medio" placeholder="ej: Bancolombia"></div></div>'
   +'<div class="fg"><label>Comprobante del pago</label><div class="acts"><label class="btn s" style="cursor:pointer">📷 Foto<input type="file" accept="image/*" capture="environment" style="display:none" onchange="setComp(this)"></label><label class="btn s" style="cursor:pointer">📎 Archivo<input type="file" accept="image/*,application/pdf" style="display:none" onchange="setComp(this)"></label><span id="comp-st" class="tag"></span></div></div>'
   +'<div class="foot"><button class="btn s" onclick="cerrar()">Cancelar</button><button class="btn g" onclick="confirmarPago('+id+')">Confirmar pagado</button></div>';
  document.getElementById('ov').className='ov on';window._comp=null;
}
function setComp(inp){var f=inp.files[0];if(!f)return;window._comp=f;document.getElementById('comp-st').textContent='archivo ✓';}
function confirmarPago(id){var r=req(id);
  var prov=document.getElementById('pg-prov').value||null,valor=+document.getElementById('pg-valor').value||null,flete=+document.getElementById('pg-flete').value||0,medio=document.getElementById('pg-medio').value||null;
  function finish(compUrl){
    var body={pagado:true,fecha_pago:hoy(),estado:'pagada',proveedor:prov,valor:valor,flete:flete,medio_pago:medio};
    if(compUrl)body.comprobante_url=compUrl;
    fetch(SB+'/rest/v1/requisiciones?id=eq.'+id,{method:'PATCH',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify(body)})
     .then(function(rr){if(!rr.ok)throw 0;
       // alimentar base de precios
       var cant=+r.cantidad||1;var punit=valor?Math.round(valor/cant):null;
       fetch(SB+'/rest/v1/precios_historicos',{method:'POST',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify({material:r.descripcion,proveedor_texto:prov,precio:punit,cantidad:cant,obra:r.obra,fecha:hoy()})}).catch(function(){});
       toast('Pago registrado ✓');cerrar();cargar();
     }).catch(function(){toast('Error al pagar');});
  }
  if(window._comp){var f=window._comp;var path='pago'+id+'/'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    fetch(SB+'/storage/v1/object/compras/'+path,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':f.type||'application/octet-stream'},body:f})
     .then(function(rr){if(!rr.ok)throw 0;finish(SB+'/storage/v1/object/public/compras/'+path);}).catch(function(){finish(null);});
  } else finish(null);
}
function cerrar(){document.getElementById('ov').className='ov';}
cargar();
</script></body></html>
