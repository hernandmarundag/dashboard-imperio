<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Weliving · Requisiciones</title>
<style>
:root{--indigo:#4f46e5;--purple:#7c5cf0;--ok:#16a34a;--danger:#dc2626;--warn:#d97706;--ink:#1b2030;--muted:#6b7280;--faint:#9aa2b1;--line:#e6e8f0;--bg:#f4f5f8;--surface:#fff;--r:16px;--shadow:0 1px 2px rgba(16,24,40,.04),0 4px 14px rgba(16,24,40,.04)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:40px}
.top{background:linear-gradient(120deg,var(--indigo),var(--purple));color:#fff;padding:20px}
.top h1{font-size:20px;font-weight:800}.top .d{font-size:12.5px;opacity:.9;margin-top:3px}
.wrap{max-width:1180px;margin:0 auto;padding:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kc{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow)}
.kc .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
.kc .v{font-size:20px;font-weight:800;margin-top:5px;font-variant-numeric:tabular-nums}
.kc.amber .v{color:var(--warn)}.kc.blue .v{color:var(--indigo)}.kc.green .v{color:var(--ok)}.kc.red .v{color:var(--danger)}
.sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.sec h2{font-size:15px;font-weight:800;margin-bottom:8px}
.note{font-size:12px;color:var(--muted);margin:2px 0 10px}
.filt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filt button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--muted)}
.filt button.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}

.rq{background:#fff;border:1px solid #e9ebf2;border-radius:11px;padding:10px 11px 10px 13px;margin-bottom:7px;position:relative;overflow:hidden}
.rq:before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.rq.pend:before{background:#f59e0b} .rq.aprob:before{background:#3b82f6}
.rq.pagada:before{background:#16a34a} .rq.cont:before{background:#c9cede}
.rq.cont{opacity:.62}
.l1{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.pv{font-size:14px;font-weight:700;color:#1b2030;line-height:1.25;letter-spacing:-.01em}
.vl{font-size:15.5px;font-weight:800;color:#1b2030;white-space:nowrap;letter-spacing:-.02em}
.l2{font-size:11.5px;color:#8a90a6;margin-top:2px;line-height:1.35}
.st{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px;white-space:nowrap;vertical-align:middle}
.st.a{background:#fef3c7;color:#92400e} .st.b{background:#dbeafe;color:#1e40af}
.st.c{background:#dcfce7;color:#166534} .st.d{background:#eef0f5;color:#6b7280}
.st.e{background:#fee2e2;color:#991b1b}
.cta{display:flex;align-items:center;gap:7px;background:#f5f6fb;border-radius:8px;padding:7px 9px;margin-top:8px}
.cta-n{flex:1;font-family:ui-monospace,Menlo,monospace;font-size:14.5px;font-weight:700;color:#1e3a8a;word-break:break-all;line-height:1.2;-webkit-user-select:all;user-select:all}
.cta-m{font-size:10px;color:#8a90a6;font-weight:600;display:block;margin-top:1px;font-family:-apple-system,sans-serif}
.cpy{flex:0 0 auto;width:40px;height:40px;border:0;border-radius:9px;background:#4f46e5;color:#fff;font-size:16px;cursor:pointer;line-height:1}
.cpy:active{background:#4338ca}
.lnk{flex:0 0 auto;width:40px;height:40px;border-radius:9px;background:#16a34a;color:#fff;font-size:16px;text-align:center;line-height:40px;text-decoration:none}
.cta.w{background:#fffbeb;border:1px solid #fde68a}
.cta.w .cta-n{font-size:11.5px;color:#92400e;font-weight:600;font-family:-apple-system,sans-serif}
.rw{display:flex;gap:6px;align-items:center;margin-top:8px}
.rw .dcs{flex:1;display:flex;gap:8px;align-items:center;font-size:16px}
.rw .b{padding:9px 13px !important;font-size:13px !important;font-weight:700;border-radius:9px;min-height:40px}
.rq-none{color:#a8adbd;font-size:13px;text-align:center;padding:18px}
@media(min-width:900px){ .rq-list{display:grid;grid-template-columns:1fr 1fr;gap:7px} .rq{margin-bottom:0} }

table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:8px 9px;text-align:left;border-top:1px solid #f0f1f6;vertical-align:middle}
th{background:#fafbff;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.3px}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
.bdg{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bdg.pend{background:#fef3c7;color:#92400e}.bdg.aprob{background:#e0e7ff;color:#3730a3}.bdg.rech{background:#f1f5f9;color:#64748b}.bdg.pag{background:#dcfce7;color:#166534}
.b{border:1.5px solid;border-radius:7px;padding:4px 8px;font-size:10.5px;font-weight:800;cursor:pointer;white-space:nowrap;background:#fff;margin:1px}
.b.ap{border-color:var(--indigo);color:var(--indigo)}.b.pay{border-color:var(--ok);color:var(--ok)}.b.no{border-color:var(--danger);color:var(--danger)}
.b:active{transform:translateY(1px)}
.doc{cursor:pointer;font-size:15px;user-select:none}
.add{border:1.5px dashed #cbd2e0;background:#fff;color:var(--indigo);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer}
.form{display:none;flex-wrap:wrap;gap:10px;margin-top:12px;align-items:end}.form.on{display:flex}
.fld{display:flex;flex-direction:column;gap:3px}.fld.big{flex:1;min-width:220px}
.fld label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.fld input,.fld select{border:1px solid #cbd2e0;border-radius:8px;padding:8px 9px;font-size:13px}
.save{background:var(--indigo);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer}
.loading{text-align:center;padding:50px;color:var(--muted)}
.retry{background:var(--indigo);color:#fff;border:none;border-radius:11px;padding:10px 18px;font-weight:700;cursor:pointer;margin-top:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a7340;color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:9;pointer-events:none}
.toast.on{opacity:1}.toast.err{background:var(--danger)}
a.pl{color:var(--indigo);font-size:11px}
.rev-ov{position:fixed;inset:0;background:rgba(15,16,36,.55);display:none;align-items:flex-end;justify-content:center;z-index:60}
.rev-ov.on{display:flex}
.rev-modal{background:#fff;border-radius:16px 16px 0 0;max-width:640px;width:100%;padding:16px;max-height:92vh;overflow:auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.rev-h{display:flex;justify-content:space-between;align-items:center;font-size:16px;margin-bottom:4px}
.rev-h .x{border:0;background:#eef0f6;border-radius:8px;padding:6px 10px;cursor:pointer}
.rev-sub{font-size:12px;color:#6b7280;margin-bottom:10px}
.rvc{border:1px solid #e6e8f0;border-radius:10px;padding:10px;margin-bottom:8px}
.rvc.best{border-color:#16a34a;background:#f2fbf6}
.rvc.add{background:#f7f8fc}
.rvc-t{display:flex;justify-content:space-between;font-weight:700}
.rvc-i{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center}
.rvc-i input{flex:1;min-width:78px;padding:9px;border:1px solid #e6e8f0;border-radius:8px;font-size:15px}
.rvc-i button{background:#4f46e5;color:#fff;border:0;border-radius:8px;padding:9px 12px;font-weight:700;cursor:pointer}
.rvc-i a,.rvc-i a{align-self:center;color:#4f46e5;font-weight:700;font-size:12px}
.rev-best{background:#f2fbf6;border:1px solid #16a34a;border-radius:10px;padding:10px;font-size:13px;margin-bottom:8px}
.rev-res{margin-top:8px}
.rev-res textarea{width:100%;min-height:58px;border:1px solid #e6e8f0;border-radius:8px;padding:9px;font-size:15px;font-family:inherit;margin-top:4px}
.rev-res button{margin-top:6px;background:#4f46e5;color:#fff;border:0;border-radius:8px;padding:9px 12px;font-weight:700;cursor:pointer}
</style></head>
<body>
<div class="top"><h1>📋 Weliving · Requisiciones</h1><div class="d">pedido → aprobado → por pagar → pagado · conectado al flujo de caja</div></div>

<script>
const SB_URL='https://dghmgaaprlzpfnpsqzav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaG1nYWFwcmx6cGZucHNxemF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzcyMDQsImV4cCI6MjA5NzIxMzIwNH0.kPTDqFX1AaXlxI2G9V9S46KDMWb6Y6tHoMwe0Fujk7k';
const SBH={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
var ROL=((new URLSearchParams(location.search).get('rol'))||'admin').toLowerCase();
var ROLNAME={ing:'👷 Ingeniero — crear y subir factura',hernan:'✅ Hernán — aprobar',tesorera:'💵 Paulina (tesorería) — pagar y subir comprobante',contabilidad:'📗 Lina (contabilidad) — revisar y pasar a gasto',admin:'🔑 Admin — todo'};
var RQ=[],FILT=({ing:'todas',hernan:'pend',tesorera:'aprob',contabilidad:'cont'})[ROL]||'todas',FUP=null;
function can(a){if(ROL==='admin')return true;if(a==='crear')return ROL==='ing';if(a==='aprob')return ROL==='hernan';if(a==='pay')return ROL==='tesorera';if(a==='cont')return ROL==='contabilidad';return false;}
var AREAS=['MO General','Materiales General','Nomina ADM','Nomina Empleados','Administracion','Alquiler Equipos','Seguros','Seguridad Social','Herramientas','Transporte','Excavacion','Varios','Planos'];
var OBRAS=[['weliving','Weliving'],['robledo','Robledo'],['novaeva','Novaeva']];
function obraNm(id){var o=OBRAS.find(function(x){return x[0]===id;});return o?o[1]:(id||'');}
function subirFactura(el){var f=el.files&&el.files[0];if(!f){return;}var st=document.getElementById('fac-st');if(st)st.textContent='⏳ subiendo…';
 var path='weliving/'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
 fetch(SB_URL+'/storage/v1/object/facturas/'+encodeURIComponent(path),{method:'POST',headers:Object.assign({},SBH,{'Content-Type':f.type||'application/octet-stream'}),body:f})
 .then(function(r){if(!r.ok)throw 0;FUP=SB_URL+'/storage/v1/object/public/facturas/'+path;if(st)st.innerHTML='<b style="color:#16a34a">✅ factura lista</b>';toast('Factura subida ✓');})
 .catch(function(){if(st)st.textContent='⚠️ error al subir';toast('Error subiendo factura',true);});}
function fmt(n){n=Math.round(+n||0);return '$'+n.toLocaleString('es-CO');}
function num(v){return parseInt(String(v).replace(/[^0-9-]/g,''))||0;}
function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function g(u){return fetch(SB_URL+'/rest/v1/'+u,{headers:SBH}).then(function(r){return r.json();});}
function post(p,b){return fetch(SB_URL+'/rest/v1/'+p,{method:'POST',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=representation'}),body:JSON.stringify(b)});}
function patch(p,b){return fetch(SB_URL+'/rest/v1/'+p,{method:'PATCH',headers:Object.assign({},SBH,{'Content-Type':'application/json',Prefer:'return=minimal'}),body:JSON.stringify(b)});}
function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.classList.toggle('err',!!e);t.classList.add('on');setTimeout(function(){t.classList.remove('on');},1500);}
function hoy(){return new Date().toISOString().slice(0,10);}
function boot(){
 document.getElementById('body').innerHTML='<div class="loading"><div style="font-size:30px">⏳</div><p style="margin-top:8px">Cargando requisiciones…</p></div>';
 g('requisiciones?order=fecha.desc,id.desc&limit=3000').then(function(r){RQ=r||[];render();})
 .catch(function(){document.getElementById('body').innerHTML='<div class="loading"><div style="font-size:32px">⚠️</div><p style="margin:10px 0">No pude conectar.</p><button class="retry" onclick="boot()">↻ Reintentar</button></div>';});
}
function estOf(r){return r.pagado?'pag':(r.estado||'pendiente').slice(0,5).replace('pendi','pend').replace('aprob','aprob').replace('recha','rech');}
function render(){
 var pend=RQ.filter(function(r){return !r.pagado&&(r.estado||'pendiente')==='pendiente';});
 var aprob=RQ.filter(function(r){return !r.pagado&&r.estado==='aprobado';});
 var pag=RQ.filter(function(r){return r.pagado;});
 var xcont=RQ.filter(function(r){return r.pagado&&!r.contabilizado;});
 var venc=RQ.filter(function(r){return !r.pagado&&r.fecha_vence&&r.fecha_vence<hoy();});
 var cards='<div class="cards">'+
  kc('red','⏰ Vencido por pagar',venc.length+' · '+fmt(venc.reduce(function(a,r){return a+(+r.valor||0);},0)),'proveedores atrasados')+
  kc('amber','⏳ Por aprobar (Hernán)',pend.length+' · '+fmt(pend.reduce(function(a,r){return a+(+r.valor||0);},0)))+
  kc('blue','✅ Por pagar (tesorera)',fmt(aprob.reduce(function(a,r){return a+(+r.valor||0);},0)),aprob.length+' aprobadas')+
  kc('green','💵 Pagadas',fmt(pag.reduce(function(a,r){return a+(+r.valor||0);},0)),pag.length+' pagadas')+
  kc('red','📗 Por contabilizar',xcont.length+' · '+fmt(xcont.reduce(function(a,r){return a+(+r.valor||0);},0)))+
 '</div>';
 var lista=RQ;
 if(FILT==='pend')lista=pend;else if(FILT==='aprob')lista=aprob;else if(FILT==='pag')lista=pag;else if(FILT==='cont')lista=xcont;
 var filt='<div class="filt">'+fb('todas','Todas')+fb('pend','⏳ Por aprobar')+fb('aprob','✅ Por pagar')+fb('pag','💵 Pagadas')+fb('cont','📗 Por contabilizar')+'</div>';
 var rows=lista.map(rowHTML).join('')||'<tr><td colspan="9" class="note" style="text-align:center;padding:18px">Sin requisiciones en este filtro.</td></tr>';
 var tabla='<div class="sec"><h2>📋 Requisiciones</h2><div class="note">Ing crea con factura 📄 → Hernán aprueba (entra a Por pagar del flujo) → Tesorera paga y sube comprobante 🧾 → Contabilidad da "Pasar a gasto" (crea el gasto con todo, sin retdigitar). 📄=factura · 🧾=comprobante · 📎=subir.</div>'+filt+
  '<div class="rq-list">'+(rows||'<div class="rq-none">Sin requisiciones</div>')+'</div></div>';
 var addf='<div class="sec"><button class="add" onclick="tog(\'nf\')">＋ Nueva requisición</button>'+
  '<div class="form" id="nf">'+
   '<div class="fld big"><label>Tipo de solicitud</label><select id="n-tipo"><option value="compra">🧱 Compra nueva</option><option value="pago">🧾 Pago a proveedor</option></select></div>'+
   '<div class="fld"><label>Obra</label><select id="n-obra">'+OBRAS.map(function(o){return '<option value="'+o[0]+'">'+o[1]+'</option>';}).join('')+'</select></div>'+
   '<div class="fld"><label>Fecha</label><input id="n-f" type="date" value="'+hoy()+'"></div>'+
   '<div class="fld"><label>🚦 Fecha límite de pago</label><input id="n-vence" type="date"></div>'+
   '<div class="fld big"><label>Pagado a / Proveedor</label><input id="n-p" placeholder="Ej: San Pío"></div>'+
   '<div class="fld big"><label>Descripción / Material</label><input id="n-d" placeholder="Ej: Hierro, Concreto, Arena"></div>'+
   '<div class="fld"><label>Área / Categoría</label><select id="n-area"><option value="">-- Área --</option>'+AREAS.map(function(a){return '<option>'+a+'</option>';}).join('')+'</select></div>'+
   '<div class="fld"><label>Etapa</label><input id="n-e" placeholder="Ej: Estructura, Losa P5..."></div>'+
   '<div class="fld"><label>Cantidad</label><input id="n-c" placeholder="Ej: 5 m³"></div>'+
   '<div class="fld"><label>Valor</label><input id="n-v" placeholder="$"></div>'+
   '<div class="fld"><label>IVA</label><input id="n-iva" placeholder="$ 0"></div>'+
   '<div class="fld"><label>Cuenta / Método de pago</label><input id="n-m" placeholder="BCol Grupo, TC Paulina..."></div>'+
   '<div class="fld"><label>N° cuenta</label><input id="n-cta" placeholder="Opcional"></div>'+
   '<div class="fld"><label>N° factura</label><input id="n-nf" placeholder="Opcional"></div>'+
   '<div class="fld big"><label>📎 Factura (foto o PDF)</label><input id="n-fac" type="file" accept="image/*,application/pdf" onchange="subirFactura(this)"> <span id="fac-st" style="font-size:11px"></span></div>'+
   '<button class="save" onclick="addReq()">Guardar requisición</button>'+
  '</div></div>';
 if(!can('crear'))addf='';
 var banner='<div class="sec" style="background:#eef0fe;border-color:#c7d2fe;padding:11px 15px;margin-bottom:14px"><b style="color:var(--indigo)">'+(ROLNAME[ROL]||ROL)+'</b> <span class="note" style="margin:0"> · esta vista está enfocada en tu tarea</span></div>';
 document.getElementById('body').innerHTML=banner+cards+addf+tabla;
}
function kc(c,l,v,n){return '<div class="kc '+c+'"><div class="l">'+l+'</div><div class="v">'+v+'</div>'+(n?'<div class="note" style="margin:3px 0 0">'+n+'</div>':'')+'</div>';}
function fb(k,t){return '<button class="'+(FILT===k?'on':'')+'" onclick="setF(\''+k+'\')">'+t+'</button>';}
function bdg(r){if(r.pagado&&r.contabilizado)return '<span class="bdg pag">📗 Contabilizada</span>';if(r.pagado)return '<span class="bdg aprob">💵 Pagada · x contab.</span>';var e=r.estado||'pendiente';if(e==='aprobado')return '<span class="bdg aprob">✅ Aprobada · x pagar</span>';if(e==='rechazado')return '<span class="bdg rech">✗ Rechazada</span>';return '<span class="bdg pend">⏳ Por aprobar</span>';}
function fileIco(r,campo,emo,lbl){var u=r[campo];if(u)return '<a class="pl" href="'+esc(u)+'" target="_blank" rel="noopener" title="Ver '+lbl+'" style="font-size:15px">'+emo+'</a>';return '<span class="doc" title="Subir '+lbl+'" style="opacity:.5" onclick="subirDoc('+r.id+',\''+campo+'\')">📎</span>';}
function docs(r){function d(c,l){return '<span class="doc" title="'+l+'" onclick="togDoc('+r.id+',\''+c+'\','+(r[c]?'false':'true')+')">'+(r[c]?'✅':'⬜')+'</span>';}return fileIco(r,'factura_url','📄','factura')+' '+fileIco(r,'comprobante_url','🧾','comprobante de pago')+' <span style="color:#cbd2e0">|</span> '+d('rut','RUT')+' '+d('cuenta_cobro','Cta cobro')+' '+d('certificado','Certif.');}
function acc(r){var h='';if(!r.pagado&&(r.estado||'pendiente')==='pendiente'&&can('aprob')){h+=(r.tipo!=='pago'?'<button class="b" style="background:#eef0fe;color:#4f46e5" onclick="revisar('+r.id+')">🔎 Revisar</button>':'')+'<button class="b ap" onclick="aprobar('+r.id+')">✓ Aprobar</button><button class="b no" onclick="rechazar('+r.id+')">✗</button>';}else if(!r.pagado&&r.estado==='aprobado'&&can('pay')){h+='<button class="b pay" onclick="pagar('+r.id+')">💵 Pagada</button>';}else if(r.pagado&&!r.contabilizado&&can('cont')){h+='<button class="b ap" onclick="pasarAGasto('+r.id+')">📗 Pasar a gasto</button>';}return h||'—';}
function pasarAGasto(id){var r=RQ.find(function(x){return x.id===id;});if(!r)return;
 if(!r.obra){toast('Esta requisici\u00f3n no tiene obra. Corr\u00edgela antes de pasarla a gasto.',true);return;}if(r.gasto_id){if(!confirm('Ya tiene gasto registrado. ¿Solo marcar contabilizada?')){return;}patch('requisiciones?id=eq.'+id,{contabilizado:true}).then(function(){r.contabilizado=true;toast('Contabilizada ✓');render();});return;}
 if(!confirm('¿Registrar en la HOJA DE GASTO y marcar contabilizada?\n'+r.proveedor+' · '+fmt(r.valor)+'\n(Se crea el gasto con la factura y los datos de la requisición.)'))return;
 var cant=parseFloat(String(r.cantidad||'').replace(/[^0-9.]/g,''))||null;
 post('gastos',{obra:r.obra,fecha:r.fecha_pago||r.fecha,nombre:r.proveedor,descripcion:r.descripcion,material:r.material||r.descripcion,area:r.area,cantidad:cant,iva:r.iva||0,monto:r.valor,mp:r.medio_pago,cuenta:r.cuenta,etapa:r.etapa,cap_num:r.cap_num,factura_url:r.factura_url,fuente:'requisicion'})
 .then(function(res){return res.json();}).then(function(rows){var gid=(rows&&rows[0])?rows[0].id:null;r.contabilizado=true;r.gasto_id=gid;return patch('requisiciones?id=eq.'+id,{contabilizado:true,gasto_id:gid});})
 .then(function(){toast('Registrada en la hoja de gasto y contabilizada ✓');render();}).catch(function(){toast('Error al pasar a gasto',true);});}
function copiar(el){var t=el.dataset.c;
  var ok=function(){el.textContent='\u2705';el.style.background='#16a34a';setTimeout(function(){el.textContent='\ud83d\udccb';el.style.background='';},1500);};
  var fb=function(){var i=document.createElement('textarea');i.value=t;i.style.position='fixed';i.style.opacity=0;
    document.body.appendChild(i);i.select();try{document.execCommand('copy');ok();}catch(e){prompt('Cuenta:',t);}document.body.removeChild(i);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(ok).catch(fb);}else{fb();}}
function stBdg(r){
  if(r.pagado&&r.contabilizado)return '<span class="st d">\ud83d\udcd7 Contabilizada</span>';
  if(r.pagado)return '<span class="st c">\ud83d\udcb5 Pagada \u00b7 falta contabilizar</span>';
  if(r.estado==='rechazado')return '<span class="st e">\u2717 Rechazada</span>';
  if(r.estado==='aprobado')return '<span class="st b">\u2705 Aprobada \u00b7 por pagar</span>';
  return '<span class="st a">\u23f3 Por aprobar</span>';}
function ctaBlk(r){
  if(r.pagado)return '';
  if(!r.cuenta&&!r.link_pago)return '<div class="cta w"><div class="cta-n">\u26a0\ufe0f Sin cuenta ni link \u2014 no se puede pagar</div></div>';
  var h='<div class="cta">';
  if(r.cuenta){h+='<div class="cta-n">'+esc(r.cuenta)+(r.medio_pago?'<span class="cta-m">'+esc(r.medio_pago)+'</span>':'')+'</div>'
    +'<button class="cpy" data-c="'+esc(r.cuenta)+'" onclick="copiar(this)" title="Copiar cuenta">\ud83d\udccb</button>';}
  else{h+='<div class="cta-n" style="font-size:11.5px;color:#8a90a6;font-family:-apple-system,sans-serif;font-weight:600">Pago por link</div>';}
  if(r.link_pago){h+='<a class="lnk" href="'+esc(r.link_pago)+'" target="_blank" rel="noopener" title="Abrir link">\ud83d\udd17</a>';}
  return h+'</div>';}
function cardCls(r){if(r.pagado&&r.contabilizado)return 'cont';if(r.pagado)return 'pagada';
  if(r.estado==='aprobado')return 'aprob';if(r.estado==='rechazado')return 'cont';return 'pend';}
function tipoBdg(r){var t=(r.tipo==='pago')?['🧾 Pago','#7c3aed']:['🧱 Compra','#2563eb'];return '<span style="display:inline-block;font-size:10.5px;font-weight:700;color:'+t[1]+';background:'+t[1]+'18;padding:2px 8px;border-radius:20px">'+t[0]+'</span>';}
function semaforo(r){
  if(r.pagado||!r.fecha_vence)return '';
  var dias=Math.round((new Date(r.fecha_vence+'T12:00:00')-new Date())/86400000);
  var col,txt;
  if(dias<0){col='#dc2626';txt='\u23f0 Vencido hace '+(-dias)+'d';}
  else if(dias<=3){col='#d97706';txt='\ud83d\udfe0 Vence en '+dias+'d';}
  else{col='#16a34a';txt='\ud83d\udfe2 Vence en '+dias+'d';}
  return ' <span style="display:inline-block;font-size:11px;font-weight:700;color:'+col+';background:'+col+'18;padding:2px 9px;border-radius:20px">'+txt+' ('+r.fecha_vence+')</span>';
}
function rowHTML(r){var a=acc(r);
 return '<div class="rq '+cardCls(r)+'">'
  +'<div class="l1"><span class="pv">'+esc(r.proveedor||'Sin proveedor')+'</span><span class="vl">'+fmt(r.valor)+'</span></div>'
  +'<div class="l2">'+esc(r.descripcion||'')+'<br>'+(r.fecha||'')+' \u00b7 '+obraNm(r.obra)+' \u00b7 '+tipoBdg(r)+' '+stBdg(r)+semaforo(r)+'</div>'
  +ctaBlk(r)
  +'<div class="rw"><div class="dcs">'+docs(r)+'</div>'+(a==='\u2014'?'':a)+'</div></div>';}
function tog(id){document.getElementById(id).classList.toggle('on');}
function setF(k){FILT=k;render();}
function addReq(){var b={obra:(document.getElementById('n-obra').value||'weliving'),tipo:((document.getElementById('n-tipo')&&document.getElementById('n-tipo').value)||'compra'),fecha:document.getElementById('n-f').value||hoy(),fecha_vence:((document.getElementById('n-vence')&&document.getElementById('n-vence').value)||null),proveedor:(document.getElementById('n-p').value||'').trim(),descripcion:(document.getElementById('n-d').value||'').trim(),cantidad:(document.getElementById('n-c').value||'').trim()||null,valor:num(document.getElementById('n-v').value),medio_pago:(document.getElementById('n-m').value||'').trim()||null,cuenta:(document.getElementById('n-cta').value||'').trim()||null,etapa:(document.getElementById('n-e').value||'').trim()||null,area:(document.getElementById('n-area').value||'')||null,num_factura:(document.getElementById('n-nf').value||'').trim()||null,iva:num(document.getElementById('n-iva').value),factura_url:FUP,estado:'pendiente'};if(!b.valor){toast('Pon el valor',true);return;}post('requisiciones',b).then(function(r){return r.json();}).then(function(rows){if(rows&&rows[0])RQ.unshift(rows[0]);FUP=null;toast('Requisición creada ✓');render();}).catch(function(){toast('Error',true);});}
function subirDoc(id,campo){var inp=document.createElement('input');inp.type='file';inp.accept='image/*,application/pdf';inp.onchange=function(){var f=inp.files&&inp.files[0];if(!f)return;toast('⏳ subiendo…');var path='weliving/'+campo+'_'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');fetch(SB_URL+'/storage/v1/object/facturas/'+encodeURIComponent(path),{method:'POST',headers:Object.assign({},SBH,{'Content-Type':f.type||'application/octet-stream'}),body:f}).then(function(r){if(!r.ok)throw 0;var url=SB_URL+'/storage/v1/object/public/facturas/'+path;var b={};b[campo]=url;var rr=RQ.find(function(x){return x.id===id;});if(rr)rr[campo]=url;return patch('requisiciones?id=eq.'+id,b);}).then(function(){toast('Archivo guardado ✓');render();}).catch(function(){toast('Error al subir',true);});};inp.click();}
function aprobar(id){var r=RQ.find(function(x){return x.id===id;});if(r)r.estado='aprobado';patch('requisiciones?id=eq.'+id,{estado:'aprobado'}).then(function(){toast('Aprobada ✓ (ya está en Por pagar del flujo)');render();}).catch(function(){toast('Error',true);});}
function rechazar(id){var r=RQ.find(function(x){return x.id===id;});if(r)r.estado='rechazado';patch('requisiciones?id=eq.'+id,{estado:'rechazado'}).then(function(){toast('Rechazada');render();}).catch(function(){toast('Error',true);});}
function pagar(id){var r=RQ.find(function(x){return x.id===id;});if(!r)return;if(!confirm('¿Marcar como PAGADA?\n'+r.proveedor+' · '+fmt(r.valor)+'\n\nRecuerda subir el comprobante de la transferencia con el 🧾📎 de la fila.'))return;r.pagado=true;r.fecha_pago=hoy();
 patch('requisiciones?id=eq.'+id,{pagado:true,fecha_pago:hoy()}).then(function(){toast('Pagada ✓ · sube el comprobante (🧾) si falta');render();}).catch(function(){toast('Error',true);render();});}
function togDoc(id,campo,val){var r=RQ.find(function(x){return x.id===id;});var v=(val===true||val==='true');if(r)r[campo]=v;var b={};b[campo]=v;patch('requisiciones?id=eq.'+id,b).then(function(){render();}).catch(function(){toast('Error',true);});}
var COTS=[],currentRev=null;
function cerrarRev(){document.getElementById('revov').classList.remove('on');}
function _cant(r,c){return (+((c&&c.cantidad))||parseFloat(String(r.cantidad||'').replace(/[^0-9.]/g,''))||1);}
function revisar(id){currentRev=id;var r=RQ.find(function(x){return x.id===id;});if(!r)return;
 g('cotizaciones_prov?requisicion_id=eq.'+id+'&order=id').then(function(rows){COTS=rows||[];renderRev(r);}).catch(function(){COTS=[];renderRev(r);});}
function renderRev(r){
 var cs=COTS.map(function(c){var cant=_cant(r,c);var tot=(+c.precio_unit||0)*cant+(+c.flete||0);return Object.assign({},c,{_tot:tot});});
 var conP=cs.filter(function(x){return x._tot>0;});
 var best=conP.length?conP.reduce(function(a,b){return b._tot<a._tot?b:a;}):null;
 var h='<div class="rev-h"><b>&#128269; Revisar cotizaciones</b><button class="x" onclick="cerrarRev()">&#10005;</button></div>';
 h+='<div class="rev-sub">'+esc(r.descripcion||'')+' &middot; '+obraNm(r.obra)+(r.cantidad?' &middot; '+esc(r.cantidad):'')+'</div>';
 cs.forEach(function(c){h+='<div class="rvc'+(best&&c.id===best.id?' best':'')+'"><div class="rvc-t"><b>'+esc(c.proveedor_texto||'Proveedor')+(best&&c.id===best.id?' &#11088;':'')+'</b><span>'+(c._tot?fmt(c._tot):'&mdash;')+'</span></div><div class="rvc-i"><input type="number" placeholder="precio/und" value="'+(c.precio_unit||'')+'" onchange="setCot('+c.id+',&#39;precio_unit&#39;,this.value)"><input type="number" placeholder="flete" value="'+(c.flete||'')+'" onchange="setCot('+c.id+',&#39;flete&#39;,this.value)">'+(c.archivo_url?'<a href="'+esc(c.archivo_url)+'" target="_blank">ver</a>':'')+'<button onclick="elegir('+c.id+','+r.id+')">Elegir</button></div></div>';});
 h+='<div class="rvc add"><b>+ Agregar cotización</b><div class="rvc-i"><input id="ac-prov" placeholder="proveedor"><input id="ac-precio" type="number" placeholder="precio/und"><input id="ac-flete" type="number" placeholder="flete"><button onclick="addCot('+r.id+')">A&ntilde;adir</button></div></div>';
 if(best)h+='<div class="rev-best">Recomendado: '+esc(best.proveedor_texto||'')+' &middot; '+fmt(best._tot)+' (m&aacute;s barato con flete). <span id="rev-hist"></span></div>';
 if(cs.length<2)h+='<div class="rev-res"><label style="font-size:12px;color:#6b7280">Solo hay '+cs.length+' cotizaci&oacute;n. Escribe la rese&ntilde;a (proveedor &uacute;nico / urgencia / monto bajo):</label><textarea id="rev-resena">'+esc(r.resena_unica||'')+'</textarea><button onclick="guardarResena('+r.id+')">Guardar rese&ntilde;a</button></div>';
 document.getElementById('revbody').innerHTML=h;document.getElementById('revov').classList.add('on');
 if(cs.length)histRev(r.descripcion);}
function setCot(id,k,v){var b={};b[k]=+v||0;patch('cotizaciones_prov?id=eq.'+id,b).then(function(){var c=COTS.find(function(x){return x.id===id;});if(c)c[k]=+v||0;var r=RQ.find(function(x){return x.id===currentRev;});if(r)renderRev(r);});}
function addCot(rid){var r=RQ.find(function(x){return x.id===rid;});var prov=(document.getElementById('ac-prov').value||'').trim(),precio=+document.getElementById('ac-precio').value||0,flete=+document.getElementById('ac-flete').value||0;if(!prov&&!precio){toast('Pon proveedor o precio',true);return;}post('cotizaciones_prov',{requisicion_id:rid,proveedor_texto:prov||null,precio_unit:precio||null,flete:flete,material:r.descripcion}).then(function(){revisar(rid);toast('Cotización agregada ✓');}).catch(function(){toast('Error',true);});}
function elegir(cid,rid){var c=COTS.find(function(x){return x.id===cid;});var r=RQ.find(function(x){return x.id===rid;});if(!c||!r)return;var cant=_cant(r,c);var tot=(+c.precio_unit||0)*cant+(+c.flete||0);patch('cotizaciones_prov?requisicion_id=eq.'+rid,{elegida:false}).then(function(){return patch('cotizaciones_prov?id=eq.'+cid,{elegida:true});}).then(function(){return patch('requisiciones?id=eq.'+rid,{proveedor:(c.proveedor_texto||r.proveedor),valor:tot,cotizacion_unica:false});}).then(function(){r.proveedor=c.proveedor_texto||r.proveedor;r.valor=tot;toast('Elegida ✓ queda como proveedor y valor');cerrarRev();render();}).catch(function(){toast('Error',true);});}
function guardarResena(rid){var t=(document.getElementById('rev-resena').value||'').trim();patch('requisiciones?id=eq.'+rid,{resena_unica:t||null,cotizacion_unica:true}).then(function(){var r=RQ.find(function(x){return x.id===rid;});if(r){r.resena_unica=t;r.cotizacion_unica=true;}toast('Reseña guardada ✓');}).catch(function(){toast('Error',true);});}
function histRev(material){if(!material)return;var m=String(material).split(/[ ,]/)[0];g('precios_historicos?material=ilike.*'+encodeURIComponent(m)+'*&select=precio&limit=50').then(function(rows){rows=rows||[];if(!rows.length)return;var avg=rows.reduce(function(s,x){return s+(+x.precio||0);},0)/rows.length;var el=document.getElementById('rev-hist');if(el)el.textContent='Histórico ~'+fmt(Math.round(avg))+'/und ('+rows.length+').';}).catch(function(){});}

boot();
